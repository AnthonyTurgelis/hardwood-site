<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — Data Explorer</title>
<style>
  :root{ --bg:#f4f6f8; --card:#fff; --card2:#f7f9fc; --ink:#161a21; --muted:#5a6675; --dim:#8a93a3;
    --line:#e3e7ee; --line2:#d3d9e3; --acc:#2b6cb0; --good:#1e8f4e; --warn:#b5721a; --bad:#c23934;
    --chip:#eef2f8; --shadow:0 1px 2px rgba(20,24,35,.06); }
  @media (prefers-color-scheme:dark){ :root{ --bg:#0d1117; --card:#161b22; --card2:#1c2330; --ink:#e6edf3;
    --muted:#9aa7b4; --dim:#6b7684; --line:#242c38; --line2:#39424f; --acc:#58a6ff; --good:#3fb950;
    --warn:#d29922; --bad:#ff7b72; --chip:#1c2431; --shadow:none; } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13.5px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  header{padding:10px 14px 4px;max-width:1120px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:17px;margin:0}
  .ago{font-size:11px;color:var(--dim);white-space:nowrap}
  .sub{color:var(--muted);font-size:12px;max-width:1120px;margin:0 auto;padding:0 14px}
  nav{display:flex;gap:5px;flex-wrap:wrap;max-width:1120px;margin:6px auto 0;padding:0 14px}
  nav a{font-size:12px;text-decoration:none;color:var(--acc);border:1px solid var(--line);background:var(--card);padding:4px 10px;border-radius:999px}
  nav a.active{background:var(--acc);color:#fff;border-color:var(--acc)}
  main{max-width:1120px;margin:0 auto;padding:8px 14px 48px}
  .lede{color:var(--muted);font-size:12.5px;margin:8px 0 12px;max-width:820px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 14px}
  .tabs button{background:var(--card);color:var(--muted);border:1px solid var(--line);border-radius:8px;padding:7px 13px;cursor:pointer;font-size:13px;font-weight:600}
  .tabs button.active{background:var(--acc);color:#fff;border-color:var(--acc)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:11px;box-shadow:var(--shadow);padding:13px 15px;margin:0 0 14px}
  .card h2{font-size:15px;margin:0 0 3px}
  .note{font-size:11.5px;color:var(--dim);margin-top:4px}
  .asof{font-size:11px;color:var(--dim);font-weight:400}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .gcard{flex:1 1 500px;background:var(--card);border:1px solid var(--line);border-radius:11px;box-shadow:var(--shadow);padding:12px 14px}
  .gtitle{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px}
  .gtitle b{font-size:15px}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;background:var(--chip);color:var(--muted);border:1px solid var(--line)}
  .fav{color:var(--acc);font-weight:680}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:8px;margin:8px 0}
  .kv{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:7px 9px}
  .kv .k{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
  .kv .v{font-size:15px;font-weight:660;margin-top:2px}
  table{border-collapse:collapse;width:100%;font-size:12.5px}
  th,td{padding:5px 8px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--dim);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px}
  .scroll{overflow-x:auto}
  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin:6px 0 12px}
  .filters label{display:flex;flex-direction:column;font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;gap:3px}
  select,input{background:var(--card);color:var(--ink);border:1px solid var(--line2);border-radius:7px;padding:6px 8px;font-size:13px}
  .barwrap{position:relative;height:14px;background:var(--card2);border-radius:3px;min-width:120px;border:1px solid var(--line)}
  .barrow{display:flex;align-items:center;gap:8px;margin:3px 0}
  .barrow .lab{width:150px;color:var(--muted);font-size:11.5px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dial{height:12px;border-radius:3px;min-width:2px}
  .good{color:var(--good)} .warn{color:var(--warn)} .bad{color:var(--bad)} .dim{color:var(--dim)}
  .empty{color:var(--dim);font-style:italic;padding:18px 4px}
  footer{max-width:1120px;margin:0 auto;padding:16px 14px;color:var(--dim);font-size:11px}
  svg text{fill:var(--dim);font-size:9.5px}
</style>
</head>
<body>
<header>
  <h1>The Hardwood — Data Explorer</h1>
  <span class="ago" id="ago"></span>
</header>
<div class="sub">Dive into the specific numbers behind every projection — game by game, player by player, and how the models are scoring.</div>
<nav>
  <a href="./index.html">Board</a>
  <a href="./queue.html">What's Next</a>
  <a href="./games.html">Games</a>
  <a href="./teams.html">Teams</a>
  <a href="./players.html">Players</a>
  <a href="./review.html">Daily Review</a>
  <a href="./accuracy.html">Our Accuracy</a>
  <a href="./ledger.html">Error Map</a>
  <a href="./org.html">The Team</a>
  <a href="./scouting.html">Scouting</a>
  <a href="./deepdive.html">Deep Dives</a>
  <a class="active" href="./explorer.html">Data Explorer</a>
</nav>
<main id="main"><p class="empty">Loading…</p></main>
<footer id="foot"></footer>
<script>
(function(){
  "use strict";
  var DATA=null, CUR="games";
  var TABS=[
    ["games","Upcoming Games"],
    ["realm","Player Outcomes"],
    ["scorecard","Model Scorecard"],
    ["rookies","Rookie Priors"],
    ["styles","Team Styles"]
  ];
  function el(t,c,x){ var e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; }
  function fmt(n,d){ if(n==null||isNaN(n)) return "—"; return Number(n).toFixed(d==null?1:d); }
  function sgn(n,d){ if(n==null||isNaN(n)) return "—"; var v=Number(n); return (v>=0?"+":"")+v.toFixed(d==null?1:d); }
  function esc(s){ return String(s==null?"":s); }

  function tabBar(){
    var t=el("div","tabs");
    TABS.forEach(function(tb){
      var b=el("button",(tb[0]===CUR?"active":""),tb[1]);
      b.onclick=function(){ CUR=tb[0]; render(); };
      t.appendChild(b);
    });
    return t;
  }

  /* ---------- Upcoming Games ---------- */
  function panelGames(main){
    var p=(DATA.panels||{}).games;
    if(!p||!p.rows||!p.rows.length){ main.appendChild(noData("No upcoming games are projected right now.")); return; }
    var head=el("div","card");
    head.appendChild(el("h2",null,"Upcoming games — full projection detail"));
    head.appendChild(el("div","note","For each upcoming game: the projected margin and who is favored, the win probability, the 80% and 90% likely-margin ranges, and the shape of ten thousand simulated outcomes. Positive numbers favor the home team."));
    main.appendChild(head);
    var row=el("div","row");
    p.rows.forEach(function(g){
      var c=el("div","gcard");
      var gt=el("div","gtitle");
      var b=el("b"); b.textContent=g.away+" @ "+g.home; gt.appendChild(b);
      gt.appendChild(el("span","pill",g.date_label));
      c.appendChild(gt);
      var grid=el("div","grid");
      grid.appendChild(kv("Projected margin", g.fav+" by "+fmt(g.by,1), "fav"));
      grid.appendChild(kv("Win probability", g.win_pct==null?"—":(g.win_pct+"% "+g.fav)));
      grid.appendChild(kv("80% range", rng(g.range80)));
      grid.appendChild(kv("90% range", rng(g.range90)));
      if(g.sim){ grid.appendChild(kv("Simulated avg", sgn(g.sim.mean,1)+" ±"+fmt(g.sim.std,1))); }
      c.appendChild(grid);
      if(g.sim && g.sim.p10!=null){
        c.appendChild(el("div","note","Simulated margin spread (home minus away): the bar runs from a poor night to a great night; the tick is the midpoint."));
        c.appendChild(simBar(g.sim));
        if(g.sim.home_win_pct!=null){ c.appendChild(el("div","note","Simulation gives "+g.home+" a "+g.sim.home_win_pct+"% chance to win.")); }
      }
      row.appendChild(c);
    });
    main.appendChild(row);
  }
  function rng(a){ if(!a||a[0]==null) return "—"; return fmt(a[0],1)+" … "+fmt(a[1],1); }
  function simBar(s){
    var lo=Math.min(s.p10,-2), hi=Math.max(s.p90,2), span=(hi-lo)||1;
    var W=440,H=58,pad=24;
    function x(v){ return pad+(v-lo)/span*(W-2*pad); }
    var svg="<svg viewBox='0 0 "+W+" "+H+"' width='100%' height='58' style='max-width:440px'>";
    svg+="<line x1='"+pad+"' y1='36' x2='"+(W-pad)+"' y2='36' stroke='var(--line2)'/>";
    if(lo<0&&hi>0){ svg+="<line x1='"+x(0).toFixed(1)+"' y1='10' x2='"+x(0).toFixed(1)+"' y2='42' stroke='var(--line2)' stroke-dasharray='2,2'/><text x='"+x(0).toFixed(1)+"' y='54' text-anchor='middle'>0</text>"; }
    svg+="<line x1='"+x(s.p10).toFixed(1)+"' y1='36' x2='"+x(s.p90).toFixed(1)+"' y2='36' stroke='var(--acc)' stroke-width='2'/>";
    svg+="<rect x='"+x(s.p25).toFixed(1)+"' y='28' width='"+(x(s.p75)-x(s.p25)).toFixed(1)+"' height='16' fill='var(--chip)' stroke='var(--acc)'/>";
    svg+="<line x1='"+x(s.p50).toFixed(1)+"' y1='26' x2='"+x(s.p50).toFixed(1)+"' y2='46' stroke='var(--good)' stroke-width='2'/>";
    [["",s.p10],["",s.p50],["",s.p90]].forEach(function(pp){ svg+="<text x='"+x(pp[1]).toFixed(1)+"' y='20' text-anchor='middle'>"+fmt(pp[1],0)+"</text>"; });
    svg+="</svg>";
    var d=el("div"); d.innerHTML=svg; return d;
  }

  /* ---------- Player Outcomes (realm) ---------- */
  var RSTATE={stat:"PTS",team:"",hideLow:false};
  function panelRealm(main){
    var p=(DATA.panels||{}).realm;
    if(!p||!p.stats){ main.appendChild(noData("Player outcome ranges are not available right now.")); return; }
    var head=el("div","card");
    head.appendChild(el("h2",null,"Player realm of outcomes"));
    head.appendChild(el("div","note","Each player's projected number for the next game, with the range of realistic outcomes around it — drawn from how far their real results have landed from projection this season. The wider (light) band is the 90% range; the solid band is the central range; the tick is the projection. Not a probability the player hits the number — a picture of the spread."));
    var af=el("span","asof"); af.textContent="  As of "+esc(p.as_of)+"."; head.querySelector(".note").appendChild(af);
    main.appendChild(head);

    var stats=Object.keys(p.stats);
    if(RSTATE.stat && stats.indexOf(RSTATE.stat)<0){ RSTATE.stat=stats[0]; }
    var teams={}; (p.stats[RSTATE.stat]||[]).forEach(function(r){ teams[r.team]=1; });
    var filt=el("div","filters");
    filt.appendChild(selLabel("Stat", stats.map(function(s){return [s,s];}), RSTATE.stat, function(v){ RSTATE.stat=v; RSTATE.team=""; render(); }));
    var allTeams=Object.keys(teams).sort();
    filt.appendChild(selLabel("Team", [["","all teams"]].concat(allTeams.map(function(t){return [t,t];})), RSTATE.team, function(v){ RSTATE.team=v; render(); }));
    var chkL=el("label"); chkL.style.flexDirection="row"; chkL.style.alignItems="center"; chkL.style.gap="5px";
    var chk=el("input"); chk.type="checkbox"; chk.style.width="auto"; chk.checked=RSTATE.hideLow;
    chk.onchange=function(){ RSTATE.hideLow=chk.checked; render(); };
    chkL.appendChild(chk); chkL.appendChild(document.createTextNode("hide low-confidence"));
    filt.appendChild(chkL);
    main.appendChild(filt);

    var rows=(p.stats[RSTATE.stat]||[]).filter(function(r){
      if(RSTATE.team && r.team!==RSTATE.team) return false;
      if(RSTATE.hideLow && r.low_conf) return false;
      return true;
    });
    if(!rows.length){ main.appendChild(noData("No players match those filters.")); return; }
    var hi=0; rows.forEach(function(r){ var v=Math.max(r.hi90||0,r.point||0); if(v>hi)hi=v; }); hi=hi||1;
    var card=el("div","card scroll");
    var lowN=rows.filter(function(r){return r.low_conf;}).length;
    card.appendChild(el("div","note",rows.length+" players · "+RSTATE.stat+" · bar shows the 90% range (light), central range (solid) and projection (tick). "+lowN+" low-confidence."));
    var tbl=el("table");
    tbl.innerHTML="<thead><tr><th>Player</th><th>Team</th><th>Opp</th><th>Basis</th><th>Projection</th><th>Central range</th><th>90% range</th><th>Range</th><th>Sample</th></tr></thead>";
    var tb=el("tbody");
    rows.forEach(function(r){
      var tr=el("tr");
      var nm=r.name+(r.status?" ("+r.status+")":"");
      tr.appendChild(td(nm,"l"));
      tr.appendChild(td(r.team,"l"));
      tr.appendChild(td((r.home?"vs ":"@ ")+r.opp,"l dim"));
      tr.appendChild(td(r.basis,"l"));
      tr.appendChild(td(fmt(r.point,1)));
      tr.appendChild(td(fmt(r.lo,1)+" … "+fmt(r.hi,1),"dim"));
      tr.appendChild(td(fmt(r.lo90,1)+" … "+fmt(r.hi90,1),"dim"));
      var bcell=el("td"); bcell.style.textAlign="left"; bcell.appendChild(rangeBar(r,hi)); tr.appendChild(bcell);
      tr.appendChild(td((r.n==null?"—":r.n)+(r.low_conf?" ⚠":""),r.low_conf?"warn":"dim"));
      tb.appendChild(tr);
    });
    tbl.appendChild(tb); card.appendChild(tbl); main.appendChild(card);
  }
  function rangeBar(r,hi){
    function bx(v){ return v==null?null:Math.max(0,Math.min(100,v/hi*100)); }
    var l90=bx(r.lo90),h90=bx(r.hi90),lc=bx(r.lo),hc=bx(r.hi),pp=bx(r.point);
    var w=el("div","barwrap"); w.style.width="130px";
    if(l90!=null&&h90!=null){ var a=el("div"); a.style.cssText="position:absolute;left:"+l90.toFixed(1)+"%;width:"+(h90-l90).toFixed(1)+"%;top:4px;height:6px;background:var(--line2);border-radius:3px"; w.appendChild(a); }
    if(lc!=null&&hc!=null){ var b=el("div"); b.style.cssText="position:absolute;left:"+lc.toFixed(1)+"%;width:"+(hc-lc).toFixed(1)+"%;top:3px;height:8px;background:"+(r.low_conf?"var(--warn)":"var(--acc)")+";border-radius:3px"; w.appendChild(b); }
    if(pp!=null){ var c=el("div"); c.style.cssText="position:absolute;left:"+pp.toFixed(1)+"%;top:1px;width:3px;height:12px;background:var(--good);transform:translateX(-1px)"; w.appendChild(c); }
    return w;
  }

  /* ---------- Model Scorecard ---------- */
  function panelScorecard(main){
    var p=(DATA.panels||{}).scorecard;
    if(!p){ main.appendChild(noData("The model scorecard is not available right now.")); return; }
    var head=el("div","card");
    head.appendChild(el("h2",null,"Model scorecard"));
    head.appendChild(el("div","note","How the projections are actually doing — the average miss on each player stat, the biggest recent misses, what those misses tend to line up with, and how the season-scale model components are grading out."));
    main.appendChild(head);

    if(p.accuracy_by_stat && p.accuracy_by_stat.length){
      var c=el("div","card");
      c.appendChild(el("h2",null,"Average miss by stat"));
      c.appendChild(el("div","note","How far off the projection is, on average, per player per game (lower is better)."));
      var t=el("table"); t.innerHTML="<thead><tr><th>Stat</th><th>Graded</th><th>Avg miss</th></tr></thead>";
      var tb=el("tbody");
      p.accuracy_by_stat.forEach(function(r){ var tr=el("tr"); tr.appendChild(td(r.stat,"l")); tr.appendChild(td(String(r.n))); tr.appendChild(td(fmt(r.avg_miss,2))); tb.appendChild(tr); });
      t.appendChild(tb); c.appendChild(t); main.appendChild(c);
    }
    if(p.components && p.components.length){
      var cc=el("div","card");
      cc.appendChild(el("h2",null,"Component check"));
      cc.appendChild(el("div","note","Season-scale reads on the pieces behind the models — each tested against the current production number."));
      var grid=el("div","grid"); grid.style.gridTemplateColumns="repeat(auto-fit,minmax(210px,1fr))";
      p.components.forEach(function(m){
        var k=el("div","kv");
        k.appendChild(el("div","k",m.name));
        var vv=el("div","v");
        if(m.value!=null && m.baseline!=null){ vv.textContent=fmt(m.value,2)+" vs "+fmt(m.baseline,2); }
        else if(m.ok!=null){ vv.textContent=m.ok+" of "+(m.ok+m.miss)+" on target"; }
        else if(m.value!=null){ vv.textContent=sgn(m.value,3); }
        else { vv.textContent="—"; }
        k.appendChild(vv);
        var vd=el("div","k"); vd.className="k "+verdictClass(m.verdict); vd.textContent=m.verdict; k.appendChild(vd);
        if(m.detail){ var dt=el("div","note",m.detail); k.appendChild(dt); }
        grid.appendChild(k);
      });
      cc.appendChild(grid); main.appendChild(cc);
    }
    if(p.miss_factors && p.miss_factors.length){
      var mf=el("div","card scroll");
      mf.appendChild(el("h2",null,"What misses line up with"));
      mf.appendChild(el("div","note","Game conditions that correlate with bigger misses. Correlational, not causal — a lead for where to look next."));
      var t2=el("table"); t2.innerHTML="<thead><tr><th>Stat</th><th>Factor</th><th>Direction</th><th>Strength</th><th>Games</th><th>Signal</th></tr></thead>";
      var tb2=el("tbody");
      p.miss_factors.forEach(function(r){
        var tr=el("tr");
        tr.appendChild(td(r.stat,"l")); tr.appendChild(td(r.factor,"l")); tr.appendChild(td(r.direction,"l dim"));
        tr.appendChild(td(fmt(r.strength,2))); tr.appendChild(td(r.n==null?"—":String(r.n)));
        tr.appendChild(td(r.significant?"notable":"weak", r.significant?"warn":"dim"));
        tb2.appendChild(tr);
      });
      t2.appendChild(tb2); mf.appendChild(t2); main.appendChild(mf);
    }
    if(p.recent_misses && p.recent_misses.rows && p.recent_misses.rows.length){
      var rm=el("div","card scroll");
      rm.appendChild(el("h2",null,"Biggest recent misses"));
      rm.appendChild(el("div","note","The largest projection misses on the latest graded day ("+esc(p.recent_misses.as_of)+")."));
      var t3=el("table"); t3.innerHTML="<thead><tr><th>Player</th><th>Stat</th><th>Projected</th><th>Actual</th><th>Miss</th></tr></thead>";
      var tb3=el("tbody");
      p.recent_misses.rows.forEach(function(r){ var tr=el("tr"); tr.appendChild(td(r.player,"l")); tr.appendChild(td(r.stat,"l")); tr.appendChild(td(fmt(r.pred,1))); tr.appendChild(td(fmt(r.actual,1))); tr.appendChild(td(fmt(r.miss,1),"warn")); tb3.appendChild(tr); });
      t3.appendChild(tb3); rm.appendChild(t3); main.appendChild(rm);
    }
  }
  function verdictClass(v){ v=(v||"").toLowerCase(); if(v.indexOf("well")>=0||v.indexOf("help")>=0||v.indexOf("track")>=0) return "good"; if(v.indexOf("no ")>=0||v.indexOf("under")>=0) return "warn"; return "dim"; }

  /* ---------- Rookie Priors ---------- */
  function panelRookies(main){
    var p=(DATA.panels||{}).rookies;
    if(!p){ main.appendChild(noData("Rookie priors are not available right now.")); return; }
    var head=el("div","card");
    head.appendChild(el("h2",null,"Rookie cold-start priors"));
    head.appendChild(el("div","note","Before a rookie plays a game, what impact should we expect from their listed position? A starting-point estimate shrunk toward the league rookie average — a cold-start prior, not a projection. Values are signed impact offsets, not points."));
    main.appendChild(head);
    if(p.positions && p.positions.length){
      var c=el("div","card scroll");
      c.appendChild(el("h2",null,"By position"));
      var t=el("table"); t.innerHTML="<thead><tr><th>Position</th><th>Rookies</th><th>Prior</th><th>Raw</th><th>Spread</th></tr></thead>";
      var tb=el("tbody");
      p.positions.forEach(function(r){ var tr=el("tr"); tr.appendChild(td(r.position,"l")); tr.appendChild(td(r.n==null?"—":String(r.n))); tr.appendChild(td(sgn(r.prior,4))); tr.appendChild(td(sgn(r.raw,4),"dim")); tr.appendChild(td(r.sd==null?"—":fmt(r.sd,4),"dim")); tb.appendChild(tr); });
      t.appendChild(tb); c.appendChild(t); main.appendChild(c);
    }
    if(p.draft && p.draft.length){
      var c2=el("div","card scroll");
      c2.appendChild(el("h2",null,"2026 draft class"));
      var t2=el("table"); t2.innerHTML="<thead><tr><th>Pick</th><th>Player</th><th>Position</th><th>Prior</th></tr></thead>";
      var tb2=el("tbody");
      p.draft.forEach(function(r){ var tr=el("tr"); tr.appendChild(td(r.pick==null?"—":String(r.pick),"l")); tr.appendChild(td(r.player,"l")); tr.appendChild(td(r.position||"—","l dim")); tr.appendChild(td(sgn(r.prior,4))); tb2.appendChild(tr); });
      t2.appendChild(tb2); c2.appendChild(t2); main.appendChild(c2);
    }
  }

  /* ---------- Team Styles ---------- */
  function panelStyles(main){
    var p=(DATA.panels||{}).styles;
    if(!p||!p.games||!p.games.length){ main.appendChild(noData("Team style profiles are not available right now.")); return; }
    var head=el("div","card");
    head.appendChild(el("h2",null,"Team style profiles"));
    var nt=el("div","note","How each team plays, from its current rotation, shown as league ranking (0–100; higher means more of that trait). Style, not a prediction — the matchup note is a descriptive read of the two styles, never a projected result.");
    var af=el("span","asof"); af.textContent="  As of "+esc(p.as_of)+"."; nt.appendChild(af);
    head.appendChild(nt); main.appendChild(head);
    var row=el("div","row");
    p.games.forEach(function(g){
      var c=el("div","gcard");
      var names=g.teams.map(function(t){ return t.team+" ("+t.side+")"; }).join(" · ");
      var gt=el("div","gtitle"); var b=el("b"); b.textContent=names; gt.appendChild(b); gt.appendChild(el("span","pill","style, not a prediction")); c.appendChild(gt);
      g.teams.forEach(function(t){
        var hdr=el("div"); hdr.style.margin="8px 0 4px";
        var tb=el("b"); tb.textContent=t.team; hdr.appendChild(tb);
        var dm=el("span","dim"); dm.style.fontSize="11px"; dm.textContent="  "+t.side+" · "+(t.rotation==null?"":t.rotation+"-deep rotation"); hdr.appendChild(dm);
        (t.badges||[]).forEach(function(bd){ var pl=el("span","pill",bd); pl.style.marginLeft="5px"; pl.style.color="var(--acc)"; hdr.appendChild(pl); });
        c.appendChild(hdr);
        (t.dials||[]).forEach(function(d){
          var br=el("div","barrow");
          br.appendChild(el("div","lab",d.label));
          var pct=d.pct==null?0:Math.max(0,Math.min(100,d.pct));
          var bar=el("div","dial"); bar.style.width=pct.toFixed(0)+"%";
          bar.style.background = pct>=66?"var(--good)":pct>=33?"var(--acc)":"var(--line2)";
          br.appendChild(bar);
          var lb=el("span","dim"); lb.style.fontSize="11px"; lb.textContent=(d.pct==null?"—":Math.round(d.pct)+"%"); br.appendChild(lb);
          c.appendChild(br);
        });
      });
      if(g.hook){ var hk=el("div","note"); hk.style.marginTop="8px"; hk.style.color="var(--muted)"; hk.textContent="Matchup: "+g.hook; c.appendChild(hk); }
      row.appendChild(c);
    });
    main.appendChild(row);
  }

  /* ---------- shared render + helpers ---------- */
  function kv(k,v,vcls){ var d=el("div","kv"); d.appendChild(el("div","k",k)); var vv=el("div","v "+(vcls||"")); vv.textContent=v; d.appendChild(vv); return d; }
  function td(x,cls){ var e=el("td",null,x); if(cls){ if(cls.indexOf("l")>=0)e.style.textAlign="left"; if(cls.indexOf("dim")>=0)e.classList.add("dim"); if(cls.indexOf("warn")>=0)e.classList.add("warn"); if(cls.indexOf("good")>=0)e.classList.add("good"); } return e; }
  function noData(msg){ var d=el("div","card"); d.appendChild(el("p","empty",msg)); return d; }
  function selLabel(label,opts,cur,cb){
    var l=el("label",null,label); var s=el("select");
    opts.forEach(function(o){ var op=el("option",null,o[1]); op.value=o[0]; if(o[0]===cur)op.selected=true; s.appendChild(op); });
    s.onchange=function(){ cb(s.value); }; l.appendChild(s); return l;
  }
  function render(){
    var main=document.getElementById("main"); main.innerHTML="";
    main.appendChild(el("p","lede","This is the deep view: every current model number, browsable. Pick a section below. Everything here is read-only and refreshes automatically."));
    main.appendChild(tabBar());
    if(!DATA || !DATA.panels){ main.appendChild(noData("Loading the current data…")); return; }
    if(!DATA.available){ main.appendChild(noData("The explorer data is being rebuilt — check back shortly.")); return; }
    if(CUR==="games") panelGames(main);
    else if(CUR==="realm") panelRealm(main);
    else if(CUR==="scorecard") panelScorecard(main);
    else if(CUR==="rookies") panelRookies(main);
    else if(CUR==="styles") panelStyles(main);
    document.getElementById("foot").textContent="Refreshed "+(DATA.generated_et||"")+".";
  }
  var lastFetch=0;
  function updAgo(){ var a=document.getElementById("ago"); if(!a)return; if(!lastFetch){ a.innerHTML=""; return; }
    var s=Math.max(0,Math.round((Date.now()-lastFetch)/1000));
    a.innerHTML="live · updated <b>"+(s<60?(s+"s ago"):(Math.floor(s/60)+"m ago"))+"</b>"; }
  function poll(){ fetch("./explorer.json",{cache:"no-cache"}).then(function(r){ return r.json(); })
    .then(function(d){ DATA=d; lastFetch=Date.now(); render(); updAgo(); })
    .catch(function(e){ if(!lastFetch){ document.getElementById("main").innerHTML='<p class="empty">Could not load the explorer data. '+(e&&e.message?e.message:"")+'</p>'; } }); }
  poll(); setInterval(poll,300000); setInterval(updAgo,1000);
})();
</script>
</body>
</html>
