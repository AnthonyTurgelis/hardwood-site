<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — What's Next</title>
<style>
  :root{ --bg:#f4f6f8; --card:#fff; --card2:#f7f9fc; --ink:#161a21; --muted:#5a6675; --dim:#8a93a3;
    --line:#e3e7ee; --line2:#d3d9e3; --acc:#2b6cb0; --ok:#2f855a; --warn:#b7791f; --shadow:0 1px 2px rgba(20,24,35,.06); }
  @media (prefers-color-scheme:dark){ :root{ --bg:#0d1117; --card:#161b22; --card2:#1c2330; --ink:#e6edf3;
    --muted:#9aa7b4; --dim:#6b7684; --line:#242c38; --line2:#39424f; --acc:#58a6ff; --ok:#56d364; --warn:#e3b341; --shadow:none; } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13.5px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  header{padding:10px 14px 4px;max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:17px;margin:0}
  .ago{font-size:11px;color:var(--dim);white-space:nowrap}
  .sub{color:var(--muted);font-size:12px;max-width:1080px;margin:0 auto;padding:0 14px}
  nav{display:flex;gap:5px;flex-wrap:wrap;max-width:1080px;margin:6px auto 0;padding:0 14px}
  nav a{font-size:12px;text-decoration:none;color:var(--acc);border:1px solid var(--line);background:var(--card);padding:4px 10px;border-radius:999px}
  nav a.active{background:var(--acc);color:#fff;border-color:var(--acc)}
  main{max-width:1080px;margin:0 auto;padding:8px 14px 48px}
  .lede{color:var(--muted);font-size:12.5px;margin:8px 0 12px;max-width:820px}
  .floor{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:9px;box-shadow:var(--shadow);padding:9px 12px;margin:0 0 14px;font-size:12.5px}
  .floor .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .floor.ok .dot{background:var(--ok)} .floor.short .dot{background:var(--warn)}
  .floor .mark{margin-left:auto;font-weight:700}
  .floor.ok .mark{color:var(--ok)} .floor.short .mark{color:var(--warn)}
  ol.q{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  li.item{background:var(--card);border:1px solid var(--line);border-radius:9px;box-shadow:var(--shadow);padding:10px 12px;display:grid;grid-template-columns:36px 1fr auto;gap:10px;align-items:start}
  li.item.exp{border-style:dashed;background:var(--card2)}
  .rank{font-weight:800;font-size:15px;color:var(--acc);text-align:center;line-height:1.3}
  .body .title{font-weight:680;font-size:13.5px}
  .body .why{color:var(--muted);font-size:12.5px;margin-top:3px;line-height:1.45}
  .body .fam{color:var(--dim);font-size:11px;margin-top:5px;text-transform:uppercase;letter-spacing:.04em}
  .body .expchip{display:inline-block;margin-top:6px;font-size:11px;color:var(--warn);border:1px solid var(--warn);border-radius:999px;padding:1px 8px}
  .body .impactchip{display:inline-block;margin-top:6px;margin-right:6px;font-size:11px;color:var(--ok);border:1px solid var(--ok);border-radius:999px;padding:1px 8px;font-weight:700;}
  .score{text-align:right;white-space:nowrap}
  .score .n{font-weight:800;font-size:15px}
  .score .l{display:block;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
  .empty{color:var(--dim);font-style:italic}
  footer{max-width:1080px;margin:0 auto;padding:16px 14px;color:var(--dim);font-size:11px}
</style>
<link rel="stylesheet" href="./hardwood.css">
</head>
<body>
<header>
  <h1>The Hardwood — What's Next</h1>
  <span class="ago" id="ago"></span>
</header>
<div class="sub">The work queue, in priority order — highest-value first.</div>
<nav>
  <a href="./index.html">Board</a>
  <a class="active" href="./queue.html">What's Next</a>
  <a href="./games.html">Games</a>
  <a href="./teams.html">Teams</a>
  <a href="./players.html">Players</a>
  <a href="./review.html">Daily Review</a>
  <a href="./accuracy.html">Our Accuracy</a>
  <a href="./ledger.html">Error Map</a>
  <a href="./org.html">The Team</a>
  <a href="./scouting.html">Scouting</a>
  <a href="./deepdive.html">Deep Dives</a>
</nav>
<main id="main"><p class="empty">Loading…</p></main>
<footer id="foot"></footer>
<script src="./hardwood.js"></script>
<script>
(function(){
  "use strict";
  function el(t,c,x){ var e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; }
  function render(d){
    var main=document.getElementById("main"); main.innerHTML="";
    if(d.intro){ main.appendChild(el("p","lede",d.intro)); }
    var f=d.floor;
    if(f && (f.label||f.count!=null)){
      var fl=el("div","floor "+(f.ok?"ok":"short"));
      fl.appendChild(el("span","dot"));
      fl.appendChild(el("span",null,f.label||("Queue: "+f.count+" open, floor "+f.target)));
      fl.appendChild(el("span","mark",f.ok?"on track":"low"));
      main.appendChild(fl);
    }
    var items=d.items||[];
    if(!items.length){ main.appendChild(el("p","empty","The queue is being rebuilt — check back shortly.")); }
    else{
      var ol=el("ol","q");
      items.forEach(function(it){
        var li=el("li","item"+(it.exploratory?" exp":""));
        li.appendChild(el("div","rank","#"+it.rank));
        var b=el("div","body");
        b.appendChild(el("div","title",it.title||""));
        if(it.one_liner){ b.appendChild(el("div","why",it.one_liner)); }
        if(it.family){ b.appendChild(el("div","fam",it.family)); }
        if(it.impact){ b.appendChild(el("span","impactchip",it.impact)); }
        if(it.exploratory && it.tag){ b.appendChild(el("span","expchip",it.tag)); }
        li.appendChild(b);
        if(it.score!=null){
          var s=el("div","score");
          s.appendChild(el("span","n",String(it.score)));
          s.appendChild(el("span","l","priority"));
          li.appendChild(s);
        }
        ol.appendChild(li);
      });
      main.appendChild(ol);
    }
    document.getElementById("foot").textContent="Baked "+(d.generated_et||d.generated_utc||"")+".";
  }
  var lastFetch=0;
  function updAgo(){ var a=document.getElementById("ago"); if(!a)return;
    if(!lastFetch){ a.innerHTML=""; return; }
    var s=Math.max(0,Math.round((Date.now()-lastFetch)/1000));
    a.innerHTML="live · updated <b>"+(s<60?(s+"s ago"):(Math.floor(s/60)+"m ago"))+"</b>"; }
  function poll(){ fetch("./queue.json",{cache:"no-cache"}).then(function(r){ return r.json(); })
    .then(function(d){ lastFetch=Date.now(); render(d); updAgo(); })
    .catch(function(e){ if(!lastFetch){ document.getElementById("main").innerHTML='<p class="empty">Could not load. '+(e&&e.message?e.message:"")+'</p>'; } }); }
  poll(); setInterval(poll,300000); setInterval(updAgo,1000);
})();
</script>
</body>
</html>
