<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — Game</title>
<style>
  :root{ --bg:#f4f6f8; --card:#fff; --card2:#f7f9fc; --ink:#161a21; --muted:#5a6675; --dim:#8a93a3;
    --line:#e3e7ee; --line2:#d3d9e3; --acc:#2b6cb0; --good:#1f883d; --bad:#c62828; --warn:#9a6700;
    --home:#2b6cb0; --shadow:0 1px 2px rgba(20,24,35,.06); }
  @media (prefers-color-scheme:dark){ :root{ --bg:#0d1117; --card:#161b22; --card2:#1c2330; --ink:#e6edf3;
    --muted:#9aa7b4; --dim:#6b7684; --line:#242c38; --line2:#39424f; --acc:#58a6ff; --good:#3fb950; --bad:#ff7b72;
    --warn:#d29922; --home:#58a6ff; --shadow:none; } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13.5px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  header{padding:10px 14px 4px;max-width:900px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:17px;margin:0}
  .ago{font-size:11px;color:var(--dim)}
  nav{display:flex;gap:5px;flex-wrap:wrap;max-width:900px;margin:6px auto 0;padding:0 14px}
  nav a{font-size:12px;text-decoration:none;color:var(--acc);border:1px solid var(--line);background:var(--card);padding:4px 10px;border-radius:999px}
  nav a.active{background:var(--acc);color:#fff;border-color:var(--acc)}
  main{max-width:900px;margin:0 auto;padding:8px 14px 48px}
  .back{font-size:12px;color:var(--acc);text-decoration:none;display:inline-block;margin:4px 0 8px}
  .hero{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 15px;box-shadow:var(--shadow);margin-bottom:12px}
  .hero .mu{font-size:20px;font-weight:720}
  .hero .call{font-size:14px;font-weight:640;color:var(--acc);margin-top:5px}
  .hero .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:16px 0 8px;font-weight:700}
  .fac{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:10px 13px;box-shadow:var(--shadow);margin-bottom:7px}
  .fac .fl{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .fac .fn{font-weight:640;font-size:13px}
  .fac .fv{font-weight:700;font-size:14px;color:var(--acc);font-variant-numeric:tabular-nums;white-space:nowrap}
  .fac .fd{color:var(--muted);font-size:11.5px;margin-top:2px}
  .empty{color:var(--dim);font-style:italic}
  .note{font-size:10.5px;color:var(--dim);margin-top:8px;line-height:1.5}
  footer{max-width:900px;margin:0 auto;padding:16px 14px;color:var(--dim);font-size:11px}
  .ctx{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 13px;box-shadow:var(--shadow);margin-bottom:6px;font-size:12.5px}
  .ctx b{color:var(--ink)}
  .fv{background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:11px 13px;box-shadow:var(--shadow);margin-bottom:7px}
  .fv table{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums}
  .fv th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:3px 6px}
  .fv td{padding:4px 6px;border-top:1px solid var(--line)}
  .fv td.ours{color:var(--acc);font-weight:700}
  .fv .gap{color:var(--muted);font-size:11px}
  .fv .pend{color:var(--dim);font-style:italic;font-size:11.5px}
  .boxwrap{overflow-x:auto;margin-bottom:8px}
  table.box{width:100%;border-collapse:collapse;font-size:12.5px;font-variant-numeric:tabular-nums;background:var(--card);border:1px solid var(--line);border-radius:9px;overflow:hidden}
  table.box caption{caption-side:top;text-align:left;font-weight:700;font-size:13px;padding:8px 11px 5px;color:var(--ink)}
  table.box th{text-align:right;color:var(--muted);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;padding:4px 9px;background:var(--card2)}
  table.box th.pl{text-align:left}
  table.box td{padding:4px 9px;text-align:right;border-top:1px solid var(--line)}
  table.box td.pl{text-align:left}
  table.box tr.grp td{color:var(--dim);font-style:italic}
  table.box td.prov{color:var(--muted)}
  .provtag{display:inline-block;font-size:8.5px;font-weight:700;color:var(--warn);border:1px solid var(--warn);border-radius:999px;padding:0 5px;margin-left:5px;vertical-align:middle;text-transform:uppercase;letter-spacing:.02em}
  .minpct{color:var(--dim);font-size:11px}
  .tag{display:inline-block;font-size:10.5px;padding:1px 7px;border-radius:999px;border:1px solid var(--line2);color:var(--muted);margin:2px 4px 0 0}
  .gtd{color:var(--warn);font-size:10px;font-weight:700;margin-left:4px}
  .av{font-size:12px;margin-bottom:3px}
  .av .out{color:var(--bad);font-weight:640}
  .av .dtd{color:var(--warn);font-weight:640}
  .pdf{display:inline-block;margin:6px 0 2px;font-size:12.5px;color:var(--acc);text-decoration:none;border:1px solid var(--line);background:var(--card);padding:5px 12px;border-radius:999px}
  .sub2{color:var(--muted);font-size:11.5px;margin:2px 0 8px}
  /* Early Word -- deliberately distinct from the official availability tile: a light dashed
     "rumor" card so it never reads as a confirmed call. Non-suppressing; renders only with data. */
  .eword{background:var(--card2);border:1px dashed var(--line2);border-radius:9px;padding:10px 13px;margin-bottom:7px}
  .eword .ehd{margin-bottom:7px}
  .eword .echip{display:inline-block;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--warn);border:1px solid var(--warn);border-radius:999px;padding:1px 8px}
  .eword .erow{padding:7px 0;border-top:1px solid var(--line)}
  .eword .erow:first-of-type{border-top:none}
  .eword .ep{font-weight:640;font-size:12.5px}
  .eword .es{color:var(--muted);font-size:12.5px}
  .eword .elab{color:var(--dim);font-size:10.5px;font-style:italic;margin-top:2px}
  .eword .esrc{display:inline-block;font-size:11px;margin-top:3px}
  .eword .edis{color:var(--muted);font-size:10.5px;line-height:1.5;margin-top:7px;padding-top:6px;border-top:1px solid var(--line)}
  .eword .empty2{color:var(--dim);font-style:italic;font-size:11.5px}
</style>
<link rel="stylesheet" href="./hardwood.css">
</head>
<body>
<header>
  <h1>The Hardwood — Game</h1>
  <span class="ago" id="ago"></span>
</header>
<nav>
  <a href="./index.html">Board</a>
  <a href="./queue.html">What's Next</a>
  <a class="active" href="./games.html">Games</a>
  <a href="./availability.html">Injuries</a>
  <a href="./teams.html">Teams</a>
  <a href="./coach.html">Coach</a>
  <a href="./gm.html">GM</a>
  <a href="./players.html">Players</a>
  <a href="./situation.html">Situations</a>
  <a href="./review.html">Daily Review</a>
  <a href="./accuracy.html">Our Accuracy</a>
  <a href="./ledger.html">Error Map</a>
  <a href="./org.html">The Team</a>
  <a href="./scouting.html">Scouting</a>
  <a href="./deepdive.html">Deep Dives</a>
  <a href="./primer.html">Learn</a>
</nav>
<main id="main"><p class="empty">Loading game…</p></main>
<footer id="foot"></footer>
<script src="./hardwood.js"></script>
<script>
(function(){
  "use strict";
  function el(t,c,x){ var e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; }
  function qid(){ var m=/[?&]id=([^&]+)/.exec(location.search); return m?decodeURIComponent(m[1]):null; }
  function safeId(s){ return (s||"").replace(/[^A-Za-z0-9_-]/g,""); }

  function num(x){ return x==null ? "—" : x; }

  function ctxCard(d){
    var c=d.context||{}; if(!c.home && !c.away) return null;
    var box=el("div","ctx");
    [c.away, c.home].forEach(function(line){
      if(line){ var p=el("div"); p.innerHTML="<b>"+esc(line.split(" — ")[0])+"</b> — "+esc(line.split(" — ").slice(1).join(" — ")); box.appendChild(p); }
    });
    return box;
  }
  function esc(s){ var e=el("span"); e.textContent=s==null?"":s; return e.innerHTML; }

  function fairCard(d){
    var f=d.fair_value; if(!f || (f.our_spread==null && f.our_total==null)) return null;
    var wrap=el("div","fv");
    var t=el("table");
    var head=el("tr"); ["","Our fair number","Market","Gap"].forEach(function(h){ head.appendChild(el("th",null,h)); });
    t.appendChild(head);
    function row(label, ours, mkt, gap){
      var tr=el("tr");
      tr.appendChild(el("td",null,label));
      tr.appendChild(el("td","ours", ours==null?"—":String(ours)));
      tr.appendChild(el("td",null, f.market_pending ? "pending" : (mkt==null?"—":String(mkt))));
      var g=el("td","gap"); g.textContent = (f.market_pending||gap==null) ? "" : (gap>0?"+"+gap:String(gap)); tr.appendChild(g);
      t.appendChild(tr);
    }
    row("Spread", f.our_spread, f.market_spread, f.spread_delta);
    row("Total",  f.our_total,  f.market_total,  f.total_delta);
    wrap.appendChild(t);
    if(f.market_pending) wrap.appendChild(el("div","pend","Market line not yet captured for this game — our fair number shown alone."));
    return wrap;
  }

  function boxTable(title, rows){
    var wrap=el("div","boxwrap");
    var t=el("table","box");
    var cap=el("caption",null,title); t.appendChild(cap);
    var head=el("tr");
    var h0=el("th","pl","Player"); head.appendChild(h0);
    ["Impact","Min","Pts","Reb","Ast"].forEach(function(h){ head.appendChild(el("th",null,h)); });
    t.appendChild(head);
    (rows||[]).forEach(function(r){
      var tr=el("tr"); if(r.grouped) tr.className="grp";
      var nm=el("td","pl"); nm.textContent=r.name;
      if(r.gtd){ var g=el("span","gtd","GTD"); nm.appendChild(g); }
      tr.appendChild(nm);
      // impact column first — matches the printed report's box row order. A thin-basis rating is
      // muted + tagged "prov" (provisional) so a firm-looking number never masks a thin basis (Order 2).
      var impTd=el("td",null);
      if(r.impact==null){ impTd.textContent="—"; }
      else {
        impTd.textContent=(r.impact>0?"+":"")+r.impact.toFixed(1);
        if(r.impact_provisional){ impTd.className="prov"; var pt=el("span","provtag","prov"); pt.title="Provisional — rests on a thin on-court sample."; impTd.appendChild(pt); }
      }
      tr.appendChild(impTd);
      // Min carries the %-of-a-40-minute-game flag so thin-vs-real minutes read at a glance by impact.
      var minTd=el("td",null);
      if(r.min==null){ minTd.textContent="—"; }
      else { minTd.appendChild(document.createTextNode(r.min)); if(r.min_pct!=null){ minTd.appendChild(el("span","minpct"," ("+r.min_pct+"%)")); } }
      tr.appendChild(minTd);
      ["pts","reb","ast"].forEach(function(k){ tr.appendChild(el("td",null, r[k]==null?"—":r[k])); });
      t.appendChild(tr);
    });
    if(!(rows||[]).length) { var tr=el("tr"); var td=el("td","pl","No projected box available."); td.colSpan=6; tr.appendChild(td); t.appendChild(tr); }
    wrap.appendChild(t);
    return wrap;
  }

  function availLine(label, badges){
    if(!badges || !badges.length) return null;
    var d=el("div","av");
    d.appendChild(el("span",null,label+": "));
    badges.forEach(function(b,i){
      var cls=(b.status==="Out")?"out":"dtd";
      var s=el("span",cls, b.name+" ("+b.status+(b["return"]?", back "+b["return"]:"")+")");
      d.appendChild(s);
      if(i<badges.length-1) d.appendChild(el("span",null,", "));
    });
    return d;
  }

  function styleTags(d){
    var st=d.style; if(!st) return null;
    var any=(st.home&&st.home.length)||(st.away&&st.away.length)||st.hook;
    if(!any) return null;
    var box=el("div");
    if(st.hook) box.appendChild(el("div","sub2", st.hook));
    [[d.away,st.away],[d.home,st.home]].forEach(function(pair){
      if(pair[1]&&pair[1].length){
        var row=el("div"); row.appendChild(el("span","fn",pair[0]+" "));
        pair[1].forEach(function(tg){ row.appendChild(el("span","tag",tg)); });
        box.appendChild(row);
      }
    });
    box.appendChild(el("div","note", st.note||"style, not prediction"));
    return box;
  }

  // EARLY WORD -- unofficial, non-suppressing social lead for tonight's slate teams, read from
  // ./early_warning.json. Rendered as a light "rumor" strip, visually distinct from the official
  // availability tile; it NEVER gates a prediction. Filtered to this game's two teams. Renders the
  // muted empty note only when the game is on tonight's slate; otherwise nothing.
  var EW=null, curGame=null;
  function earlyWordSection(){
    if(!EW || !curGame) return null;
    var d=curGame, card=EW.card||{};
    var teams=[d.home,d.away].filter(Boolean);
    var sig=(EW.signals||[]).filter(function(s){ return s && teams.indexOf(s.team)>=0; });
    var inSlate=(EW.slate_teams||[]).some(function(t){ return teams.indexOf(t)>=0; });
    if(!sig.length && !inSlate) return null;   // not relevant to this game -> render nothing
    var sec=el("section"); sec.id="earlyword";
    sec.appendChild(el("h2",null, card.title||"Early Word"));
    var box=el("div","eword");
    if(sig.length){
      var hd=el("div","ehd"); hd.appendChild(el("span","echip","Unofficial")); box.appendChild(hd);
      sig.forEach(function(s){
        var row=el("div","erow");
        var head=el("div");
        head.appendChild(el("span","ep", (s.player||"")+(s.team?(" ("+s.team+")"):"")));
        if(s.signal) head.appendChild(el("span","es"," - "+s.signal));
        row.appendChild(head);
        if(s.label) row.appendChild(el("div","elab", s.label));
        if(s.source_url){ var a=el("a","esrc","source"); a.href=s.source_url; a.target="_blank"; a.rel="noopener noreferrer"; row.appendChild(a); }
        box.appendChild(row);
      });
      if(card.disclaimer) box.appendChild(el("div","edis", card.disclaimer));
    } else {
      box.appendChild(el("div","empty2", card.empty_note||"No early word for tonight's slate teams."));
    }
    sec.appendChild(box);
    return sec;
  }
  function insertEarlyWord(){
    var old=document.getElementById("earlyword"); if(old && old.parentNode) old.parentNode.removeChild(old);
    var sec=earlyWordSection(); if(!sec) return;
    var hero=document.querySelector("#main .hero");
    if(hero && hero.parentNode){ hero.parentNode.insertBefore(sec, hero.nextSibling); }
    else { var main=document.getElementById("main"); if(main) main.appendChild(sec); }
  }

  function render(d){
    curGame=d;
    var main=document.getElementById("main"); main.innerHTML="";
    var back=el("a","back","← Back to all games"); back.href="./games.html"; main.appendChild(back);
    var hero=el("div","hero");
    hero.appendChild(el("div","mu", (d.away_full||d.away)+" @ "+(d.home_full||d.home)));
    hero.appendChild(el("div","call","Our call: "+(d.call||"—")));
    hero.appendChild(el("div","sub", d.date||""));
    main.appendChild(hero);

    // CONTEXT + FAIR VALUE (front-office layer)
    var cx=ctxCard(d); if(cx){ var cs=el("section"); cs.appendChild(el("h2",null,"Setup")); cs.appendChild(cx); main.appendChild(cs); }
    var fv=fairCard(d); if(fv){ var fs=el("section"); fs.appendChild(el("h2",null,"Our fair number vs the market")); fs.appendChild(fv); main.appendChild(fs); }

    // MODEL BREAKDOWN
    var s=el("section"); s.appendChild(el("h2",null,"Full model breakdown"));
    if((d.factors||[]).length) s.appendChild(el("div","sub2","Each line is one ingredient that goes into our number, with what it contributed and why."));
    (d.factors||[]).forEach(function(f){
      var c=el("div","fac"); var l=el("div","fl");
      l.appendChild(el("span","fn", f.label));
      l.appendChild(el("span","fv", f.value==null?"—":f.value));
      c.appendChild(l);
      if(f.detail) c.appendChild(el("div","fd", f.detail));
      s.appendChild(c);
    });
    if(!(d.factors||[]).length) s.appendChild(el("p","empty","No breakdown available for this game yet."));
    s.appendChild(el("div","note", d.note||""));
    main.appendChild(s);

    // PROJECTED BOX SCORES (both rosters)
    if(d.box && (d.box.home || d.box.away)){
      var bs=el("section"); bs.appendChild(el("h2",null,"Projected box score"));
      bs.appendChild(el("div","note","Impact is our on-court rating (how much better the team plays with her on the floor). A “prov” tag means it rests on a thin on-court sample this early, so treat it as provisional. Min shows projected minutes with her share of a 40-minute game."));
      bs.appendChild(boxTable((d.away_full||d.away)+" (away)", d.box.away));
      bs.appendChild(boxTable((d.home_full||d.home)+" (home)", d.box.home));
      // availability
      var av=d.availability||{};
      var a1=availLine(d.away, av.away), a2=availLine(d.home, av.home);
      if(a1||a2){ bs.appendChild(el("h2",null,"Availability")); if(a1)bs.appendChild(a1); if(a2)bs.appendChild(a2); }
      if(d.box_note) bs.appendChild(el("div","note", d.box_note));
      main.appendChild(bs);
    }

    // STYLE
    var stg=styleTags(d); if(stg){ var sts=el("section"); sts.appendChild(el("h2",null,"Team style")); sts.appendChild(stg); main.appendChild(sts); }

    // PDF REPORT LINK
    if(d.pdf){ var ps=el("section"); var a=el("a","pdf","Full game report (PDF) →"); a.href=d.pdf; ps.appendChild(a); main.appendChild(ps); }

    document.getElementById("foot").textContent="Baked "+(d.generated_et||d.generated_utc||"")+". Ranges are calibrated from our own past accuracy; a single game's margin swings a lot.";
    insertEarlyWord();
  }

  function load(){
    var id=safeId(qid());
    if(!id){ document.getElementById("main").innerHTML='<p class="empty">No game selected. <a href="./games.html">Back to games.</a></p>'; return; }
    fetch("./games/"+id+".json",{cache:"no-cache"}).then(function(r){
      if(!r.ok) throw new Error("not found"); return r.json();
    }).then(render).catch(function(){
      document.getElementById("main").innerHTML='<p class="empty">Game not found on the current board. <a href="./games.html">Back to games.</a></p>';
    });
    fetch("./early_warning.json?v="+Date.now(),{cache:"no-cache"})
      .then(function(r){ return r.ok?r.json():null; })
      .then(function(j){ EW=j; insertEarlyWord(); }).catch(function(){});
  }
  load();
})();
</script>
</body>
</html>
