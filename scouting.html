<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — Scouting</title>
<style>
  :root{ --bg:#f4f6f8; --card:#fff; --card2:#f7f9fc; --ink:#161a21; --muted:#5a6675; --dim:#8a93a3;
    --line:#e3e7ee; --line2:#d3d9e3; --acc:#2b6cb0; --good:#1f883d; --band:#c9d6e8;
    --flash:rgba(43,108,176,.20); --shadow:0 1px 2px rgba(20,24,35,.06); }
  @media (prefers-color-scheme:dark){ :root{ --bg:#0d1117; --card:#161b22; --card2:#1c2330; --ink:#e6edf3;
    --muted:#9aa7b4; --dim:#6b7684; --line:#242c38; --line2:#39424f; --acc:#58a6ff; --good:#3fb950;
    --band:#39424f; --flash:rgba(88,166,255,.26); --shadow:none; } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13.5px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  header{padding:10px 14px 4px;max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:17px;margin:0}
  .ago{font-size:11px;color:var(--dim);white-space:nowrap}
  .ago b{color:var(--good);font-variant-numeric:tabular-nums}
  .sub{color:var(--muted);font-size:12px;max-width:1080px;margin:0 auto;padding:0 14px}
  nav{display:flex;gap:5px;flex-wrap:wrap;max-width:1080px;margin:6px auto 0;padding:0 14px}
  nav a{font-size:12px;text-decoration:none;color:var(--acc);border:1px solid var(--line);background:var(--card);padding:4px 10px;border-radius:999px}
  nav a.active{background:var(--acc);color:#fff;border-color:var(--acc)}
  main{max-width:1080px;margin:0 auto;padding:8px 14px 48px}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:18px 0 8px;font-weight:700}
  .lede{color:var(--muted);font-size:12.5px;margin:6px 0 12px;max-width:820px}
  .headline{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--acc);border-radius:9px;box-shadow:var(--shadow);padding:10px 13px;margin:8px 0 12px;font-size:13.5px;line-height:1.45}
  .headline b{color:var(--acc)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:9px;box-shadow:var(--shadow);overflow:hidden}
  .scroll{overflow-x:auto}
  table{border-collapse:collapse;width:100%;font-size:12.5px;font-variant-numeric:tabular-nums}
  th,td{padding:5px 9px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
  th:nth-child(2),td:nth-child(2){text-align:left}
  th{color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.03em;background:var(--card2)}
  tr.flash td{animation:fl 1.1s ease}
  @keyframes fl{0%{background:var(--flash)}100%{background:transparent}}
  .rk{color:var(--dim);width:1.6em;text-align:right}
  .nm{font-weight:620;text-align:left}
  .strong{font-weight:680}
  .bar{position:relative;height:13px;min-width:96px;background:var(--card2);border:1px solid var(--line);border-radius:4px}
  .bar > i{position:absolute;left:0;top:0;bottom:0;background:var(--acc);opacity:.55;border-radius:3px;display:block}
  .note{font-size:10.5px;color:var(--dim);margin-top:8px;line-height:1.5;max-width:820px}
  .empty{color:var(--dim);font-style:italic}
  footer{max-width:1080px;margin:0 auto;padding:16px 14px;color:var(--dim);font-size:11px}
</style>
</head>
<body>
<header>
  <h1>The Hardwood — Scouting</h1>
  <span class="ago" id="ago"></span>
</header>
<div class="sub">Leaderboards for the scouting numbers that never show up in a box score.</div>
<nav>
  <a href="./index.html">Board</a>
  <a href="./queue.html">What's Next</a>
  <a href="./games.html">Games</a>
  <a href="./teams.html">Teams</a>
  <a href="./players.html">Players</a>
  <a href="./review.html">Daily Review</a>
  <a href="./accuracy.html">Our Accuracy</a>
  <a href="./ledger.html">Error Map</a>
  <a href="./org.html">The Team</a>
  <a class="active" href="./scouting.html">Scouting</a>
  <a href="./deepdive.html">Deep Dives</a>
</nav>
<main id="main"><p class="empty">Loading…</p></main>
<footer id="foot"></footer>
<script src="./hardwood.js"></script>
<script>
(function(){
  "use strict";
  var URL="./scouting.json";
  function el(t,c,x){ var e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; }
  function td(c,x){ return el("td",c,x); }
  function signed(v,d){ return (v>0?"+":"")+v.toFixed(d==null?2:d); }

  function rimSection(d){
    var s=el("section");
    s.appendChild(el("h2",null,"Rim Protection (2025 season)"));
    s.appendChild(el("p","lede","Descriptive scouting from last season — not a forecast. SAE means Saves Above Expected: shots stopped at the rim beyond what an average defender would have, given each shot's spot and difficulty. The board ranks by SAE per 100, so it rewards efficiency, not just heavy minutes."));

    // Render only players the feed actually tracked (a per-100 value exists); an all-blank row is
    // left off rather than shown as an empty "—" line. Sort best-first on the ranking stat.
    var rows=(d.rim_protection||[]).filter(function(r){ return r && r.sae_per100!=null; })
                                   .sort(function(a,b){ return b.sae_per100 - a.sae_per100; });
    if(!rows.length){ s.appendChild(el("p","empty","No rim-protection data yet.")); return s; }

    // Impact-first headline: name the league's best rim protector straight from the feed's top row.
    var top=rows[0];
    var hd=el("div","headline");
    hd.appendChild(document.createTextNode("Last season's best rim protector: "));
    hd.appendChild(el("b",null,top.name));
    hd.appendChild(document.createTextNode(" — "+signed(top.sae_per100)+" saves above expected per 100 shots faced"
      + (top.sae!=null ? (", "+signed(top.sae)+" for the full season.") : ".")));
    s.appendChild(hd);

    var maxAbs=1; rows.forEach(function(r){ var v=Math.abs(r.sae_per100); if(v>maxAbs)maxAbs=v; });

    var card=el("div","card"), sc=el("div","scroll"), t=el("table");
    var thead=el("thead"), hr=el("tr");
    // Column tooltips (hover) — the plain definition of each header, so no column is unlabeled.
    // The visible caption below the table carries the same definitions for phones / no-hover.
    [["#",""],
     ["Player",""],
     ["Rim Opp","Rim shots faced — the season's at-rim attempts this player was the closest defender on, counted fractionally (split when more than one defender was near the shot). It is the sample size behind SAE per 100; bigger = a steadier read. These are allocated shares, not camera-tracking counts."],
     ["SAE","Saves Above Expected — makes prevented at the rim over the season, beyond what an average defender would have allowed given each shot's spot and difficulty."],
     ["SAE per 100","Saves Above Expected per 100 rim shots faced — the efficiency rate the board ranks by."],
     ["Saves bar","A visual of SAE per 100 — a longer bar means more shots saved above expectation per 100 faced."]
    ].forEach(function(x){ var th=el("th",null,x[0]); if(x[1]){ th.title=x[1]; } hr.appendChild(th); });
    thead.appendChild(hr); t.appendChild(thead);
    var tb=el("tbody");
    rows.forEach(function(r,i){
      var tr=el("tr"); tr.setAttribute("data-k","rim|"+r.name);
      tr.appendChild(td("rk", String(i+1)));
      tr.appendChild(td("nm", r.name));
      tr.appendChild(td(null, r.opp==null?"—":r.opp.toFixed(1)));
      tr.appendChild(td("strong", r.sae==null?"—":signed(r.sae)));
      tr.appendChild(td(null, signed(r.sae_per100)));
      var bcell=el("td",null), bar=el("div","bar"), fill=el("i");
      fill.style.width=Math.max(2,Math.min(100,(r.sae_per100/maxAbs)*100)).toFixed(1)+"%";
      bar.appendChild(fill); bcell.appendChild(bar); tr.appendChild(bcell);
      tb.appendChild(tr);
    });
    t.appendChild(tb); sc.appendChild(t); card.appendChild(sc); s.appendChild(card);
    s.appendChild(el("div","note","Ranked by SAE per 100 — a longer bar means more shots saved above expectation for every 100 the player faced. “Rim Opp” is rim shots faced: the season count of at-rim attempts this player was the closest defender on, split fractionally when more than one defender was near the shot (so it reads as a fractional total, e.g. 61.4, not a whole number). It is the sample size behind SAE per 100 — a bigger number means a steadier read. These are allocated defender shares, not camera-tracking counts, so this is a descriptive look back at last season, not a prediction; players with no tracked rim attempts are left off."));
    return s;
  }

  function render(d){
    curData=d;
    var main=document.getElementById("main"); main.innerHTML="";
    document.getElementById("foot").textContent="Updated "+(d.generated_et||d.generated_utc||"")+". Descriptive scouting stats — refreshed daily, not a betting line.";
    main.appendChild(rimSection(d));
    flash();
  }

  /* ---------- shared live runtime ---------- */
  var curData=null, etag=null,lastMod=null,lastFetch=0,cardHTML={},first=true;
  function updAgo(){
    var s=Math.max(0,Math.round((Date.now()-lastFetch)/1000));
    var t = s<60 ? (s+"s ago") : (Math.floor(s/60)+"m "+(s%60)+"s ago");
    var a=document.getElementById("ago"); if(a) a.innerHTML = lastFetch? ("live · updated <b>"+t+"</b>") : "";
  }
  function flash(){
    var nodes=document.querySelectorAll("#main [data-k]"), nm={};
    nodes.forEach(function(n){ var k=n.getAttribute("data-k"), h=n.innerHTML; nm[k]=h;
      if(!first && cardHTML[k]!==undefined && cardHTML[k]!==h){ n.classList.remove("flash"); void n.offsetWidth; n.classList.add("flash"); } });
    cardHTML=nm; first=false;
  }
  function poll(){
    var h={}; if(etag)h["If-None-Match"]=etag; if(lastMod)h["If-Modified-Since"]=lastMod;
    fetch(URL,{headers:h,cache:"no-cache"}).then(function(r){
      if(r.status===304) return null;
      etag=r.headers.get("ETag")||etag; lastMod=r.headers.get("Last-Modified")||lastMod; return r.json();
    }).then(function(d){ lastFetch=Date.now(); if(d){ render(d); } updAgo(); }).catch(function(e){
      if(!lastFetch){ document.getElementById("main").innerHTML='<p class="empty">Could not load scouting boards. '+(e&&e.message?e.message:"")+'</p>'; }
    });
  }
  poll(); setInterval(poll,60000); setInterval(updAgo,1000);
})();
</script>
</body>
</html>
