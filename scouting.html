<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — Scouting</title>
<style>
  :root{ --bg:#f4f6f8; --card:#fff; --card2:#f7f9fc; --ink:#161a21; --muted:#5a6675; --dim:#8a93a3;
    --line:#e3e7ee; --line2:#d3d9e3; --acc:#2b6cb0; --good:#1f883d; --band:#c9d6e8;
    --flash:rgba(43,108,176,.20); --shadow:0 1px 2px rgba(20,24,35,.06); }
  @media (prefers-color-scheme:dark){ :root{ --bg:#0d1117; --card:#161b22; --card2:#1c2330; --ink:#e6edf3;
    --muted:#9aa7b4; --dim:#6b7684; --line:#242c38; --line2:#39424f; --acc:#58a6ff; --good:#3fb950;
    --band:#39424f; --flash:rgba(88,166,255,.26); --shadow:none; } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13.5px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  header{padding:10px 14px 4px;max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:17px;margin:0}
  .ago{font-size:11px;color:var(--dim);white-space:nowrap}
  .ago b{color:var(--good);font-variant-numeric:tabular-nums}
  .sub{color:var(--muted);font-size:12px;max-width:1080px;margin:0 auto;padding:0 14px}
  nav{display:flex;gap:5px;flex-wrap:wrap;max-width:1080px;margin:6px auto 0;padding:0 14px}
  nav a{font-size:12px;text-decoration:none;color:var(--acc);border:1px solid var(--line);background:var(--card);padding:4px 10px;border-radius:999px}
  nav a.active{background:var(--acc);color:#fff;border-color:var(--acc)}
  main{max-width:1080px;margin:0 auto;padding:8px 14px 48px}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:18px 0 8px;font-weight:700}
  .lede{color:var(--muted);font-size:12.5px;margin:6px 0 12px;max-width:820px}
  .headline{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--acc);border-radius:9px;box-shadow:var(--shadow);padding:10px 13px;margin:8px 0 12px;font-size:13.5px;line-height:1.45}
  .headline b{color:var(--acc)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:9px;box-shadow:var(--shadow);overflow:hidden}
  .scroll{overflow-x:auto}
  table{border-collapse:collapse;width:100%;font-size:12.5px;font-variant-numeric:tabular-nums}
  th,td{padding:5px 9px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
  th:nth-child(2),td:nth-child(2){text-align:left}
  th{color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.03em;background:var(--card2)}
  tr.flash td{animation:fl 1.1s ease}
  @keyframes fl{0%{background:var(--flash)}100%{background:transparent}}
  .rk{color:var(--dim);width:1.6em;text-align:right}
  .nm{font-weight:620;text-align:left}
  .strong{font-weight:680}
  .bar{position:relative;height:13px;min-width:96px;background:var(--card2);border:1px solid var(--line);border-radius:4px}
  .bar > i{position:absolute;left:0;top:0;bottom:0;background:var(--acc);opacity:.55;border-radius:3px;display:block}
  .note{font-size:10.5px;color:var(--dim);margin-top:8px;line-height:1.5;max-width:820px}
  .empty{color:var(--dim);font-style:italic}
  .scale{background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin:8px 0 12px;font-size:12px;color:var(--muted);line-height:1.5;max-width:820px}
  .scale b{color:var(--ink)}
  .board2 .bar > i{background:var(--good)}
  td.thin{color:var(--dim)}
  footer{max-width:1080px;margin:0 auto;padding:16px 14px;color:var(--dim);font-size:11px}
</style>
<link rel="stylesheet" href="./hardwood.css">
</head>
<body>
<header>
  <h1>The Hardwood — Scouting</h1>
  <span class="ago" id="ago"></span>
</header>
<div class="sub">Leaderboards for the scouting numbers that never show up in a box score.</div>
<nav>
  <a href="./index.html">Board</a>
  <a href="./queue.html">What's Next</a>
  <a href="./games.html">Games</a>
  <a href="./standings.html">Standings</a>
  <a href="./availability.html">Injuries</a>
  <a href="./teams.html">Teams</a>
  <a href="./coach.html">Coach</a>
  <a href="./tempo.html">Tempo</a>
  <a href="./gm.html">GM</a>
  <a href="./players.html">Players</a>
  <a href="./compare.html">Compare</a>
  <a href="./situation.html">Situations</a>
  <a href="./review.html">Daily Review</a>
  <a href="./accuracy.html">Our Accuracy</a>
  <a href="./ledger.html">Error Map</a>
  <a href="./report_archive.html">Report Archive</a>
  <a href="./org.html">The Team</a>
  <a class="active" href="./scouting.html">Scouting</a>
  <a href="./deepdive.html">Deep Dives</a>
  <a href="./explorer.html">Data Explorer</a>
  <a href="./primer.html">Learn</a>
</nav>
<main id="main"><p class="empty">Loading…</p></main>
<footer id="foot"></footer>
<script src="./hardwood.js"></script>
<script>
(function(){
  "use strict";
  var URL="./scouting.json";
  function el(t,c,x){ var e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; }
  function td(c,x){ return el("td",c,x); }
  function signed(v,d){ return (v>0?"+":"")+v.toFixed(d==null?2:d); }

  // A player needs at least this many rim shots faced for a stable per-chance read; below it,
  // a single stop swings the rate wildly, so thin samples are held out of the RATE board.
  var QUAL_MIN=40;

  function barCell(v,maxAbs){
    var bcell=el("td",null), bar=el("div","bar"), fill=el("i");
    fill.style.width=Math.max(2,Math.min(100,(v/maxAbs)*100)).toFixed(1)+"%";
    bar.appendChild(fill); bcell.appendChild(bar); return bcell;
  }

  // Build one ranked leaderboard card from a column spec. Each column is
  // {h, title?, cell(row, i, maxAbs)}. rankStat drives the bar scale; board2 toggles a style hook.
  function boardTable(rows, cols, rankStat, board2){
    var maxAbs=1; rows.forEach(function(r){ var v=Math.abs(r[rankStat]||0); if(v>maxAbs)maxAbs=v; });
    var card=el("div","card"+(board2?" board2":"")), sc=el("div","scroll"), t=el("table");
    var thead=el("thead"), hr=el("tr");
    cols.forEach(function(c){ var th=el("th",null,c.h); if(c.title){ th.title=c.title; } hr.appendChild(th); });
    thead.appendChild(hr); t.appendChild(thead);
    var tb=el("tbody");
    rows.forEach(function(r,i){
      var tr=el("tr"); tr.setAttribute("data-k",(board2?"imp|":"rim|")+r.name);
      cols.forEach(function(c){ tr.appendChild(c.cell(r,i,maxAbs)); });
      tb.appendChild(tr);
    });
    t.appendChild(tb); sc.appendChild(t); card.appendChild(sc);
    return card;
  }

  function rimSection(d){
    var s=el("section");
    s.appendChild(el("h2",null,"Rim protection - last season"));
    s.appendChild(el("p","lede","Descriptive scouting from last season, not a forecast. Saves Above Expected counts the shots a defender stopped at the rim beyond what an average defender would have, given each shot's spot and difficulty. We show it two ways: per chance (efficiency) and per season (total impact)."));

    // Only players the feed actually graded (a per-100 value exists); an all-blank row is left off.
    var all=(d.rim_protection||[]).filter(function(r){ return r && r.sae_per100!=null; });
    if(!all.length){ s.appendChild(el("p","empty","No rim-protection data yet.")); return s; }

    // RATE board: only players with a stable sample, ranked best-first on saves per 100.
    var qualified=all.filter(function(r){ return r.opp!=null && r.opp>=QUAL_MIN; })
                     .sort(function(a,b){ return b.sae_per100 - a.sae_per100; });
    var thinCount=all.length-qualified.length;
    var rateRows=qualified.slice(0,15);

    // Impact-first headline: the best QUALIFIED rim protector by rate (enough sample to trust).
    var top=(qualified[0]||all.slice().sort(function(a,b){return b.sae_per100-a.sae_per100;})[0]);
    var hd=el("div","headline");
    hd.appendChild(document.createTextNode("Last season's most efficient rim protector: "));
    hd.appendChild(el("b",null,top.name));
    hd.appendChild(document.createTextNode(" - "+signed(top.sae_per100)+" saves above an average defender per 100 shots faced at the rim"
      + (top.sae!=null ? (", "+signed(top.sae)+" across the full season.") : ".")));
    s.appendChild(hd);

    // Scale context: explains why every ranked number is positive (0 = average defender).
    var scl=el("div","scale");
    scl.appendChild(el("b",null,"How to read it: "));
    scl.appendChild(document.createTextNode("0 is an average defender. Every player ranked here graded above average at the rim last season - the feed only grades players with enough at-rim defensive work to measure."));
    s.appendChild(scl);

    // ---- Board 1: efficiency (saves per 100) ----
    s.appendChild(el("h2",null,"Most efficient - saves per 100 shots faced"));
    var rateCols=[
      {h:"#", cell:function(r,i){ return td("rk", String(i+1)); }},
      {h:"Player", cell:function(r){ return td("nm", r.name); }},
      {h:"Rim shots", title:"Rim shots faced last season - the sample behind the rate.",
       cell:function(r){ return td(null, r.opp==null?"-":r.opp.toFixed(1)); }},
      {h:"Shots saved", title:"Total saves above an average defender across the season.",
       cell:function(r){ return td(null, r.sae==null?"-":signed(r.sae)); }},
      {h:"Per 100", title:"Saves above average per 100 rim shots faced - the rate this board ranks by.",
       cell:function(r){ return td("strong", signed(r.sae_per100)); }},
      {h:"", cell:function(r,i,m){ return barCell(r.sae_per100, m); }}
    ];
    s.appendChild(boardTable(rateRows, rateCols, "sae_per100", false));
    var note1="Ranked by saves per 100 rim shots faced, among the "+qualified.length+" players who faced at least "+QUAL_MIN+" shots at the rim - enough for a steady read.";
    if(thinCount>0){ note1+=" "+thinCount+" players faced fewer than "+QUAL_MIN+" and are held out of this rate board, since one stop would swing a small sample too far."; }
    s.appendChild(el("div","note", note1));

    // ---- Board 2: season total impact (rewards volume + rate) ----
    var impRows=all.slice().sort(function(a,b){ return (b.sae||0)-(a.sae||0); }).slice(0,12);
    s.appendChild(el("h2",null,"Biggest season impact - total shots saved"));
    s.appendChild(el("p","lede","This board rewards volume as well as rate: the players who saved the most shots at the rim across the whole season, whether by defending a lot of them or defending them well. Interior anchors who face heavy rim traffic tend to lead here even when their per-chance rate is lower."));
    var impCols=[
      {h:"#", cell:function(r,i){ return td("rk", String(i+1)); }},
      {h:"Player", cell:function(r){ return td("nm", r.name); }},
      {h:"Shots saved", title:"Total saves above an average defender across the season - the impact this board ranks by.",
       cell:function(r){ return td("strong", r.sae==null?"-":signed(r.sae)); }},
      {h:"", cell:function(r,i,m){ return barCell(r.sae||0, m); }},
      {h:"Rim shots", title:"Rim shots faced last season.",
       cell:function(r){ var c=td(null, r.opp==null?"-":r.opp.toFixed(1)); if(r.opp!=null && r.opp<QUAL_MIN){ c.className="thin"; } return c; }},
      {h:"Per 100", title:"Saves above average per 100 rim shots faced.",
       cell:function(r){ return td(null, signed(r.sae_per100)); }}
    ];
    s.appendChild(boardTable(impRows, impCols, "sae", true));
    s.appendChild(el("div","note","\"Shots saved\" is Saves Above Expected: makes prevented at the rim over the season, beyond an average defender. \"Rim shots\" is this player's share of opponents' at-rim attempts across the season: each shot is split fractionally among the defenders estimated to be matched up with that shooter in that game, so it reads as a fractional total (e.g. 61.4). These are allocated defender shares, not camera-tracking counts - a descriptive look back at last season, not a prediction; players with no graded rim attempts are left off. A dimmed rim-shots number means a small sample."));
    return s;
  }

  // ---- Zone spatial-impact (OFFENSE only) -------------------------------------------------
  // Points Above Expected (PAX) per 100 shots: points a shooter adds vs a league-average
  // shooter taking the same shots, against a leak-safe strict-prior baseline. OFFENSE ONLY -
  // this is a shot-making read, NOT a defensive value. Static career data (2021-2025); a
  // second, independent feed (./scouting_zone.json) that never mutates, so no flash keys.
  function pax100(v){ return (v>0?"+":"")+(Math.round(v*10)/10).toFixed(1); }

  function paxTable(rows, withZoneCols){
    var maxAbs=1; rows.forEach(function(r){ var v=Math.abs(r.pax_per_100||0); if(v>maxAbs)maxAbs=v; });
    var card=el("div","card"), sc=el("div","scroll"), t=el("table");
    var heads = withZoneCols
      ? ["#","Player","Shots","FG%","Exp FG%","PAX / 100"]
      : ["#","Player","Shots","PAX / 100",""];
    var thead=el("thead"), hr=el("tr");
    heads.forEach(function(h){ hr.appendChild(el("th",null,h)); });
    thead.appendChild(hr); t.appendChild(thead);
    var tb=el("tbody");
    rows.forEach(function(r,i){
      var tr=el("tr");
      tr.appendChild(td("rk", String(i+1)));
      tr.appendChild(td("nm", r.name));
      tr.appendChild(td(null, String(r.n_shots)));
      if(withZoneCols){
        tr.appendChild(td(null, (r.fg==null?"-":(r.fg*100).toFixed(1)+"%")));
        tr.appendChild(td(null, (r.xfg==null?"-":(r.xfg*100).toFixed(1)+"%")));
        tr.appendChild(td("strong", pax100(r.pax_per_100)));
      } else {
        tr.appendChild(td("strong", pax100(r.pax_per_100)));
        var bcell=el("td",null), bar=el("div","bar"), fill=el("i");
        fill.style.width=Math.max(2,Math.min(100,(Math.abs(r.pax_per_100)/maxAbs)*100)).toFixed(1)+"%";
        bar.appendChild(fill); bcell.appendChild(bar); tr.appendChild(bcell);
      }
      tb.appendChild(tr);
    });
    t.appendChild(tb); sc.appendChild(t); card.appendChild(sc);
    return card;
  }

  function zoneSpatialSection(z){
    var s=el("section");
    var m=(z&&z.metric)||{};
    s.appendChild(el("h2",null,"Shot-making by zone - offense, last five seasons"));
    s.appendChild(el("p","lede","Where a player adds the most points with their shot. "+(m.what||"")));

    // Offense-only + how-to-read scale. Stated plainly so the number is never mistaken for a
    // two-way or defensive read.
    var scl=el("div","scale");
    scl.appendChild(el("b",null,"Offense only: "));
    scl.appendChild(document.createTextNode((m.axis_note ? m.axis_note.replace(/^OFFENSE ONLY -- /,"") : "a shooting-value read - it does not include any defensive value.")+" 0 is a league-average shooter; the numbers below are points added (or given up) per 100 shots, versus what a league-average shooter would score on the same shots. "+(m.coverage||"")));
    s.appendChild(scl);

    var elite=(z.overall_elite||[]), poor=(z.overall_poor||[]);
    if(elite.length){
      var top=elite[0];
      var hd=el("div","headline");
      hd.appendChild(document.createTextNode("Most valuable overall shot-maker: "));
      hd.appendChild(el("b",null,top.name));
      hd.appendChild(document.createTextNode(" - "+pax100(top.pax_per_100)+" points per 100 shots above a league-average shooter, over "+top.n_shots.toLocaleString()+" shots."));
      s.appendChild(hd);

      s.appendChild(el("h2",null,"Best overall shot value"));
      s.appendChild(paxTable(elite, false));
      s.appendChild(el("div","note","Ranked by Points Above Expected per 100 shots, among players with at least "+(m.overall_floor||300)+" shots since 2021 - enough for a steady read. Thin-volume zones are already shrunk toward league-average in the underlying numbers, so a small sample cannot manufacture an extreme rating."));
    }
    if(poor.length){
      s.appendChild(el("h2",null,"Toughest shooting value"));
      s.appendChild(el("p","lede","The other end of the same scale: players whose shot mix came in below what a league-average shooter would have scored. Descriptive, not a judgement of a player's overall game - a high-usage creator often takes the hardest shots by role."));
      s.appendChild(paxTable(poor, false));
    }

    var zones=(z.zones||[]);
    if(zones.length){
      s.appendChild(el("h2",null,"By-zone specialists"));
      s.appendChild(el("p","lede","Who adds the most value from each spot on the floor. \"FG%\" is what they actually shot; \"Exp FG%\" is what a league-average shooter made on those same shots - the gap is the value."));
      zones.forEach(function(zn){
        var leaders=(zn.leaders||[]);
        if(!leaders.length) return;
        s.appendChild(el("h2",null,zn.label));
        s.appendChild(paxTable(leaders, true));
      });
      s.appendChild(el("div","note","Per-zone boards include players with at least "+((m.zone_floor)||100)+" shots from that spot since 2021. A player with no shots from a zone is left off (never shown as a zero). Career-pooled 2021-2025; no contest or defender adjustment - a descriptive scouting look, not a forecast."));
    }
    return s;
  }

  function render(d){
    curData=d;
    var main=document.getElementById("main"); main.innerHTML="";
    document.getElementById("foot").textContent="Updated "+(d.generated_et||d.generated_utc||"")+". Descriptive scouting stats — refreshed daily, not a betting line.";
    main.appendChild(rimSection(d));
    if(zoneData){ main.appendChild(zoneSpatialSection(zoneData)); }
    flash();
  }

  /* ---------- shared live runtime ---------- */
  var curData=null, zoneData=null, etag=null,lastMod=null,lastFetch=0,cardHTML={},first=true;
  // Static career zone-spatial feed: fetched once. Graceful — if it 404s, the rim board still
  // renders; if it lands after the first rim render, we re-render to inject the zone section.
  function loadZone(){
    fetch("./scouting_zone.json",{cache:"no-cache"}).then(function(r){
      return r.ok ? r.json() : null;
    }).then(function(z){ if(z){ zoneData=z; if(curData){ render(curData); } } }).catch(function(){});
  }
  function updAgo(){
    var s=Math.max(0,Math.round((Date.now()-lastFetch)/1000));
    var t = s<60 ? (s+"s ago") : (Math.floor(s/60)+"m "+(s%60)+"s ago");
    var a=document.getElementById("ago"); if(a) a.innerHTML = lastFetch? ("live · updated <b>"+t+"</b>") : "";
  }
  function flash(){
    var nodes=document.querySelectorAll("#main [data-k]"), nm={};
    nodes.forEach(function(n){ var k=n.getAttribute("data-k"), h=n.innerHTML; nm[k]=h;
      if(!first && cardHTML[k]!==undefined && cardHTML[k]!==h){ n.classList.remove("flash"); void n.offsetWidth; n.classList.add("flash"); } });
    cardHTML=nm; first=false;
  }
  function poll(){
    var h={}; if(etag)h["If-None-Match"]=etag; if(lastMod)h["If-Modified-Since"]=lastMod;
    fetch(URL,{headers:h,cache:"no-cache"}).then(function(r){
      if(r.status===304) return null;
      etag=r.headers.get("ETag")||etag; lastMod=r.headers.get("Last-Modified")||lastMod; return r.json();
    }).then(function(d){ lastFetch=Date.now(); if(d){ render(d); } updAgo(); }).catch(function(e){
      if(!lastFetch){ document.getElementById("main").innerHTML='<p class="empty">Could not load scouting boards. '+(e&&e.message?e.message:"")+'</p>'; }
    });
  }
  poll(); loadZone(); setInterval(poll,60000); setInterval(updAgo,1000);
})();
</script>
</body>
</html>
