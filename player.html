<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — Player</title>
<style>
  :root{ --bg:#f4f6f8; --card:#fff; --card2:#f7f9fc; --ink:#161a21; --muted:#5a6675; --dim:#8a93a3;
    --line:#e3e7ee; --line2:#d3d9e3; --acc:#2b6cb0; --good:#1f883d; --bad:#c62828; --warn:#9a6700;
    --band:#c9d6e8; --pt:#1f883d; --flash:rgba(43,108,176,.20); --shadow:0 1px 2px rgba(20,24,35,.06); }
  @media (prefers-color-scheme:dark){ :root{ --bg:#0d1117; --card:#161b22; --card2:#1c2330; --ink:#e6edf3;
    --muted:#9aa7b4; --dim:#6b7684; --line:#242c38; --line2:#39424f; --acc:#58a6ff; --good:#3fb950; --bad:#ff7b72;
    --warn:#d29922; --band:#39424f; --pt:#3fb950; --shadow:none; } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13.5px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  header{padding:10px 14px 4px;max-width:1000px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:17px;margin:0}
  .ago{font-size:11px;color:var(--dim);white-space:nowrap}
  nav{display:flex;gap:5px;flex-wrap:wrap;max-width:1000px;margin:6px auto 0;padding:0 14px}
  nav a{font-size:12px;text-decoration:none;color:var(--acc);border:1px solid var(--line);background:var(--card);padding:4px 10px;border-radius:999px}
  nav a.active{background:var(--acc);color:#fff;border-color:var(--acc)}
  main{max-width:1000px;margin:0 auto;padding:8px 14px 48px}
  .back{font-size:12px;color:var(--acc);text-decoration:none;display:inline-block;margin:4px 0 8px}
  .hero{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 15px;box-shadow:var(--shadow);margin-bottom:12px}
  .hero .nm{font-size:20px;font-weight:720}
  .hero .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .kpis{display:flex;gap:9px;flex-wrap:wrap;margin-top:11px}
  .kpi{background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:7px 12px;min-width:110px}
  .kpi .kl{font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
  .kpi .kv{font-size:20px;font-weight:700;margin-top:1px}
  .kpi .kv small{font-size:11px;color:var(--muted);font-weight:600}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:16px 0 8px;font-weight:700}
  .card{background:var(--card);border:1px solid var(--line);border-radius:9px;box-shadow:var(--shadow);overflow:hidden}
  .pad{padding:11px 13px}
  .scroll{overflow-x:auto}
  table{border-collapse:collapse;width:100%;font-size:12.5px;font-variant-numeric:tabular-nums}
  th,td{padding:5px 9px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.03em;background:var(--card2)}
  .traj{width:100%;height:96px;display:block}
  /* sparkline endpoint delta (A++-rung): the baked impact_trend.delta annotated on the last dot, so
     the number sits on the line it derives from; direction color matches the arrow (good up/warn down). */
  .trajend{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
  .rbar{position:relative;height:15px;min-width:130px;background:var(--card2);border:1px solid var(--line);border-radius:4px}
  .rbar .b90{position:absolute;top:5px;height:5px;background:var(--band);border-radius:3px}
  .rbar .b50{position:absolute;top:3px;height:9px;background:var(--acc);opacity:.6;border-radius:3px}
  .rbar .p{position:absolute;top:1px;width:3px;height:13px;background:var(--pt);transform:translateX(-1px)}
  .comps{display:flex;gap:7px;flex-wrap:wrap}
  .comp{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12px}
  .comp b{font-weight:640}.comp span{color:var(--dim);font-size:11px}
  .thin{color:var(--warn)}
  .nmrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .rankchip{font-size:11px;font-weight:640;color:var(--acc);background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:2px 10px;white-space:nowrap}
  .avail{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-radius:999px;padding:2px 9px;white-space:nowrap}
  .avail.ok{color:var(--good);background:rgba(31,136,61,.10);border:1px solid var(--good)}
  .avail.warn{color:var(--warn);background:rgba(154,103,0,.12);border:1px solid var(--warn)}
  .avail.out{color:var(--bad);background:rgba(198,40,40,.10);border:1px solid var(--bad)}
  .why{color:var(--ink);font-size:13px;margin-top:9px;line-height:1.5}
  /* impact-vs-scoring divergence (A+-rung): the two-axis rank read on the player card */
  .divergence{color:var(--acc);font-size:12px;font-weight:600;margin-top:6px;font-variant-numeric:tabular-nums;line-height:1.4}
  /* rising/falling impact trend (A+-rung element 3): recent direction of the rating, same series as the sparkline */
  .trendline{font-size:12px;font-weight:600;margin-top:5px;font-variant-numeric:tabular-nums;line-height:1.4}
  .trendline.up{color:var(--good)}
  .trendline.down{color:var(--warn)}
  .asof{font-size:11px;color:var(--dim);margin-top:5px}
  .asof.stale{color:var(--warn);font-weight:600}
  .statline{margin-top:10px;font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .statline b{color:var(--ink);font-weight:640}
  .empty{color:var(--dim);font-style:italic}
  .note{font-size:10.5px;color:var(--dim);margin-top:6px;line-height:1.5}
  .biowrap{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .headshot{width:66px;height:66px;border-radius:50%;object-fit:cover;background:var(--card2);border:1px solid var(--line);flex:none}
  .biofacts{display:flex;gap:8px;flex-wrap:wrap}
  .biofact{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:5px 11px;min-width:62px}
  .biofact .bl{display:block;font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
  .biofact .bv{display:block;font-size:13.5px;font-weight:650;margin-top:1px}
  footer{max-width:1000px;margin:0 auto;padding:16px 14px;color:var(--dim);font-size:11px}
</style>
<link rel="stylesheet" href="./hardwood.css">
</head>

<main id="main"><p class="empty">Loading player…</p></main>
<footer id="foot"></footer>
<script src="./hardwood.js"></script>
<script>
(function(){
  "use strict";
  function el(t,c,x){ var e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; }
  function qid(){ var m=/[?&]id=([^&]+)/.exec(location.search); return m?decodeURIComponent(m[1]):null; }
  function safeId(s){ return (s||"").replace(/[^0-9]/g,""); }   // player ids are numeric; hard allow-list

  // BIO STRIP — a static bio card read from ./roster_meta.json, keyed on the same numeric
  // player id the page already uses. Loaded independently of the impact card so a missing
  // or partial bio never blocks the profile (graceful null: no data -> nothing renders).
  var ROSTER=null, curId=null;
  function bioField(label,val){
    if(val==null) return null;
    var s=String(val).trim();
    if(!s || s==="null" || s==="undefined") return null;
    var f=el("div","biofact");
    f.appendChild(el("span","bl",label));
    f.appendChild(el("span","bv",s));
    return f;
  }
  function buildBio(p){
    var sec=el("section"); sec.id="biostrip";
    sec.appendChild(el("h2",null,"Player bio"));
    var card=el("div","card pad");
    var wrap=el("div","biowrap");
    if(p.headshot_url){
      var img=document.createElement("img");
      img.className="headshot"; img.src=p.headshot_url;
      img.alt=(p.name||"Player")+" headshot"; img.loading="lazy";
      img.onerror=function(){ img.style.display="none"; };
      wrap.appendChild(img);
    }
    var facts=el("div","biofacts");
    var jersey=(p.jersey!=null && String(p.jersey).trim()!=="") ? "#"+String(p.jersey).trim() : null;
    var order=[["Position",p.position],["Jersey",jersey],["Height",p.height],
      ["Weight",p.weight],["Experience",p.experience],["College",p.college],
      ["Nationality",p.nationality]];
    var any=false;
    order.forEach(function(o){ var f=bioField(o[0],o[1]); if(f){ facts.appendChild(f); any=true; } });
    wrap.appendChild(facts);
    card.appendChild(wrap); sec.appendChild(card);
    sec._hasContent = any || !!p.headshot_url;
    return sec;
  }
  function tryBio(){
    if(!ROSTER || !ROSTER.players || !curId) return;
    var p=ROSTER.players[curId]; if(!p) return;
    var main=document.getElementById("main"); if(!main) return;
    var hero=main.querySelector(".hero"); if(!hero) return;
    if(document.getElementById("biostrip")) return;
    var sec=buildBio(p);
    if(!sec._hasContent) return;   // no usable bio fields -> render nothing (never an empty card)
    hero.parentNode.insertBefore(sec, hero.nextSibling);
  }

  function trajSvg(pts, trend){
    if(!pts || pts.length<2) return el("p","empty","Not enough history yet for a trajectory.");
    var w=680, h=96, pad=6;
    var vals=pts.map(function(p){return p.rating;});
    var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals); if(mx===mn){mx+=1;mn-=1;}
    var n=pts.length;
    var xf=function(i){ return pad + (i/(n-1))*(w-2*pad); };
    var yf=function(v){ return pad + (1-(v-mn)/(mx-mn))*(h-2*pad); };
    var d=""; pts.forEach(function(p,i){ d += (i?" L":"M")+xf(i).toFixed(1)+" "+yf(p.rating).toFixed(1); });
    var svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
    svg.setAttribute("viewBox","0 0 "+w+" "+h); svg.setAttribute("class","traj"); svg.setAttribute("preserveAspectRatio","none");
    var path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",d); path.setAttribute("fill","none");
    path.setAttribute("stroke","var(--acc)"); path.setAttribute("stroke-width","2");
    svg.appendChild(path);
    var lx=xf(n-1), ly=yf(pts[n-1].rating);
    var last=document.createElementNS("http://www.w3.org/2000/svg","circle");
    last.setAttribute("cx",lx); last.setAttribute("cy",ly);
    last.setAttribute("r","3"); last.setAttribute("fill","var(--good)"); svg.appendChild(last);
    // ENDPOINT DELTA (A++-rung): annotate the last dot with the SAME baked impact_trend.delta the
    // arrow/momentum-strip read — the number sits ON the line it derives from (the trend is baked
    // over this exact series). Rendered ONLY when a real, material trend is baked (firm + past the
    // omit guards); a flat/short/stale/provisional history carries none -> no label (never a fake 0).
    if(trend && trend.delta!=null && trend.days){
      var up=trend.delta>0;
      var ty=Math.max(11, Math.min(h-3, ly + (up? -7 : 15)));           // clamp inside the frame
      var lbl=document.createElementNS("http://www.w3.org/2000/svg","text");
      lbl.setAttribute("x",(lx-5).toFixed(1)); lbl.setAttribute("y",ty.toFixed(1));
      lbl.setAttribute("text-anchor","end"); lbl.setAttribute("class","trajend "+(up?"up":"down"));
      lbl.setAttribute("fill", up?"var(--good)":"var(--warn)");
      lbl.textContent=(up?"+":"−")+Math.abs(trend.delta).toFixed(1);
      svg.appendChild(lbl);
    }
    return svg;
  }

  function realmTable(realm, order){
    var stats=(order||[]).filter(function(s){return realm[s];});
    if(!stats.length) return el("p","empty","No upcoming-slate outcome ranges for this player yet.");
    var hi=0; stats.forEach(function(s){ var r=realm[s]; hi=Math.max(hi, r.hi90||0, r.point||0); }); hi=hi||1;
    var sc=el("div","scroll"), t=el("table");
    var thead=el("thead"),hr=el("tr");
    ["Stat","Proj","Likely range","Wide range","Outcome band"].forEach(function(x){ hr.appendChild(el("th",null,x)); });
    thead.appendChild(hr); t.appendChild(thead); var tb=el("tbody");
    var lbl={PTS:"Points",REB:"Rebounds",AST:"Assists","3PM":"3-pointers",MIN:"Minutes"};
    stats.forEach(function(s){
      var r=realm[s], tr=el("tr");
      tr.appendChild(el("td",null,lbl[s]||s));
      tr.appendChild(el("td",null, r.point==null?"—":r.point.toFixed(1)));
      tr.appendChild(el("td",null, (r.lo==null?"—":r.lo.toFixed(1))+"–"+(r.hi==null?"—":r.hi.toFixed(1))));
      tr.appendChild(el("td",null, (r.lo90==null?"—":r.lo90.toFixed(1))+"–"+(r.hi90==null?"—":r.hi90.toFixed(1))));
      var bc=el("td",null), bar=el("div","rbar");
      var bx=function(v){ return v==null?null:Math.max(0,Math.min(100,(v/hi)*100)); };
      var l90=bx(r.lo90),h90=bx(r.hi90),l=bx(r.lo),h2=bx(r.hi),pp=bx(r.point);
      if(l90!=null&&h90!=null){ var e90=el("div","b90"); e90.style.left=l90.toFixed(1)+"%"; e90.style.width=(h90-l90).toFixed(1)+"%"; bar.appendChild(e90); }
      if(l!=null&&h2!=null){ var e50=el("div","b50"); e50.style.left=l.toFixed(1)+"%"; e50.style.width=(h2-l).toFixed(1)+"%"; if(r.low_conf)e50.style.background="var(--warn)"; bar.appendChild(e50); }
      if(pp!=null){ var ep=el("div","p"); ep.style.left=pp.toFixed(1)+"%"; bar.appendChild(ep); }
      bc.appendChild(bar); tr.appendChild(bc); tb.appendChild(tr);
    });
    t.appendChild(tb); sc.appendChild(t); return sc;
  }

  // IMPACT-vs-SCORING DIVERGENCE (A+-rung element 2): a plain-English one-liner reading the two
  // canonical ranks the bake ALREADY put on this card's row (impact_rank = firm on-court rank,
  // scoring_rank = season-scoring board rank) — render-only, no computation beyond a subtraction.
  // Returns null unless BOTH ranks are present (a provisional/no-rating player has no firm
  // impact_rank, so the line is simply omitted — never a fabricated rank). When the two ranks
  // diverge it names the gap (the point of the read: on-court value the box score misses/overstates).
  function divergenceLine(d){
    var ir=d&&d.impact_rank, sr=d&&d.scoring_rank;
    if(ir==null || sr==null) return null;                   // both ranks required — else omit
    var s="#"+ir+" by on-court impact · #"+sr+" by scoring";
    var gap=sr-ir;
    if(gap>0){ s+=" — a "+gap+"-spot lift the box score misses"; }
    else if(gap<0){ s+=" — "+(-gap)+" spots higher by scoring than on-court impact"; }
    return s;
  }
  // RISING/FALLING IMPACT (A+-rung element 3): the recent direction of THIS player's on-court
  // rating, read from the baked impact_trend {delta, days} — the honest slope of the SAME dated
  // series the trajectory sparkline below draws (derived bake-side, so the two can never disagree).
  // Returns null (renders nothing) when the field is absent: a flat / short / stale history, or a
  // provisional card (baked null) — omit, never a fabricated direction.
  function impactTrendLine(t){
    if(!t || t.delta==null || !t.days) return null;
    var up = t.delta > 0;
    var mag = Math.abs(t.delta).toFixed(1);
    return { up: up,
      text: (up?"▲ ":"▼ ")+"On-court impact "+(up?"rising":"falling")+" — "+(up?"+":"−")+mag+
            " over its last "+t.days+" days of games",
      title: "The recent direction of our on-court impact rating for this player, from the same "+
             "dated series the trajectory below draws. Moves smaller than 0.2 rating points aren't shown." };
  }
  function render(d){
    var main=document.getElementById("main"); main.innerHTML="";
    var back=el("a","back","← Back to all players"); back.href="./players.html"; main.appendChild(back);

    var hero=el("div","hero");
    var prov = (d.impact_provisional !== false);   // default provisional if the flag is absent
    var nb = d.n_basis;   // on-court stint count backing the impact rating (the "basis" the read cites) — was undefined -> ReferenceError crashed every profile (VZ-1 live-outage fix)
    var si0=d.season_impact;   // availability + minutes context live here

    // NAME ROW — the scan line: who + impact rank + is she available for the next game.
    var nmrow=el("div","nmrow");
    nmrow.appendChild(el("div","nm", d.name||"Player"));
    if(d.rank!=null){ var rc=el("span","rankchip","#"+d.rank+" by impact"); rc.title="Rank among rated players by on-court impact"; nmrow.appendChild(rc); }
    // availability pill — a coach's first question is "can I use her next game?"
    (function(){
      if(!si0) return;
      var p=null;
      if(si0.currently_out){ p=el("span","avail out","Out"); p.title="Currently listed as out"; }
      else if(si0.play_prob!=null){
        var pct=Math.round(si0.play_prob*100);
        if(pct>=85){ p=el("span","avail ok","Expected to play"); }
        else if(pct>=40){ p=el("span","avail warn","Questionable "+pct+"%"); }
        else { p=el("span","avail out","Doubtful "+pct+"%"); }
        p.title="Estimated chance of playing the next game: "+pct+"%";
      }
      if(p) nmrow.appendChild(p);
    })();
    hero.appendChild(nmrow);

    hero.appendChild(el("div","sub", (d.team||"—") + " · " + (d.gp!=null?d.gp:"—") + " games this season" +
      (d.min_share_pct!=null?("  · "+d.min_share_pct+"% of team minutes"):"") +
      (d.thin?"  · thin sample":"")));

    // WHY-LINE — one scannable, jargon-free sentence: who is she + why she matters.
    (function(){
      var bits=[];
      if(d.rank!=null) bits.push("Ranked #"+d.rank+" by on-court impact");
      var box=[];
      if(d.pts!=null) box.push(d.pts.toFixed(1)+" pts");
      if(d.reb!=null) box.push(d.reb.toFixed(1)+" reb");
      if(d.ast!=null) box.push(d.ast.toFixed(1)+" ast");
      var line="";
      if(bits.length) line+=bits.join(", ")+". ";
      if(box.length){
        line+="Averaging "+box.join(" / ");
        if(d.gp!=null) line+=" over "+d.gp+" game"+(d.gp===1?"":"s");
        if(d.min_avg!=null) line+=" at "+d.min_avg.toFixed(1)+" mpg";
        if(d.min_share_pct!=null) line+=", on "+d.min_share_pct+"% of team minutes";
        line+=".";
      }
      if(prov) line+=" Impact is still provisional on a thin sample — lean on the scoring and minutes for now.";
      if(line){ hero.appendChild(el("div","why", line)); }
    })();

    // IMPACT-vs-SCORING DIVERGENCE (A+-rung element 2) — the two-axis read, render-only from the
    // baked impact_rank + scoring_rank; omitted for a provisional/no-rating card (no firm impact rank).
    (function(){
      var dv=divergenceLine(d);
      if(dv){ var e=el("div","divergence", dv); e.title="Where she ranks by our on-court impact rating vs by season scoring — the gap the box score alone misses."; hero.appendChild(e); }
    })();

    // RISING/FALLING IMPACT TREND (A+-rung element 3) — the recent direction of the on-court rating,
    // render-only from the baked impact_trend; omitted for a flat/short/stale/provisional card.
    (function(){
      var tl=impactTrendLine(d.impact_trend);
      if(tl){ var te=el("div","trendline "+(tl.up?"up":"down"), tl.text); te.title=tl.title; hero.appendChild(te); }
    })();

    // AS-OF — honest per-card recency. This card's own bake can lag the site-wide strip; flag it stale.
    (function(){
      if(!d.generated_et && !d.generated_utc) return;
      var a=el("div","asof","Impact data as of "+(d.generated_et||d.generated_utc));
      if(d.generated_utc){
        var t=new Date(d.generated_utc).getTime();
        if(!isNaN(t)){
          if(window.Hardwood && window.Hardwood.agoOf){ var ago=window.Hardwood.agoOf(d.generated_utc); if(ago) a.textContent+=" · "+ago; }
          if(Date.now()-t > 2*86400000){ a.className="asof stale"; a.textContent+=" — this player's card may be stale"; }
        }
      }
      hero.appendChild(a);
    })();
    var kpis=el("div","kpis");
    function kpi(l,v,u,uc){ var k=el("div","kpi"); k.appendChild(el("div","kl",l));
      var kv=el("div","kv"); kv.textContent=(v==null?"—":v); if(u){ var s=el("small",uc||null); s.textContent=" "+u; kv.appendChild(s);} k.appendChild(kv); return k; }
    var pg=function(v){ return v==null?null:v.toFixed(1); };
    // IMPACT-FIRST: the descriptive Season Impact leads the hero when the feed has landed — a
    // results measure (what happened), weighted by floor time, with its %-of-minutes + provisional
    // flags riding alongside so a near-zero early-season value never reads as precise.
    var si=d.season_impact;
    if(si && si.rate!=null){
      var siUnit=[];
      if(si.min_share_pct!=null) siUnit.push(si.min_share_pct+"% of min");
      if(si.thin) siUnit.push("provisional");
      kpis.appendChild(kpi("Season Impact", si.rate.toFixed(3), siUnit.length?("· "+siUnit.join(" · ")):null));
    }
    // impact-first hero: our on-court rating is the lead number, counting stats after. It carries
    // its %-of-team-minutes flag AND an honest "provisional" note when the on-court basis is thin,
    // so a regressed near-zero rating never reads as a firm 0.0 (Order 2, Director v6 0740Z).
    var impUnit=[];
    if(d.min_share_pct!=null) impUnit.push(d.min_share_pct+"% of min");
    if(d.impact_provisional) impUnit.push("provisional — thin basis");
    kpis.appendChild(kpi("Impact rating", d.rating==null?null:((d.rating>0?"+":"")+d.rating.toFixed(1)),
      impUnit.length?("· "+impUnit.join(" · ")):null));
    // Minutes tile: a live next-game projection when we have one; otherwise fall back to the honest
    // season average (clearly labelled) so this tile is never a dead "—" when we do know her workload.
    if(d.minutes!=null){ kpis.appendChild(kpi("Proj. next game", d.minutes.toFixed(1), "min")); }
    else if(d.min_avg!=null){ kpis.appendChild(kpi("Minutes", d.min_avg.toFixed(1), "mpg · season avg")); }
    else { kpis.appendChild(kpi("Proj. next game", null, "min")); }
    kpis.appendChild(kpi("Points", pg(d.pts), "per game"));
    kpis.appendChild(kpi("Rebounds", pg(d.reb), "per game"));
    kpis.appendChild(kpi("Assists", pg(d.ast), "per game"));
    hero.appendChild(kpis);
    // secondary box — completes the counting-stat read (defensive line) without crowding the KPI tiles.
    (function(){
      var extra=[];
      if(d.stl!=null) extra.push("Steals "+d.stl.toFixed(1));
      if(d.blk!=null) extra.push("Blocks "+d.blk.toFixed(1));
      if(extra.length){ var sl=el("div","statline", extra.join("   ·   ")+"   per game"); hero.appendChild(sl); }
    })();
    main.appendChild(hero);

    // SEASON IMPACT — descriptive, results-WAR style (what happened, not a projection). Impact-first:
    // this is the leading card on the tab when the feed has landed. Numbers only — the feed's model
    // signature is never shown (it is a data field, not human-facing copy).
    if(si && (si.rate!=null || si.volume!=null)){
      var siCard=el("div","card pad"); siCard.style.marginBottom="12px";
      var siH=el("div"); siH.style.fontWeight="680"; siH.style.marginBottom="3px";
      siH.textContent="Season Impact";
      siCard.appendChild(siH);
      siCard.appendChild(el("div","note",
        "How much better her team has played with her on the floor this season, weighted by how much "
        + "of the game she is on it — shown per game and as a season total. This is a descriptive "
        + "measure of what has happened so far, not a projection."));
      var siK=el("div","kpis"); siK.style.marginTop="9px";
      function sikpi(l,v,u){ var k=el("div","kpi"); k.appendChild(el("div","kl",l));
        var kv=el("div","kv"); kv.textContent=(v==null?"—":v); if(u){ var s=el("small",null); s.textContent=" "+u; kv.appendChild(s);} k.appendChild(kv); return k; }
      siK.appendChild(sikpi("Per game", si.rate==null?null:si.rate.toFixed(3)));
      siK.appendChild(sikpi("Season total", si.volume==null?null:si.volume.toFixed(2)));
      siK.appendChild(sikpi("Share of minutes", si.min_share_pct==null?null:si.min_share_pct, "%"));
      siK.appendChild(sikpi("Games", si.gp==null?null:si.gp));
      siCard.appendChild(siK);
      if(si.thin){
        siCard.appendChild(el("div","note thin",
          "Provisional — this early in the season it rests on a small on-court sample, so it is "
          + "regressed toward league average and reads near zero for almost everyone. Treat it as a "
          + "rough, descriptive read rather than a firm separation between players."));
      }
      var avail=null;
      if(si.currently_out){ avail="Currently listed as out — her latest Season Impact reflects the season so far."; }
      else if(si.play_prob!=null){ avail="Expected to play (chance "+Math.round(si.play_prob*100)+"%)."; }
      if(avail){ siCard.appendChild(el("div","note",avail)); }
      main.appendChild(siCard);
    }

    // IMPACT READ — the honest framing so the near-zero rating is never mistaken for precise (B7).
    var impCard=el("div","card pad"); impCard.style.marginBottom="12px";
    var impH=el("div"); impH.style.fontWeight="680"; impH.style.marginBottom="3px";
    impH.textContent="Impact read"; impCard.appendChild(impH);
    var impTxt;
    if(prov){
      impTxt="Our on-court impact rating measures how much better the team plays with her on the floor. "
        + "This early in the season it rests on only " + (nb!=null?nb:"a few") + " on-court stretch"
        + (nb===1?"":"es") + " — far short of a full-season sample — so it is heavily regressed toward "
        + "league average and reads near zero for almost everyone. It does not yet separate players; treat "
        + "this number as provisional. For a reliable read right now, use her season scoring and share of minutes above.";
    } else {
      impTxt="Our on-court impact rating measures how much better the team plays with her on the floor "
        + "(plus-minus style), now built on " + (nb!=null?nb:"enough") + " on-court stretch" + (nb===1?"":"es")
        + " this season — enough to start separating her from league average.";
    }
    impCard.appendChild(el("div","note",impTxt));
    main.appendChild(impCard);

    if(d.rookie_prior){
      var rp = el("section"); rp.appendChild(el("h2",null,"Rookie starting projection"));
      var rc = el("div","card pad");
      rc.appendChild(el("div","note","Starting prior mapped from "+(d.rookie_prior.source||"college")+" profile ("+(d.rookie_prior.model||"N1")+")."));
      var rkpis = el("div","kpis");
      rkpis.style.marginTop = "8px";
      function rkpi(l,v){ var k=el("div","kpi"); k.appendChild(el("div","kl",l)); k.appendChild(el("div","kv",v==null?"—":v)); return k; }
      rkpis.appendChild(rkpi("Proj WAR", d.rookie_prior.war==null?null:d.rookie_prior.war.toFixed(1)));
      rkpis.appendChild(rkpi("Proj PTS", d.rookie_prior.pts==null?null:d.rookie_prior.pts.toFixed(1)));
      rkpis.appendChild(rkpi("Proj REB", d.rookie_prior.reb==null?null:d.rookie_prior.reb.toFixed(1)));
      rkpis.appendChild(rkpi("Proj AST", d.rookie_prior.ast==null?null:d.rookie_prior.ast.toFixed(1)));
      if(d.rookie_prior.min!=null) rkpis.appendChild(rkpi("Proj MIN", d.rookie_prior.min.toFixed(1)));
      rc.appendChild(rkpis);
      rp.appendChild(rc);
      main.appendChild(rp);
    }

    var s1=el("section"); s1.appendChild(el("h2",null,"Rating trajectory"));
    var c1=el("div","card"), p1=el("div","pad"); p1.appendChild(trajSvg(d.trajectory, d.impact_trend)); c1.appendChild(p1); s1.appendChild(c1);
    s1.appendChild(el("div","note","How her on-court impact rating has moved across the season (higher is better). The dot marks the latest value, labelled with its recent change when the rating has moved materially. Early-season values rest on a small on-court sample and are provisional."));
    main.appendChild(s1);

    var s2=el("section"); s2.appendChild(el("h2",null,"Realm of outcomes"));
    var c2=el("div","card"); c2.appendChild(realmTable(d.realm||{}, d.realm_order||[])); s2.appendChild(c2);
    s2.appendChild(el("div","note","The spread of plausible box-score outcomes, built from how far our past projections for similar players actually missed. A range, not a betting line."));
    main.appendChild(s2);

    var s3=el("section"); s3.appendChild(el("h2",null,"Closest rating comps"));
    if(d.comps && d.comps.length){
      var wrap=el("div","comps");
      d.comps.forEach(function(c){ var e=el("div","comp");
        e.appendChild(el("b",null,c.name)); e.appendChild(document.createTextNode(" "));
        e.appendChild(el("span",null,(c.team||"")+" · "+((c.rating>0?"+":"")+c.rating.toFixed(1)))); wrap.appendChild(e); });
      s3.appendChild(wrap);
    } else { s3.appendChild(el("p","empty","No comps available.")); }
    main.appendChild(s3);

    document.getElementById("foot").textContent="Baked "+(d.generated_et||d.generated_utc||"")+". Every figure is read from a core pipeline table — this page renders, it never computes.";
    tryBio();
  }

  function load(){
    var id=safeId(qid());
    curId=id;
    if(!id){ document.getElementById("main").innerHTML='<p class="empty">No player selected. <a href="./players.html">Back to players.</a></p>'; return; }
    fetch("./roster_meta.json?v="+Date.now(),{cache:"no-cache"})
      .then(function(r){ return r.ok?r.json():null; })
      .then(function(j){ ROSTER=j; tryBio(); }).catch(function(){});
    fetch("./players/"+id+".json",{cache:"no-cache"}).then(function(r){
      if(!r.ok) throw new Error("not found"); return r.json();
    }).then(render).catch(function(){
      document.getElementById("main").innerHTML='<p class="empty">Player not found in the current board. <a href="./players.html">Back to players.</a></p>';
    });
  }
  load();
})();
</script>
</body>
</html>
