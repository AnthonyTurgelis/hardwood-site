<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — The Team</title>
<style>
  :root{ --bg:#f4f6f8; --card:#fff; --card2:#f7f9fc; --ink:#161a21; --muted:#5a6675; --dim:#8a93a3;
    --line:#e3e7ee; --line2:#d3d9e3; --acc:#2b6cb0; --shadow:0 1px 2px rgba(20,24,35,.06); }
  @media (prefers-color-scheme:dark){ :root{ --bg:#0d1117; --card:#161b22; --card2:#1c2330; --ink:#e6edf3;
    --muted:#9aa7b4; --dim:#6b7684; --line:#242c38; --line2:#39424f; --acc:#58a6ff; --shadow:none; } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13.5px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  header{padding:10px 14px 4px;max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:17px;margin:0}
  .ago{font-size:11px;color:var(--dim);white-space:nowrap}
  .sub{color:var(--muted);font-size:12px;max-width:1080px;margin:0 auto;padding:0 14px}
  nav{display:flex;gap:5px;flex-wrap:wrap;max-width:1080px;margin:6px auto 0;padding:0 14px}
  nav a{font-size:12px;text-decoration:none;color:var(--acc);border:1px solid var(--line);background:var(--card);padding:4px 10px;border-radius:999px}
  nav a.active{background:var(--acc);color:#fff;border-color:var(--acc)}
  main{max-width:1080px;margin:0 auto;padding:8px 14px 48px}
  .lede{color:var(--muted);font-size:12.5px;margin:8px 0 14px;max-width:760px}
  .grp{margin:16px 0}
  .grp h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 3px;font-weight:700}
  .grp .gb{color:var(--dim);font-size:12px;margin:0 0 9px}
  .seats{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:9px}
  .seat{background:var(--card);border:1px solid var(--line);border-radius:9px;box-shadow:var(--shadow);padding:10px 12px}
  .seat .role{font-weight:680;font-size:13px}
  .seat .does{color:var(--muted);font-size:12px;margin-top:3px;line-height:1.45}
  .strip{margin:6px 0 20px}
  .striphead{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;margin:0 0 8px}
  .striphead h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0;font-weight:700}
  .striphead .sum{color:var(--dim);font-size:12px}
  .agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:7px}
  .achip{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:7px 10px}
  .achip.working{border-color:var(--acc);background:var(--card)}
  .arole{display:flex;align-items:center;gap:6px;font-weight:680;font-size:12.5px}
  .aact{color:var(--muted);font-size:11.5px;margin-top:2px;line-height:1.4}
  .adot{width:7px;height:7px;border-radius:50%;background:var(--line2);flex:none}
  .achip.working .adot{background:var(--acc)}
  .empty{color:var(--dim);font-style:italic}
  footer{max-width:1080px;margin:0 auto;padding:16px 14px;color:var(--dim);font-size:11px}
</style>
<link rel="stylesheet" href="./hardwood.css">
</head>
<body>
<header>
  <h1>The Hardwood — The Team</h1>
  <span class="ago" id="ago"></span>
</header>
<div class="sub">The role-separated team behind every number on the board.</div>
<nav>
  <a href="./index.html">Board</a>
  <a href="./queue.html">What's Next</a>
  <a href="./games.html">Games</a>
  <a href="./availability.html">Injuries</a>
  <a href="./teams.html">Teams</a>
  <a href="./coach.html">Coach</a>
  <a href="./players.html">Players</a>
  <a href="./review.html">Daily Review</a>
  <a href="./accuracy.html">Our Accuracy</a>
  <a href="./ledger.html">Error Map</a>
  <a class="active" href="./org.html">The Team</a>
  <a href="./scouting.html">Scouting</a>
  <a href="./deepdive.html">Deep Dives</a>
</nav>
<main id="main"><p class="empty">Loading…</p></main>
<footer id="foot"></footer>
<script src="./hardwood.js"></script>
<script>
(function(){
  "use strict";
  function el(t,c,x){ var e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; }
  function render(d){
    var main=document.getElementById("main"); main.innerHTML="";
    if(d.intro){ main.appendChild(el("p","lede",d.intro)); }
    if(d.strip && (d.strip.seats||[]).length){
      var strip=el("div","strip");
      var head=el("div","striphead");
      head.appendChild(el("h2",null,"Working right now"));
      if(d.strip.summary){ head.appendChild(el("span","sum",d.strip.summary)); }
      strip.appendChild(head);
      var ag=el("div","agrid");
      (d.strip.seats||[]).forEach(function(st){
        var c=el("div","achip"+(st.state==="working"?" working":""));
        var r=el("div","arole");
        r.appendChild(el("span","adot"));
        r.appendChild(el("span",null,st.role));
        c.appendChild(r);
        c.appendChild(el("div","aact",st.activity));
        ag.appendChild(c);
      });
      strip.appendChild(ag); main.appendChild(strip);
    }
    (d.groups||[]).forEach(function(g){
      var s=el("div","grp");
      s.appendChild(el("h2",null,g.name));
      if(g.blurb){ s.appendChild(el("p","gb",g.blurb)); }
      var grid=el("div","seats");
      (g.seats||[]).forEach(function(st){
        var c=el("div","seat");
        c.appendChild(el("div","role",st.role));
        c.appendChild(el("div","does",st.does));
        grid.appendChild(c);
      });
      s.appendChild(grid); main.appendChild(s);
    });
    if(!(d.groups||[]).length){ main.appendChild(el("p","empty","Team structure coming soon.")); }
    document.getElementById("foot").textContent="Baked "+(d.generated_et||d.generated_utc||"")+".";
  }
  var lastFetch=0;
  function updAgo(){ var a=document.getElementById("ago"); if(!a)return;
    if(!lastFetch){ a.innerHTML=""; return; }
    var s=Math.max(0,Math.round((Date.now()-lastFetch)/1000));
    a.innerHTML="live · updated <b>"+(s<60?(s+"s ago"):(Math.floor(s/60)+"m ago"))+"</b>"; }
  function poll(){ fetch("./org.json",{cache:"no-cache"}).then(function(r){ return r.json(); })
    .then(function(d){ lastFetch=Date.now(); render(d); updAgo(); })
    .catch(function(e){ if(!lastFetch){ document.getElementById("main").innerHTML='<p class="empty">Could not load. '+(e&&e.message?e.message:"")+'</p>'; } }); }
  poll(); setInterval(poll,300000); setInterval(updAgo,1000);
})();
</script>
</body>
</html>
