<style>
  :root{ --bg:#f4f6f8; --card:#fff; --card2:#f7f9fc; --ink:#161a21; --muted:#5a6675; --dim:#8a93a3;
    --line:#e3e7ee; --line2:#d3d9e3; --acc:#2b6cb0; --good:#1f883d; --bad:#c62828; --warn:#9a6700;
    --chip:#eef2f8; --flash:rgba(43,108,176,.20); --shadow:0 1px 2px rgba(20,24,35,.06); }
  @media (prefers-color-scheme:dark){ :root{ --bg:#0d1117; --card:#161b22; --card2:#1c2330; --ink:#e6edf3;
    --muted:#9aa7b4; --dim:#6b7684; --line:#242c38; --line2:#39424f; --acc:#58a6ff; --good:#3fb950; --bad:#ff7b72;
    --warn:#d29922; --chip:#21324a; --flash:rgba(88,166,255,.26); --shadow:none; } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13.5px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  header{padding:10px 14px 4px;max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:17px;margin:0}
  .sub{color:var(--muted);font-size:12px;max-width:1080px;margin:0 auto;padding:0 14px}
  .ago{font-size:11px;color:var(--dim);white-space:nowrap}
  .ago b{color:var(--good);font-variant-numeric:tabular-nums}
  nav{display:flex;gap:5px;flex-wrap:wrap;max-width:1080px;margin:6px auto 0;padding:0 14px}
  nav a{font-size:12px;text-decoration:none;color:var(--acc);border:1px solid var(--line);background:var(--card);padding:4px 10px;border-radius:999px}
  nav a.active{background:var(--acc);color:#fff;border-color:var(--acc)}
  main{max-width:1080px;margin:0 auto;padding:8px 14px 48px}
  .lede{color:var(--muted);font-size:12.5px;margin:6px 0}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:16px 0 8px;font-weight:700}
  .card{background:var(--card);border:1px solid var(--line);border-radius:9px;box-shadow:var(--shadow);overflow:hidden}
  .scroll{overflow-x:auto}
  table{border-collapse:collapse;width:100%;font-size:12.5px;font-variant-numeric:tabular-nums}
  th,td{padding:5px 9px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
  th:first-child,td:first-child,th:nth-child(2),td:nth-child(2){text-align:left}
  th{color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.03em;background:var(--card2)}
  tr[data-k]{transition:background .3s}
  tr.flash td{animation:fl 1.1s ease}
  @keyframes fl{0%{background:var(--flash)}100%{background:transparent}}
  .rk{color:var(--dim);width:1.6em}
  .tm{font-weight:640}
  .full{color:var(--muted);font-weight:400;font-size:11px}
  .up{color:var(--good);font-weight:600}.down{color:var(--bad);font-weight:600}.flat{color:var(--dim)}
  .strong{font-weight:680}
  .scell{display:flex;align-items:center;justify-content:flex-end;gap:7px}
  .sbar{position:relative;width:54px;height:6px;border-radius:3px;background:var(--line2);overflow:hidden;flex:none}
  .sbar>i{position:absolute;left:0;top:0;bottom:0;background:var(--acc);border-radius:3px}
  .sval{font-weight:680;font-variant-numeric:tabular-nums;min-width:2.8em}
  .lock{color:var(--good);font-weight:640}.out{color:var(--dim)}
  .summary{background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin:8px 0 4px;font-size:12.5px;line-height:1.55}
  .summary b{color:var(--ink)}
  .summary .k{color:var(--muted);font-weight:600}
  .summary .recon{margin-top:7px;padding-top:7px;border-top:1px solid var(--line);color:var(--muted);font-weight:400;font-size:11.5px;line-height:1.5}
  /* board-level 'as of' freshness badge — the SAME pill used on players / status / deep dives; names
     the date the title odds were last computed, and goes LOUD red when that date is 2+ days behind the
     board's own bake date (never a silent stale board passed off as fresh). Sourced ONLY from a real
     timestamp; omitted entirely when absent (never a fabricated fresh tick). */
  .asof{display:inline-block;font-size:9.5px;font-weight:700;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:1px 8px;margin-left:9px;vertical-align:middle;font-variant-numeric:tabular-nums;text-transform:uppercase;letter-spacing:.03em}
  .asof.stale{color:#fff;background:var(--bad);border-color:var(--bad)}
  /* 'biggest mover since yesterday' callout — the accent-bordered takeaway tile (the deep-dive look).
     Names the team whose title odds moved most day-over-day, straight from the real title_delta; the
     whole tile is OMITTED when no prior-day snapshot exists (never a fabricated mover). */
  .mover{display:flex;gap:9px;align-items:baseline;margin:8px 0 4px;padding:8px 12px;background:var(--flash);border-left:3px solid var(--acc);border-radius:7px;font-size:12.5px}
  .mover-k{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--acc);white-space:nowrap}
  .mover-t{color:var(--ink);line-height:1.4}
  .mover-t b{font-weight:700}
  .mover-field{color:var(--muted);font-style:italic}
  /* per-team title-odds SPARKLINE + N-day trend arrow (viz-teams-trend-sparkline). Inline SVG,
     theme-aware (line = currentColor off a muted var; endpoint dot colored by net direction),
     phone-safe (fixed 64px in the existing horizontal-scroll table). A team with <2 snapshot days
     renders no line and no arrow (a plain — ), never a fabricated flat trend. */
  .sparkwrap{display:flex;align-items:center;justify-content:flex-end;gap:7px}
  .spark{display:block;color:var(--line2);flex:none}
  .spark path{fill:none;stroke:currentColor;stroke-width:1.4;stroke-linejoin:round;stroke-linecap:round}
  .tarr{min-width:3.1em;text-align:right;font-variant-numeric:tabular-nums}
  .tier td{background:var(--card2);border-top:2px solid var(--line2);text-align:left;padding:7px 9px}
  .tlabel{font-weight:700;color:var(--ink);font-size:12px}
  .tmeaning{color:var(--muted);font-weight:400;font-size:11px;margin-left:6px}
  .tcount{color:var(--dim);font-weight:600;font-size:11px;float:right}
  .empty{color:var(--dim);font-style:italic}
  .note{font-size:10.5px;color:var(--dim);margin-top:6px;line-height:1.5}
  .coachrow{display:flex;flex-wrap:wrap;align-items:baseline;gap:4px 12px;padding:8px 12px;border-bottom:1px solid var(--line)}
  .coachrow:last-child{border-bottom:none}
  .coachrow .ctm{font-weight:700;min-width:2.6em}
  .coachrow .cfull{color:var(--dim);font-size:11px}
  .coachrow .cline{color:var(--ink);font-size:12.5px;margin-left:auto;text-align:right}
  @media (max-width:560px){ .coachrow .cline{margin-left:0;text-align:left;flex-basis:100%} }
  .filt{width:100%;max-width:280px;margin:0 0 8px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);font-size:12.5px}
  footer{max-width:1080px;margin:0 auto;padding:16px 14px;color:var(--dim);font-size:11px}
</style>

<script src="./hardwood.js"></script>
<script>
(function(){
  "use strict";
  var URL="./teams.json", curData=null, teamFilter="";
  function el(t,c,x){ var e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; }
  function td(c,x){ return el("td",c,x); }
  // Render an ISO date (YYYY-MM-DD) as plain "Jul 15" — no timezone jargon, no Date() TZ shift.
  var MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function plainDate(iso){
    if(!iso||typeof iso!=="string") return "";
    var m=iso.match(/^(\d{4})-(\d{2})-(\d{2})/); if(!m) return iso;
    return (MON[parseInt(m[2],10)-1]||m[2])+" "+parseInt(m[3],10);
  }

  // Shared 'as of' freshness badge (same shape/behaviour as players.html / index.html): a pill naming
  // the date the data was computed, badged STALE (red) when that date is 2+ days behind the board's own
  // date — a genuine freeze, past the normal overnight "no games played yet" gap. DATA-INTEGRITY:
  // returns null when there is no real date (never a fabricated fresh tick).
  function asofBadge(asOf, boardDate){
    if(!asOf) return null;
    var b=el("span","asof","as of "+plainDate(asOf));
    var a=/^(\d{4})-(\d{2})-(\d{2})/.exec(asOf), d=/^(\d{4})-(\d{2})-(\d{2})/.exec(boardDate||"");
    if(a && d){
      var da=Date.UTC(+a[1],+a[2]-1,+a[3]), dd=Date.UTC(+d[1],+d[2]-1,+d[3]);
      var days=Math.round((dd-da)/86400000);
      if(days>=2){ b.className="asof stale"; b.title="These title odds have not refreshed in "+days+" days."; }
    }
    return b;
  }

  // 'Biggest mover since yesterday' callout — the team whose title odds moved most day-over-day, read
  // STRICTLY from the real title_delta baked by read_teams (today's p_champion minus the PRIOR daily
  // snapshot's, in points). DATA-INTEGRITY (CEO #1): if NO team carries a title_delta (no prior-day
  // snapshot yet — day-over-day tracking hasn't started), the whole callout is OMITTED; a mover is
  // never invented. When deltas exist but the field is essentially flat, we say so honestly rather
  // than crown a non-move. Uses the same 0.05-pt "meaningful move" floor as the table's 1-day column.
  // FIELD-RELATIVE read for the biggest mover — where its move sits in TODAY's title_delta
  // distribution across the WHOLE board, derived at render from the SAME deltas already rendered
  // (no new source, no DB). Returns a short honest clause (or null). Thresholds:
  //   MOVE_FLOOR = 0.05 pts -> a title_delta counts as a "move" (same floor the mover callout +
  //                            the table's 1-day column use).
  //   BIG_MOVE   = 0.40 pts -> the "notable" magnitude; crown uniqueness ("the only move over
  //                            0.4 pts") ONLY when exactly one team clears it (that team is the
  //                            mover, since it carries the max |delta|).
  //   QUIET_MAX  = 4 movers -> up to this many moves reads as a quiet field; more is a busy day.
  // HONESTY: no fabricated superlatives — if many teams moved similarly we say "a busy day for
  // the field", never a false crown; the phrasing is always literally true of the distribution.
  // Returns null when the mover itself is a sub-floor non-move (the flat-day branch owns that).
  function fieldRelative(withDelta, mover){
    var MOVE_FLOOR=0.05, BIG_MOVE=0.40, QUIET_MAX=4;
    if(!mover || Math.abs(mover.title_delta)<MOVE_FLOOR) return null;
    var n=withDelta.filter(function(r){ return Math.abs(r.title_delta)>=MOVE_FLOOR; }).length;
    var big=withDelta.filter(function(r){ return Math.abs(r.title_delta)>BIG_MOVE; }).length;
    if(n<=1) return "the only move today";                                  // nobody else budged
    if(big===1) return "the only move over "+BIG_MOVE.toFixed(1)+" pts today";  // uniquely large
    return "largest of "+n+" moves — a "+(n<=QUIET_MAX?"quiet":"busy")+" day for the field";
  }

  function moverCallout(d){
    var teams=d&&d.teams;
    if(!teams||!teams.length) return null;
    var withDelta=teams.filter(function(r){ return r.title_delta!=null; });
    if(!withDelta.length) return null;   // no prior-day snapshot -> omit, never fabricate a mover
    var mover=null;
    withDelta.forEach(function(r){ if(!mover||Math.abs(r.title_delta)>Math.abs(mover.title_delta)) mover=r; });
    var box=el("div","mover");
    box.appendChild(el("span","mover-k","Biggest mover"));
    var t=el("span","mover-t"), nm=mover.team_full||mover.team;
    if(mover.title_delta>=0.05 || mover.title_delta<=-0.05){
      var up=mover.title_delta>0;
      t.appendChild(el("b",null,nm));
      t.appendChild(document.createTextNode(" "));
      t.appendChild(el("span",up?"up":"down",up?"▲":"▼"));
      t.appendChild(document.createTextNode(" "+(up?"climbed":"slipped")+" "));
      t.appendChild(el("b",null,Math.abs(mover.title_delta).toFixed(1)));
      t.appendChild(document.createTextNode(" pts in title odds since yesterday"));
      var fr=fieldRelative(withDelta, mover);
      if(fr){
        t.appendChild(document.createTextNode(" — "));
        t.appendChild(el("span","mover-field",fr));
      }
    } else {
      t.textContent="Title odds held steady since yesterday (largest move "+Math.abs(mover.title_delta).toFixed(1)+" pts).";
    }
    box.appendChild(t);
    return box;
  }

  // Inline SVG sparkline of a compact numeric series (title odds over the last N snapshot days).
  // Returns null for <2 real points so the cell degrades to a plain dash rather than draw a fake
  // flat line. Endpoint dot is colored by the net move across the window (up/down/flat).
  var SVGNS="http://www.w3.org/2000/svg";
  function sparkline(vals){
    var pts=(vals||[]).filter(function(v){ return v!=null; });
    if(pts.length<2) return null;
    var W=64,H=18,p=2,n=pts.length;
    var min=Math.min.apply(null,pts), max=Math.max.apply(null,pts), span=(max-min)||1;
    function xs(i){ return p+(W-2*p)*(i/(n-1)); }
    function ys(v){ return H-p-(H-2*p)*((v-min)/span); }
    var svg=document.createElementNS(SVGNS,"svg");
    svg.setAttribute("class","spark"); svg.setAttribute("width",W); svg.setAttribute("height",H);
    svg.setAttribute("viewBox","0 0 "+W+" "+H); svg.setAttribute("aria-hidden","true");
    var d=pts.map(function(v,i){ return (i?"L":"M")+xs(i).toFixed(1)+" "+ys(v).toFixed(1); }).join(" ");
    var path=document.createElementNS(SVGNS,"path"); path.setAttribute("d",d); svg.appendChild(path);
    var net=pts[n-1]-pts[0];
    var dot=document.createElementNS(SVGNS,"circle");
    dot.setAttribute("cx",xs(n-1).toFixed(1)); dot.setAttribute("cy",ys(pts[n-1]).toFixed(1));
    dot.setAttribute("r","2");
    dot.setAttribute("fill", net>0.05?"var(--good)":(net<-0.05?"var(--bad)":"var(--dim)"));
    svg.appendChild(dot);
    return svg;
  }
  // Trend cell = sparkline (last ~2 weeks of title odds) + a ~7-day title-odds move arrow. HONEST:
  // no arrow (a plain —) when the store has too few days to compute a real move.
  function trendCell(tr){
    var cell=el("td");
    if(!tr){ cell.appendChild(el("span","flat","—")); return cell; }
    var wrap=el("div","sparkwrap");
    var sp=sparkline(tr.title); if(sp) wrap.appendChild(sp);
    var mv=tr.title_move;
    if(mv==null || tr.days<2){ wrap.appendChild(el("span","flat tarr","—")); }
    else if(mv>=0.05){ wrap.appendChild(el("span","up tarr","▲ "+mv.toFixed(1))); }
    else if(mv<=-0.05){ wrap.appendChild(el("span","down tarr","▼ "+Math.abs(mv).toFixed(1))); }
    else { wrap.appendChild(el("span","flat tarr","→ 0")); }
    cell.appendChild(wrap); return cell;
  }
  // 'Biggest riser this week' callout — the team whose title odds climbed most over the last ~7
  // snapshot days, read from the baked per-team trend. DATA-INTEGRITY: omitted entirely when no
  // team carries a computable multi-day move (never invents a mover); says so honestly when the
  // field's largest move is essentially flat.
  function weekRiserCallout(d){
    var teams=d&&d.teams;
    if(!teams||!teams.length) return null;
    var withMove=teams.filter(function(r){ return r.trend && r.trend.title_move!=null && r.trend.days>=2; });
    if(!withMove.length) return null;
    var riser=null;
    withMove.forEach(function(r){ if(!riser || r.trend.title_move>riser.trend.title_move) riser=r; });
    var days=riser.trend.move_days||7, nm=riser.team_full||riser.team;
    var box=el("div","mover");
    box.appendChild(el("span","mover-k","This week"));
    var t=el("span","mover-t");
    if(riser.trend.title_move>=0.05){
      t.appendChild(el("b",null,nm));
      t.appendChild(document.createTextNode(" "));
      t.appendChild(el("span","up","▲"));
      t.appendChild(document.createTextNode(" is the biggest riser — "));
      t.appendChild(el("b",null,"+"+riser.trend.title_move.toFixed(1)));
      t.appendChild(document.createTextNode(" pts in title odds over the last "+days+" days"));
    } else {
      t.textContent="Title odds barely moved across the field over the last "+days+" days "+
        "(largest gain "+riser.trend.title_move.toFixed(1)+" pts).";
    }
    box.appendChild(t);
    return box;
  }

  function churnCell(v){
    if(v==null) return td("flat","—");
    if(v>0.3) return td("up","▲ "+v.toFixed(1));
    if(v<-0.3) return td("down","▼ "+Math.abs(v).toFixed(1));
    return td("flat","→ "+v.toFixed(1));
  }
  function deltaCell(v){
    if(v==null) return td("flat","—");
    if(v>0.05) return td("up","+"+v.toFixed(1));
    if(v<-0.05) return td("down",v.toFixed(1));
    return td("flat","0");
  }
  function strengthCell(s,frac){
    var cell=el("td");
    if(s==null){ cell.appendChild(el("span","flat","—")); return cell; }
    var wrap=el("div","scell");
    var bar=el("span","sbar"); var fill=el("i"); fill.style.width=Math.round(frac*100)+"%";
    bar.appendChild(fill);
    wrap.appendChild(bar);
    wrap.appendChild(el("span","sval", s.toFixed(1)));
    cell.appendChild(wrap); return cell;
  }
  function playoffCell(v){
    if(v==null) return td("flat","—");
    if(v>=90) return td("lock", v.toFixed(0)+"%");
    if(v<=10) return td("out", v.toFixed(0)+"%");
    return td(null, v.toFixed(0)+"%");
  }
  // coach tiers, derived (display-only) from the sim's title + playoff odds already in the feed
  function tierOf(r){
    var t=r.title_pct, p=r.playoff_pct;
    if(t!=null && t>=10) return "contender";
    if(p!=null && p>=85) return "mix";
    if(p!=null && p>=15) return "bubble";
    return "string";
  }
  var TIERS=[
    ["contender","Title contenders","a real shot at the championship"],
    ["mix","In the mix","playoff-bound, but longer title odds"],
    ["bubble","On the bubble","fighting for a playoff spot"],
    ["string","Playing out the string","out of the playoff race"]
  ];

  // PLAYOFF PICTURE — per-team seed odds + projected-win band read from ./playoff_odds.json.
  // Complements (never replaces) the championship number already on the board. Re-inserted at
  // the end of every render so it survives the 60s poll re-render; graceful null when absent.
  var PLAYOFF=null;
  function fmtPct(p){
    if(p==null) return "—";
    var v=p*100;
    if(v>=99.5) return ">99%";
    if(v>0 && v<0.5) return "<1%";
    return Math.round(v)+"%";
  }
  function insertPlayoff(){
    if(!PLAYOFF || !PLAYOFF.teams || !PLAYOFF.teams.length) return;
    var main=document.getElementById("main"); if(!main) return;
    var old=document.getElementById("playoffpic"); if(old && old.parentNode) old.parentNode.removeChild(old);
    var full={};
    if(curData && curData.teams){ curData.teams.forEach(function(r){ if(r.team) full[r.team]=r.team_full; }); }
    var teams=PLAYOFF.teams.slice().sort(function(a,b){
      var pa=a.p_top_2==null?-1:a.p_top_2, pb=b.p_top_2==null?-1:b.p_top_2;
      if(pb!==pa) return pb-pa;
      var wa=a.mean_wins==null?-1:a.mean_wins, wb=b.mean_wins==null?-1:b.mean_wins;
      return wb-wa;
    });
    var sec=el("section"); sec.id="playoffpic";
    sec.appendChild(el("h2",null,"Playoff Picture"));
    var card=el("div","card"); var sc=el("div","scroll");
    var t=el("table"); var thead=el("thead"); var hr=el("tr");
    ["Team","Proj. wins","80% win range","Playoffs","Top-2 seed"].forEach(function(h){ hr.appendChild(el("th",null,h)); });
    thead.appendChild(hr); t.appendChild(thead);
    var tb=el("tbody");
    teams.forEach(function(r){
      var tr=el("tr");
      var name=el("td","tm"); name.appendChild(document.createTextNode((r.team||"—")+" "));
      if(full[r.team]) name.appendChild(el("span","full", full[r.team]));
      tr.appendChild(name);
      tr.appendChild(td(null, r.mean_wins==null?"—":r.mean_wins.toFixed(1)));
      var band="—", wr=r.wins_range_80;
      if(wr && wr.length===2 && wr[0]!=null && wr[1]!=null){ band=wr[0].toFixed(1)+"-"+wr[1].toFixed(1); }
      tr.appendChild(td("full", band));
      tr.appendChild(playoffCell(r.p_playoff==null?null:r.p_playoff*100));
      tr.appendChild(td(r.p_top_2!=null&&r.p_top_2>=0.10?"strong":null, fmtPct(r.p_top_2)));
      tb.appendChild(tr);
    });
    t.appendChild(tb); sc.appendChild(t); card.appendChild(sc); sec.appendChild(card);
    sec.appendChild(el("div","note",
      "Projected final wins and playoff odds from simulating the rest of the season. "+
      "The 80% win range is where a team's final win total lands in about 8 of every 10 simulations "+
      "(its projected wins sit in the middle) — a spread of likely outcomes, not a win probability. "+
      "Teams are ordered by their chance at a top-two seed (the double-bye tier), then by projected wins. "+
      "This complements the championship number in the board above."));
    main.appendChild(sec);
  }

  // COACH & STYLE -- per-team head coach + role-distribution style, read from ./coach_style.json.
  // Complements the power board; re-inserted at the end of every render so it survives the 60s
  // poll re-render. Graceful null when the file is absent or a team has no entry.
  var COACH=null;
  function insertCoach(){
    if(!COACH || !COACH.teams) return;
    var main=document.getElementById("main"); if(!main) return;
    var old=document.getElementById("coachstyle"); if(old && old.parentNode) old.parentNode.removeChild(old);
    // Order + full names off the board's own team list (strength order); fall back to file key order.
    var order=[], full={};
    if(curData && curData.teams){ curData.teams.forEach(function(r){ if(r.team){ order.push(r.team); full[r.team]=r.team_full; } }); }
    if(!order.length){ order=Object.keys(COACH.teams); }
    var styles=(COACH.card&&COACH.card.styles)||{};
    var sec=el("section"); sec.id="coachstyle";
    sec.appendChild(el("h2",null,(COACH.card&&COACH.card.title)||"Coach & Style"));
    var card=el("div","card"); var any=false;
    order.forEach(function(tm){
      var c=COACH.teams[tm]; if(!c) return; any=true;
      var row=el("div","coachrow");
      row.appendChild(el("span","ctm", tm));
      if(full[tm]) row.appendChild(el("span","cfull", full[tm]));
      var line=el("span","cline", c.line || ((c.coach||"")+(c.style?(" - "+c.style):"")));
      var desc=c.style_key && styles[c.style_key] && styles[c.style_key].desc;
      if(desc) line.title=desc;   // optional tooltip legend
      row.appendChild(line);
      card.appendChild(row);
    });
    if(!any) return;
    sec.appendChild(card);
    if(COACH.card && COACH.card.blurb) sec.appendChild(el("div","note", COACH.card.blurb));
    main.appendChild(sec);
  }

  function summaryLine(d){
    var teams=d&&d.teams;
    if(!teams||!teams.length) return null;
    var box=el("div","summary");
    function nm(r){ return r?(r.team_full||r.team):"—"; }
    // Impact-first: the coach's first question is who wins it all.
    var byTitle=teams.filter(function(r){ return r.title_pct!=null; }).slice()
      .sort(function(a,b){ return b.title_pct-a.title_pct; });
    var fav=byTitle[0]||null;
    var chasers=byTitle.slice(1).filter(function(r){ return r.title_pct>=10; }).slice(0,4);
    var lines=[];
    if(fav){
      var t='<span class="k">Title favorite</span> <b>'+nm(fav)+'</b> '+fav.title_pct.toFixed(1)+'%';
      if(chasers.length) t+=' <span class="k">— right behind:</span> '+chasers.map(function(r){
        return '<b>'+r.team+'</b> '+r.title_pct.toFixed(1)+'%'; }).join(', ');
      lines.push(t);
    }
    var top=teams[0]; // #1 by strength (feed is strength-ranked)
    lines.push('<span class="k">Strongest roster right now</span> <b>'+nm(top)+'</b>');
    var hot=null,cold=null;
    teams.forEach(function(r){
      if(r.churn==null) return;
      if(r.churn>0.3 && (!hot||r.churn>hot.churn)) hot=r;
      if(r.churn<-0.3 && (!cold||r.churn<cold.churn)) cold=r;
    });
    var mo=[];
    if(hot) mo.push('<span class="up">▲</span> <b>'+nm(hot)+'</b> heating up');
    if(cold) mo.push('<span class="down">▼</span> <b>'+nm(cold)+'</b> cooling');
    if(mo.length) lines.push('<span class="k">Form</span> '+mo.join(' &nbsp;·&nbsp; ')+' <span class="k">(last ~5 games)</span>');
    // (Biggest mover is now its own accent callout below the summary — see moverCallout().)
    // Per-surface freshness so a coach knows how current each read is (plain date/time, no jargon).
    var fresh=[];
    if(d.generated_et) fresh.push('strength &amp; momentum updated <b>'+d.generated_et+'</b>');
    if(d.title_as_of) fresh.push('title odds current through <b>'+plainDate(d.title_as_of)+'</b>');
    if(fresh.length) lines.push('<span class="k">Freshness</span> '+fresh.join(' &nbsp;&middot;&nbsp; '));
    box.innerHTML=lines.join('<br>');
    // Reconcile the two rankings when the strongest roster isn't the title favorite.
    if(fav && top && fav.team!==top.team){
      var recon=el("div","recon");
      recon.textContent="Why the strongest roster ("+nm(top)+") isn't the title favorite ("+nm(fav)+"): "+
        "strength rates each roster on the court right now, while title odds come from playing out the rest of the season — "+
        "so playoff seeding and a team's remaining schedule can hand a slightly weaker roster a clearer path to the trophy.";
      box.appendChild(recon);
    }
    return box;
  }

  function render(d){
    curData=d;
    var main=document.getElementById("main"); main.innerHTML="";
    document.getElementById("foot").textContent="Baked "+(d.generated_et||d.generated_utc||"")+". Strength ranks the roster on our season-long model. Momentum is recent form, not the ranking basis. Title odds come from simulating the rest of the season.";
    if(!d.available){ main.appendChild(el("p","empty", d.note||"Power board being built.")); insertPlayoff(); insertCoach(); return; }
    var lede=el("p","lede", d.source||"");
    // Board-level 'as of' freshness badge on the lede (title odds are the dated read); real date only.
    var ab=asofBadge(d.title_as_of||d.date, d.date); if(ab) lede.appendChild(ab);
    main.appendChild(lede);
    var sm=summaryLine(d); if(sm) main.appendChild(sm);
    // Biggest mover since yesterday — its own accent callout; omitted when no prior-day snapshot exists.
    var mv=moverCallout(d); if(mv) main.appendChild(mv);
    // Biggest riser over the last ~week — read from the multi-day snapshot trend; omitted when
    // no team has a computable multi-day move.
    var wr=weekRiserCallout(d); if(wr) main.appendChild(wr);
    // relative strength-bar scale across the field (min→max, with a visible floor)
    var sv=d.teams.map(function(r){ return r.strength; }).filter(function(x){ return x!=null; });
    var smin=sv.length?Math.min.apply(null,sv):0, smax=sv.length?Math.max.apply(null,sv):1;
    function sfrac(s){ if(s==null) return 0; return smax>smin ? 0.10+0.90*((s-smin)/(smax-smin)) : 1; }
    var fbox=el("input","filt"); fbox.type="search"; fbox.placeholder="Filter teams…"; fbox.value=teamFilter;
    fbox.oninput=function(){ teamFilter=fbox.value; render(curData);
      var nf=document.querySelector(".filt"); if(nf){ nf.focus(); nf.setSelectionRange(nf.value.length,nf.value.length); } };
    main.appendChild(fbox);
    var card=el("div","card"); var sc=el("div","scroll");
    var t=el("table");
    var thead=el("thead"); var hr=el("tr");
    ["#","Team","Strength","Momentum","Title %","1-day move","2-wk title trend","Playoffs %"].forEach(function(h){ hr.appendChild(el("th",null,h)); });
    thead.appendChild(hr); t.appendChild(thead);
    var tb=el("tbody");
    function buildRow(r){
      var tr=el("tr"); tr.setAttribute("data-k", r.team);
      tr.appendChild(td("rk", r.rank));
      var name=el("td","tm"); name.appendChild(document.createTextNode(r.team+" "));
      name.appendChild(el("span","full", r.team_full)); tr.appendChild(name);
      tr.appendChild(strengthCell(r.strength, sfrac(r.strength)));
      tr.appendChild(churnCell(r.churn));
      tr.appendChild(td(r.title_pct!=null&&r.title_pct>=10?"strong":null, r.title_pct==null?"—":r.title_pct.toFixed(1)+"%"));
      tr.appendChild(deltaCell(r.title_delta));
      tr.appendChild(trendCell(r.trend));
      tr.appendChild(playoffCell(r.playoff_pct));
      return tr;
    }
    var q=teamFilter.trim().toLowerCase();
    var rows=d.teams.filter(function(r){ return !q || (r.team||"").toLowerCase().indexOf(q)>=0 || (r.team_full||"").toLowerCase().indexOf(q)>=0; });
    // Group the field into coach tiers (impact-first), keeping strength order within each tier.
    TIERS.forEach(function(tier){
      var group=rows.filter(function(r){ return tierOf(r)===tier[0]; });
      if(!group.length) return;
      var hrow=el("tr","tier"); var hc=el("td"); hc.colSpan=8;
      hc.innerHTML='<span class="tlabel">'+tier[1]+'</span><span class="tmeaning">'+tier[2]+'</span>'+
        '<span class="tcount">'+group.length+(group.length===1?' team':' teams')+'</span>';
      hrow.appendChild(hc); tb.appendChild(hrow);
      group.forEach(function(r){ tb.appendChild(buildRow(r)); });
    });
    t.appendChild(tb); sc.appendChild(t); card.appendChild(sc); main.appendChild(card);
    main.appendChild(el("div","note",
      "Teams are grouped by how the end-of-season simulation sees them — title contenders, in the mix, on the bubble, and out of the race — then ordered by roster strength within each group. "+
      "Strength = our on-court team-strength index (higher is better), carried to today; the bar shows each team's spot on the field from weakest to strongest. "+
      "Momentum = how the team's recent-form rating has moved over its last few games (▲ heating up, ▼ cooling) — a form read, not the ranking. "+
      "Title % and Playoffs % are from our end-of-season simulation" + (d.title_as_of?(" (current through "+plainDate(d.title_as_of)+")"):"") + "; the one-day move is the change in title odds since yesterday. "+
      "The 2-week title trend sparkline traces each team's title odds over the last couple of weeks (the dot marks today, green if up over the window, red if down), and the arrow beside it is the roughly one-week change in points; a team without enough saved days shows a dash instead of a made-up trend."));
    flash();
    insertPlayoff();
    insertCoach();
  }

  /* ---------- shared live runtime ---------- */
  var etag=null,lastMod=null,lastFetch=0,cardHTML={},first=true;
  function updAgo(){
    var s=Math.max(0,Math.round((Date.now()-lastFetch)/1000));
    var t = s<60 ? (s+"s ago") : (Math.floor(s/60)+"m "+(s%60)+"s ago");
    var a=document.getElementById("ago"); if(a) a.innerHTML = lastFetch? ("live · updated <b>"+t+"</b>") : "";
  }
  function flash(){
    var nodes=document.querySelectorAll("#main [data-k]"), nm={};
    nodes.forEach(function(n){ var k=n.getAttribute("data-k"), h=n.innerHTML; nm[k]=h;
      if(!first && cardHTML[k]!==undefined && cardHTML[k]!==h){ n.classList.remove("flash"); void n.offsetWidth; n.classList.add("flash"); } });
    cardHTML=nm; first=false;
  }
  function poll(){
    var h={}; if(etag)h["If-None-Match"]=etag; if(lastMod)h["If-Modified-Since"]=lastMod;
    fetch(URL,{headers:h,cache:"no-cache"}).then(function(r){
      if(r.status===304) return null;
      etag=r.headers.get("ETag")||etag; lastMod=r.headers.get("Last-Modified")||lastMod; return r.json();
    }).then(function(d){ lastFetch=Date.now(); if(d){ render(d); } updAgo(); }).catch(function(e){
      if(!lastFetch){ document.getElementById("main").innerHTML='<p class="empty">Could not load the power board. '+(e&&e.message?e.message:"")+'</p>'; }
    });
  }
  fetch("./playoff_odds.json?v="+Date.now(),{cache:"no-cache"})
    .then(function(r){ return r.ok?r.json():null; })
    .then(function(j){ PLAYOFF=j; insertPlayoff(); }).catch(function(){});
  fetch("./coach_style.json?v="+Date.now(),{cache:"no-cache"})
    .then(function(r){ return r.ok?r.json():null; })
    .then(function(j){ COACH=j; insertCoach(); }).catch(function(){});
  poll(); setInterval(poll,60000); setInterval(updAgo,1000);
})();
</script>
</body>
</html>
