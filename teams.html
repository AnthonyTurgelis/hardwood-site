<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — Teams</title>
<style>
  :root{ --bg:#f4f6f8; --card:#fff; --card2:#f7f9fc; --ink:#161a21; --muted:#5a6675; --dim:#8a93a3;
    --line:#e3e7ee; --line2:#d3d9e3; --acc:#2b6cb0; --good:#1f883d; --bad:#c62828; --warn:#9a6700;
    --chip:#eef2f8; --flash:rgba(43,108,176,.20); --shadow:0 1px 2px rgba(20,24,35,.06); }
  @media (prefers-color-scheme:dark){ :root{ --bg:#0d1117; --card:#161b22; --card2:#1c2330; --ink:#e6edf3;
    --muted:#9aa7b4; --dim:#6b7684; --line:#242c38; --line2:#39424f; --acc:#58a6ff; --good:#3fb950; --bad:#ff7b72;
    --warn:#d29922; --chip:#21324a; --flash:rgba(88,166,255,.26); --shadow:none; } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13.5px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  header{padding:10px 14px 4px;max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:17px;margin:0}
  .sub{color:var(--muted);font-size:12px;max-width:1080px;margin:0 auto;padding:0 14px}
  .ago{font-size:11px;color:var(--dim);white-space:nowrap}
  .ago b{color:var(--good);font-variant-numeric:tabular-nums}
  nav{display:flex;gap:5px;flex-wrap:wrap;max-width:1080px;margin:6px auto 0;padding:0 14px}
  nav a{font-size:12px;text-decoration:none;color:var(--acc);border:1px solid var(--line);background:var(--card);padding:4px 10px;border-radius:999px}
  nav a.active{background:var(--acc);color:#fff;border-color:var(--acc)}
  main{max-width:1080px;margin:0 auto;padding:8px 14px 48px}
  .lede{color:var(--muted);font-size:12.5px;margin:6px 0}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:16px 0 8px;font-weight:700}
  .card{background:var(--card);border:1px solid var(--line);border-radius:9px;box-shadow:var(--shadow);overflow:hidden}
  .scroll{overflow-x:auto}
  table{border-collapse:collapse;width:100%;font-size:12.5px;font-variant-numeric:tabular-nums}
  th,td{padding:5px 9px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
  th:first-child,td:first-child,th:nth-child(2),td:nth-child(2){text-align:left}
  th{color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.03em;background:var(--card2)}
  tr[data-k]{transition:background .3s}
  tr.flash td{animation:fl 1.1s ease}
  @keyframes fl{0%{background:var(--flash)}100%{background:transparent}}
  .rk{color:var(--dim);width:1.6em}
  .tm{font-weight:640}
  .full{color:var(--muted);font-weight:400;font-size:11px}
  .up{color:var(--good);font-weight:600}.down{color:var(--bad);font-weight:600}.flat{color:var(--dim)}
  .strong{font-weight:680}
  .empty{color:var(--dim);font-style:italic}
  .note{font-size:10.5px;color:var(--dim);margin-top:6px;line-height:1.5}
  footer{max-width:1080px;margin:0 auto;padding:16px 14px;color:var(--dim);font-size:11px}
</style>
</head>
<body>
<header>
  <h1>The Hardwood — Teams</h1>
  <span class="ago" id="ago"></span>
</header>
<div class="sub">Power board: who's strongest now, who's heating up, and title odds.</div>
<nav>
  <a href="./index.html">Board</a>
  <a href="./games.html">Games</a>
  <a class="active" href="./teams.html">Teams</a>
  <a href="./players.html">Players</a>
  <a href="./review.html">Daily Review</a>
  <a href="./accuracy.html">Our Accuracy</a>
  <a href="./ledger.html">Error Map</a>
</nav>
<main id="main"><p class="empty">Loading the power board…</p></main>
<footer id="foot"></footer>
<script>
(function(){
  "use strict";
  var URL="./teams.json";
  function el(t,c,x){ var e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; }
  function td(c,x){ return el("td",c,x); }

  function churnCell(v){
    if(v==null) return td("flat","—");
    if(v>0.3) return td("up","▲ "+v.toFixed(1));
    if(v<-0.3) return td("down","▼ "+Math.abs(v).toFixed(1));
    return td("flat","→ "+v.toFixed(1));
  }
  function deltaCell(v){
    if(v==null) return td("flat","—");
    if(v>0.05) return td("up","+"+v.toFixed(1));
    if(v<-0.05) return td("down",v.toFixed(1));
    return td("flat","0");
  }

  function render(d){
    var main=document.getElementById("main"); main.innerHTML="";
    document.getElementById("foot").textContent="Baked "+(d.generated_utc||"")+". Strength ranks the roster on our season-long model. Momentum is recent form, not the ranking basis. Title odds come from simulating the rest of the season.";
    if(!d.available){ main.appendChild(el("p","empty", d.note||"Power board being built.")); return; }
    main.appendChild(el("p","lede", d.source||""));
    var card=el("div","card"); var sc=el("div","scroll");
    var t=el("table");
    var thead=el("thead"); var hr=el("tr");
    ["#","Team","Strength","Momentum","Title %","Δ 1d","Playoffs %"].forEach(function(h){ hr.appendChild(el("th",null,h)); });
    thead.appendChild(hr); t.appendChild(thead);
    var tb=el("tbody");
    d.teams.forEach(function(r){
      var tr=el("tr"); tr.setAttribute("data-k", r.team);
      tr.appendChild(td("rk", r.rank));
      var name=el("td","tm"); name.appendChild(document.createTextNode(r.team+" "));
      name.appendChild(el("span","full", r.team_full)); tr.appendChild(name);
      tr.appendChild(td("strong", r.strength==null?"—":r.strength.toFixed(1)));
      tr.appendChild(churnCell(r.churn));
      tr.appendChild(td(r.title_pct!=null&&r.title_pct>=10?"strong":null, r.title_pct==null?"—":r.title_pct.toFixed(1)+"%"));
      tr.appendChild(deltaCell(r.title_delta));
      tr.appendChild(td(null, r.playoff_pct==null?"—":r.playoff_pct.toFixed(0)+"%"));
      tb.appendChild(tr);
    });
    t.appendChild(tb); sc.appendChild(t); card.appendChild(sc); main.appendChild(card);
    main.appendChild(el("div","note",
      "Strength = our on-court team-strength index (higher is better), carried to today. "+
      "Momentum = how the team's recent-form rating has moved over its last few games (▲ heating up, ▼ cooling) — a form read, not the ranking. "+
      "Title % and Playoffs % are from our end-of-season simulation" + (d.title_as_of?(" (as of "+d.title_as_of+")"):"") + "; Δ 1d is the one-day change in title odds."));
    flash();
  }

  /* ---------- shared live runtime ---------- */
  var etag=null,lastMod=null,lastFetch=0,cardHTML={},first=true;
  function updAgo(){
    var s=Math.max(0,Math.round((Date.now()-lastFetch)/1000));
    var t = s<60 ? (s+"s ago") : (Math.floor(s/60)+"m "+(s%60)+"s ago");
    var a=document.getElementById("ago"); if(a) a.innerHTML = lastFetch? ("live · updated <b>"+t+"</b>") : "";
  }
  function flash(){
    var nodes=document.querySelectorAll("#main [data-k]"), nm={};
    nodes.forEach(function(n){ var k=n.getAttribute("data-k"), h=n.innerHTML; nm[k]=h;
      if(!first && cardHTML[k]!==undefined && cardHTML[k]!==h){ n.classList.remove("flash"); void n.offsetWidth; n.classList.add("flash"); } });
    cardHTML=nm; first=false;
  }
  function poll(){
    var h={}; if(etag)h["If-None-Match"]=etag; if(lastMod)h["If-Modified-Since"]=lastMod;
    fetch(URL,{headers:h,cache:"no-cache"}).then(function(r){
      if(r.status===304) return null;
      etag=r.headers.get("ETag")||etag; lastMod=r.headers.get("Last-Modified")||lastMod; return r.json();
    }).then(function(d){ lastFetch=Date.now(); if(d){ render(d); } updAgo(); }).catch(function(e){
      if(!lastFetch){ document.getElementById("main").innerHTML='<p class="empty">Could not load the power board. '+(e&&e.message?e.message:"")+'</p>'; }
    });
  }
  poll(); setInterval(poll,60000); setInterval(updAgo,1000);
})();
</script>
</body>
</html>
