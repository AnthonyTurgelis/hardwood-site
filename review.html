<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — Daily Review</title>
<style>
  :root{ --bg:#f6f7f9; --card:#ffffff; --ink:#16181d; --muted:#5b6472; --line:#e5e8ee; --accent:#2b6cb0; --shadow:0 1px 3px rgba(20,24,35,.08); }
  @media (prefers-color-scheme:dark){ :root{ --bg:#0d1117; --card:#161b22; --ink:#e6edf3; --muted:#8b949e; --line:#222a35; --accent:#58a6ff; --shadow:none; } }
  :root{ --flash:rgba(43,108,176,.18); }
  @media (prefers-color-scheme:dark){ :root{ --flash:rgba(88,166,255,.24); } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  header{padding:10px 14px 4px;max-width:820px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:17px;margin:0}
  .sub{color:var(--muted);font-size:12px;max-width:820px;margin:0 auto;padding:0 14px}
  .ago{font-size:11px;color:var(--muted);white-space:nowrap}
  .ago b{color:var(--accent);font-variant-numeric:tabular-nums}
  nav{display:flex;gap:5px;flex-wrap:wrap;max-width:820px;margin:6px auto 0;padding:0 14px}
  nav a{font-size:12px;text-decoration:none;color:var(--accent);border:1px solid var(--line);background:var(--card);padding:4px 10px;border-radius:999px}
  nav a.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  main{max-width:820px;margin:0 auto;padding:8px 14px 48px}
  .doc{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:4px 16px 16px;box-shadow:var(--shadow)}
  .doc.flash{animation:fl 1.1s ease}
  @keyframes fl{0%{background:var(--flash)}100%{background:var(--card)}}
  .doc h1{font-size:17px;margin:14px 0 5px}
  .doc h2{font-size:14.5px;margin:16px 0 6px;padding-bottom:3px;border-bottom:1px solid var(--line)}
  .doc h3{font-size:13px;margin:12px 0 3px}
  .doc p{margin:6px 0}
  .doc ul{margin:6px 0;padding-left:20px}
  .doc li{margin:2px 0}
  .doc hr{border:none;border-top:1px solid var(--line);margin:14px 0}
  .doc code{background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:.9em}
  .doc a{color:var(--accent)}
  .doc strong{color:var(--ink)}
  .empty{color:var(--muted);font-style:italic}
  footer{max-width:820px;margin:0 auto;padding:16px 14px;color:var(--muted);font-size:11px}
</style>
</head>
<body>
<header><h1>The Hardwood — Daily Review</h1><span class="ago" id="ago"></span></header>
<div class="sub" id="sub">Loading…</div>
<nav>
  <a href="./index.html">Board</a>
  <a href="./games.html">Games</a>
  <a href="./teams.html">Teams</a>
  <a href="./players.html">Players</a>
  <a class="active" href="./review.html">Daily Review</a>
  <a href="./accuracy.html">Our Accuracy</a>
  <a href="./ledger.html">Error Map</a>
</nav>
<main id="main"><p class="empty">Loading today's review…</p></main>
<footer id="foot"></footer>
<script src="./hardwood.js"></script>
<script>
(function(){
  "use strict";
  function render(d){
    document.getElementById("sub").textContent = d.date || "";
    var main=document.getElementById("main");
    if(!d.available || !d.html){ main.innerHTML='<p class="empty">No review published for today yet.</p>'; return; }
    var wrap=document.createElement("div"); wrap.className="doc"; wrap.setAttribute("data-k","doc"); wrap.innerHTML=d.html;
    main.innerHTML=""; main.appendChild(wrap);
    document.getElementById("foot").textContent = "Written for you as the plain-English daily. Baked " + (d.generated_utc||"") + ".";
    flash();
  }
  /* ---------- shared live runtime ---------- */
  var URL="./review.json", etag=null,lastMod=null,lastFetch=0,cardHTML={},first=true;
  function updAgo(){
    var s=Math.max(0,Math.round((Date.now()-lastFetch)/1000));
    var t = s<60 ? (s+"s ago") : (Math.floor(s/60)+"m "+(s%60)+"s ago");
    var a=document.getElementById("ago"); if(a) a.innerHTML = lastFetch? ("live · updated <b>"+t+"</b>") : "";
  }
  function flash(){
    var nodes=document.querySelectorAll("#main [data-k]"), nm={};
    nodes.forEach(function(n){ var k=n.getAttribute("data-k"), h=n.innerHTML; nm[k]=h;
      if(!first && cardHTML[k]!==undefined && cardHTML[k]!==h){ n.classList.remove("flash"); void n.offsetWidth; n.classList.add("flash"); } });
    cardHTML=nm; first=false;
  }
  function poll(){
    var h={}; if(etag)h["If-None-Match"]=etag; if(lastMod)h["If-Modified-Since"]=lastMod;
    fetch(URL,{headers:h,cache:"no-cache"}).then(function(r){
      if(r.status===304) return null;
      etag=r.headers.get("ETag")||etag; lastMod=r.headers.get("Last-Modified")||lastMod; return r.json();
    }).then(function(d){ lastFetch=Date.now(); if(d){ render(d); } updAgo(); }).catch(function(e){
      if(!lastFetch){ document.getElementById("main").innerHTML='<p class="empty">Could not load the review. '+(e&&e.message?e.message:"")+'</p>'; }
    });
  }
  poll(); setInterval(poll,60000); setInterval(updAgo,1000);
})();
</script>
</body>
</html>
