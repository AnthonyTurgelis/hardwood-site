<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — We Tested It</title>
<style>
  :root{ --bg:#f4f6f8; --card:#fff; --card2:#f7f9fc; --ink:#161a21; --muted:#5a6675; --dim:#8a93a3;
    --line:#e3e7ee; --line2:#d3d9e3; --acc:#2b6cb0; --shadow:0 1px 2px rgba(20,24,35,.06); }
  @media (prefers-color-scheme:dark){ :root{ --bg:#0d1117; --card:#161b22; --card2:#1c2330; --ink:#e6edf3;
    --muted:#9aa7b4; --dim:#6b7684; --line:#242c38; --line2:#39424f; --acc:#58a6ff; --shadow:none; } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13.5px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  header{padding:10px 14px 4px;max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:17px;margin:0}
  .ago{font-size:11px;color:var(--dim);white-space:nowrap}
  .sub{color:var(--muted);font-size:12px;max-width:1080px;margin:0 auto;padding:0 14px}
  nav{display:flex;gap:5px;flex-wrap:wrap;max-width:1080px;margin:6px auto 0;padding:0 14px}
  nav a{font-size:12px;text-decoration:none;color:var(--acc);border:1px solid var(--line);background:var(--card);padding:4px 10px;border-radius:999px}
  nav a.active{background:var(--acc);color:#fff;border-color:var(--acc)}
  main{max-width:1080px;margin:0 auto;padding:8px 14px 48px}
  .lede{color:var(--muted);font-size:12.5px;margin:8px 0 14px;max-width:760px}
  .item{background:var(--card);border:1px solid var(--line);border-radius:9px;box-shadow:var(--shadow);padding:11px 13px;margin:8px 0}
  .item .ti{font-weight:680;font-size:13.5px}
  .item .as{color:var(--dim);font-size:11px;margin-top:3px}
  /* dive header: title on the left, a freshness "as of" badge on the right (reuses the pill/chip
     look from the board). Badge is sourced ONLY from the dive's own as_of date; omitted if absent. */
  .item .dvhd{display:flex;justify-content:space-between;align-items:baseline;gap:8px;flex-wrap:wrap}
  .item .fresh{font-size:10.5px;font-weight:600;color:var(--muted);
    background:var(--chip,var(--card2));border:1px solid var(--line);border-radius:999px;
    padding:2px 9px;white-space:nowrap;text-transform:uppercase;letter-spacing:.03em}
  /* one-line takeaway tile: the finding in plain language above the table, so a coach gets the
     point without reading the numbers. Text is the dive's OWN lede sentence (never fabricated). */
  .item .takeaway{display:flex;gap:9px;align-items:baseline;margin-top:10px;padding:9px 11px;
    background:var(--accent-weak,rgba(43,108,176,.08));border-left:3px solid var(--acc);border-radius:7px}
  .item .takeaway-k{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
    color:var(--acc);white-space:nowrap}
  .item .takeaway-t{font-size:13px;font-weight:600;color:var(--ink);line-height:1.4}
  /* deep-dive body: the .md article is rendered as formatted prose (headings / bold / code
     tables), never raw markdown syntax leaking to the reader. */
  .item .body{margin-top:10px;font-size:13px;line-height:1.55}
  .item .body h3{font-size:14px;margin:15px 0 4px;font-weight:700}
  .item .body h4{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:13px 0 3px;font-weight:700}
  .item .body p{margin:8px 0}
  .item .body strong{font-weight:680;color:var(--ink)}
  .item .body code{background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-size:.9em;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .item .body pre{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:11px 13px;overflow-x:auto;margin:9px 0}
  .item .body pre code{background:none;border:none;padding:0;white-space:pre;display:block;font-size:11.5px;line-height:1.5}
  /* Data tables: a whitespace-columned code block that is really a numeric table renders as a
     scannable HTML table (humanized headers, sensible rounding) instead of a raw ASCII dump. */
  .item .body .dtwrap{overflow-x:auto;margin:10px 0;border:1px solid var(--line);border-radius:8px}
  .item .body table.dtable{border-collapse:collapse;width:100%;font-size:12.5px;font-variant-numeric:tabular-nums}
  .item .body .dtable th,.item .body .dtable td{padding:5px 10px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
  .item .body .dtable th{background:var(--card2);color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.03em;font-weight:700}
  .item .body .dtable th.num,.item .body .dtable td.num{text-align:right}
  .item .body .dtable tbody tr:last-child td{border-bottom:none}
  .item .body .dtable tbody tr:hover{background:var(--card2)}
  .soon{background:var(--card);border:1px dashed var(--line2);border-radius:11px;padding:22px 16px;text-align:center;color:var(--muted);font-size:13px;max-width:620px;margin:10px 0}
  .empty{color:var(--dim);font-style:italic}
  footer{max-width:1080px;margin:0 auto;padding:16px 14px;color:var(--dim);font-size:11px}
</style>
<link rel="stylesheet" href="./hardwood.css">
</head>
<body>
<header>
  <h1>The Hardwood — We Tested It</h1>
  <span class="ago" id="ago"></span>
</header>
<div class="sub">Ideas we've investigated and proven to be noise.</div>
<nav>
  <a href="./index.html">Board</a>
  <a href="./queue.html">What's Next</a>
  <a href="./games.html">Games</a>
  <a href="./availability.html">Injuries</a>
  <a href="./teams.html">Teams</a>
  <a href="./coach.html">Coach</a>
  <a href="./gm.html">GM</a>
  <a href="./players.html">Players</a>
  <a href="./review.html">Daily Review</a>
  <a href="./accuracy.html">Our Accuracy</a>
  <a href="./ledger.html">Error Map</a>
  <a href="./org.html">The Team</a>
  <a href="./scouting.html">Scouting</a>
  <a class="active" href="./deepdive.html">We Tested It</a>
</nav>
<main id="main"><p class="empty">Loading…</p></main>
<footer id="foot"></footer>
<script src="./hardwood.js"></script>
<script>
(function(){
  "use strict";
  function el(t,c,x){ var e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; }

  // Inline markdown: **bold** and `code`. Built entirely from text nodes + el() (textContent),
  // so no author markup is ever injected as HTML - safe by construction.
  function inlineMd(node, text){
    var i=0, n=text.length;
    while(i<n){
      var b=text.indexOf("**", i), c=text.indexOf("`", i), next=-1, kind=null;
      if(b>=0 && (c<0 || b<c)){ next=b; kind="b"; }
      else if(c>=0){ next=c; kind="c"; }
      if(next<0){ node.appendChild(document.createTextNode(text.slice(i))); break; }
      if(next>i){ node.appendChild(document.createTextNode(text.slice(i,next))); }
      if(kind==="b"){
        var end=text.indexOf("**", next+2);
        if(end<0){ node.appendChild(document.createTextNode(text.slice(next))); break; }
        node.appendChild(el("strong",null,text.slice(next+2,end))); i=end+2;
      } else {
        var e2=text.indexOf("`", next+1);
        if(e2<0){ node.appendChild(document.createTextNode(text.slice(next))); break; }
        node.appendChild(el("code",null,text.slice(next+1,e2))); i=e2+1;
      }
    }
  }

  // Coach-readable column headers for the raw DB slugs our deep-dive tables are keyed on. Display
  // only; unknown slugs fall back to a mechanical de-underscore + smart suffixes, so a new column
  // never renders as broken jargon.
  var HDR={
    "season":"Season","games":"Games","ft_rate":"FT rate","ftr":"FT rate",
    "fta_per_team_game":"FTA / team-game","pts_per_team_game":"Points / team-game",
    "fga_per_team_game":"FGA / team-game","fg3a_per_team_game":"3PA / team-game",
    "reb_per_team_game":"Rebounds / team-game","ast_per_team_game":"Assists / team-game",
    "n":"Count","mae":"MAE","rmse":"RMSE"
  };
  function humanizeHeader(h){
    var k=String(h).toLowerCase();
    if(HDR[k]) return HDR[k];
    var s=k.replace(/_per_team_game$/," / team-game").replace(/_per_game$/," / game")
           .replace(/_pct$/," %").replace(/_/g," ").trim();
    return s ? (s.charAt(0).toUpperCase()+s.slice(1)) : String(h);
  }
  function isNum(s){ return s!=="" && s!=null && isFinite(Number(s)); }

  // Try to read a fenced code block as a whitespace-columned NUMERIC data table. Returns a styled
  // <table> node, or null to fall back to <pre> (real code, prose, or a ragged/non-numeric block).
  // Built entirely from el()/textContent, so no author text is ever injected as HTML.
  function dataTable(inner, info){
    var lang=(info||"").trim().toLowerCase();
    if(lang!=="" && lang!=="text") return null;                 // only plain / ```text fences
    var lines=inner.split("\n").map(function(l){ return l.replace(/\s+$/,""); })
                   .filter(function(l){ return l.trim()!==""; });
    if(lines.length<3) return null;                             // need header + >=2 data rows
    var header=lines[0].trim().split(/\s+/);
    var ncol=header.length;
    if(ncol<2 || header.some(isNum)) return null;               // header must be non-numeric labels
    var rows=[];
    for(var i=1;i<lines.length;i++){
      var cells=lines[i].trim().split(/\s+/);
      if(cells.length!==ncol) return null;                      // ragged -> not a clean table
      rows.push(cells);
    }
    // A column is numeric only if EVERY data cell in it parses as a number.
    var colNum=[], numCount=0;
    for(var c=0;c<ncol;c++){
      var allNum=rows.every(function(r){ return isNum(r[c]); });
      colNum.push(allNum); if(allNum) numCount++;
    }
    if(numCount < Math.ceil(ncol/2)) return null;               // <half numeric -> treat as code
    // Per-column decimals: whole-number columns show integers; sub-unit rates get 3 dp; else 1 dp.
    var dec=[];
    for(var c2=0;c2<ncol;c2++){
      if(!colNum[c2]){ dec.push(null); continue; }
      var vals=rows.map(function(r){ return Number(r[c2]); });
      var allInt=vals.every(function(v){ return isFinite(v) && Math.floor(v)===v; });
      var maxAbs=vals.reduce(function(m,v){ return Math.max(m,Math.abs(v)); },0);
      dec.push(allInt ? 0 : (maxAbs<1.5 ? 3 : 1));
    }
    var wrap=el("div","dtwrap"), t=el("table","dtable"), thead=el("thead"), hr=el("tr");
    header.forEach(function(h,c){ hr.appendChild(el("th", colNum[c]?"num":null, humanizeHeader(h))); });
    thead.appendChild(hr); t.appendChild(thead);
    var tb=el("tbody");
    rows.forEach(function(r){
      var tr=el("tr");
      r.forEach(function(cell,c){
        tr.appendChild(el("td", colNum[c]?"num":null, colNum[c] ? Number(cell).toFixed(dec[c]) : cell));
      });
      tb.appendChild(tr);
    });
    t.appendChild(tb); wrap.appendChild(t); return wrap;
  }

  // Render the baked markdown blocks (each array element is a paragraph split on a blank line) as
  // formatted prose: fenced code -> data table (if numeric) else <pre>, #/## -> section head,
  // ###+ -> sub-head, else paragraph. A leading H1 that repeats the card title is dropped.
  function renderContent(body, paras, title){
    (paras||[]).forEach(function(raw){
      var t=(raw==null?"":String(raw)).replace(/^\s+/,"");
      if(t.indexOf("```")===0){
        var info=(/^```([^\n]*)/.exec(t)||[])[1]||"";
        var inner=t.replace(/^```[^\n]*\n?/,"").replace(/\n?```\s*$/,"");
        var tbl=dataTable(inner, info);
        if(tbl){ body.appendChild(tbl); return; }
        var pre=el("pre"); pre.appendChild(el("code",null,inner)); body.appendChild(pre); return;
      }
      var hm=/^(#{1,6})\s+([^\n]*)([\s\S]*)$/.exec(t);
      if(hm){
        var level=hm[1].length, txt=hm[2].trim(), rest=hm[3].replace(/^\n+/,"");
        if(!(level===1 && title && txt.toLowerCase()===String(title).toLowerCase())){
          var h=el(level<=2?"h3":"h4"); inlineMd(h, txt); body.appendChild(h);
        }
        if(rest){ var rp=el("p"); inlineMd(rp, rest); body.appendChild(rp); }
        return;
      }
      var p=el("p"); inlineMd(p, t); body.appendChild(p);
    });
  }

  // Humanize an ISO timestamp to "Mon D, YYYY" using ONLY its date part (no timezone shift, no
  // fabrication). Non-parseable / missing input falls back to the raw string, so the badge is
  // always honest to whatever the data actually carries.
  var MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function fmtDate(s){
    var m=/^(\d{4})-(\d{2})-(\d{2})/.exec(String(s||""));
    if(!m) return String(s||"");
    var mon=MON[Number(m[2])-1];
    return mon ? (mon+" "+Number(m[3])+", "+m[1]) : String(s);
  }

  // The dive's lede = its first real prose paragraph (skip the repeated H1 / any heading / any
  // fence). This is the author's OWN framing of the finding; we never synthesize a claim.
  function ledeText(content){
    var items=content||[];
    for(var i=0;i<items.length;i++){
      var t=(items[i]==null?"":String(items[i])).replace(/^\s+/,"");
      if(t==="" || t.indexOf("```")===0 || /^#{1,6}\s/.test(t)) continue;
      return t;
    }
    return "";
  }
  // First sentence only, so the tile is one line. Split on a terminator FOLLOWED by whitespace/end
  // so decimals like "0.267" are never mistaken for a sentence break. Verbatim author text.
  function firstSentence(t){
    t=String(t||"").trim();
    var m=/^([\s\S]*?[.!?])(?:\s|$)/.exec(t);
    return m ? m[1] : t;
  }
  // Does this dive contain a block that the sibling's dataTable() actually renders as a table?
  // The takeaway tile only appears for table dives (prose dives keep their bodies untouched).
  function hasDataTable(content){
    var items=content||[];
    for(var i=0;i<items.length;i++){
      var t=(items[i]==null?"":String(items[i])).replace(/^\s+/,"");
      if(t.indexOf("```")!==0) continue;
      var info=(/^```([^\n]*)/.exec(t)||[])[1]||"";
      var inner=t.replace(/^```[^\n]*\n?/,"").replace(/\n?```\s*$/,"");
      if(dataTable(inner, info)) return true;
    }
    return false;
  }

  function render(d){
    var main=document.getElementById("main"); main.innerHTML="";
    if(d.available && (d.items||[]).length){
      (d.items||[]).forEach(function(it){
        var c=el("div","item");
        var hd=el("div","dvhd");
        hd.appendChild(el("div","ti",it.title||"We Tested It"));
        // Freshness badge — sourced ONLY from the dive's own as_of; omitted when absent (never invented).
        if(it.as_of){ hd.appendChild(el("span","fresh","As of "+fmtDate(it.as_of))); }
        c.appendChild(hd);
        if(it.content && it.content.length){
          var body=el("div","body");
          // Takeaway tile: only for table dives, drawn from the dive's OWN lede sentence.
          if(hasDataTable(it.content)){
            var lede=firstSentence(ledeText(it.content));
            if(lede){
              var tk=el("div","takeaway");
              tk.appendChild(el("span","takeaway-k","The finding"));
              var tt=el("span","takeaway-t"); inlineMd(tt, lede); tk.appendChild(tt);
              body.appendChild(tk);
            }
          }
          renderContent(body, it.content, it.title);
          c.appendChild(body);
        }
        main.appendChild(c);
      });
    } else {
      main.appendChild(el("div","soon", d.placeholder||"We are currently testing new ideas."));
    }
    document.getElementById("foot").textContent="Baked "+(d.generated_et||d.generated_utc||"")+".";
  }
  var lastFetch=0;
  function updAgo(){ var a=document.getElementById("ago"); if(!a)return;
    if(!lastFetch){ a.innerHTML=""; return; }
    var s=Math.max(0,Math.round((Date.now()-lastFetch)/1000));
    a.innerHTML="live · updated <b>"+(s<60?(s+"s ago"):(Math.floor(s/60)+"m ago"))+"</b>"; }
  function poll(){ fetch("./deepdive.json",{cache:"no-cache"}).then(function(r){ return r.json(); })
    .then(function(d){ lastFetch=Date.now(); render(d); updAgo(); })
    .catch(function(e){ if(!lastFetch){ document.getElementById("main").innerHTML='<p class="empty">Could not load. '+(e&&e.message?e.message:"")+'</p>'; } }); }
  poll(); setInterval(poll,300000); setInterval(updAgo,1000);
})();
</script>
</body>
</html>
