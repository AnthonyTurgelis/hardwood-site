<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — WNBA predictions & simulation</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#16181d; --muted:#5b6472; --line:#e5e8ee;
    --accent:#2b6cb0; --shadow:0 1px 3px rgba(20,24,35,.08);
    --live:#1f883d; --verified:#0969da; --inflight:#9a6700; --shelved:#6e7781;
    --null:#6e7781; --promote:#8250df; --blocked:#cf222e; --done:#57606a;
    --ok:#1f883d; --warn:#9a6700; --bad:#cf222e;
    --flash:rgba(43,108,176,.14);
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#050505; --card:#131518; --ink:#ffffff; --muted:#aebac9; --line:#262d36;
      --accent:#58a6ff; --shadow:none; --live:#3fb950; --verified:#58a6ff; --inflight:#d29922;
      --shelved:#8b949e; --null:#8b949e; --promote:#a371f7; --blocked:#f85149; --done:#8b949e;
      --ok:#3fb950; --warn:#d29922; --bad:#f85149; --flash:rgba(88,166,255,.20); }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:13.5px/1.42 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-text-size-adjust:100%}
  a{color:var(--accent)}
  
  /* Depth Chart Styles */
  .dc-box { display: flex; gap: 16px; margin-top: 12px; font-size: 11px; padding: 12px; background: var(--bg); border-radius: 6px; border: 1px solid var(--line); }
  .dc-wrap { flex: 1; }
  .dc-title { font-weight: 600; margin-bottom: 6px; color: var(--muted); text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
  .dc-grid { display: flex; flex-direction: column; gap: 4px; }
  .dc-player { display: flex; justify-content: space-between; align-items: baseline; }
  .dc-name { font-weight: 500; }
  .dc-out { text-decoration: line-through; color: var(--muted); }
  .dc-promoted { color: var(--live); font-weight: 600; }
  .dc-pos { color: var(--muted); font-size: 10px; }

  .wrap{max-width:860px;margin:0 auto;padding:0 12px}
  header{padding:6px 0 2px}
  .hrow{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:16px;margin:0}
  .ago{font-size:11px;color:var(--muted);white-space:nowrap}
  .ago b{color:var(--live);font-variant-numeric:tabular-nums}
  /* health chips — true anchors, ticking every second */
  .chips{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0 0}
  .hchip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:var(--muted);
    border:1px solid var(--line);background:var(--card);border-radius:999px;padding:2px 9px;
    font-variant-numeric:tabular-nums;white-space:nowrap}
  .hchip .dot{width:7px;height:7px;border-radius:50%;background:var(--done);flex:0 0 auto}
  .hchip.ok .dot{background:var(--ok)} .hchip.warn .dot{background:var(--warn)}
  .hchip.bad .dot{background:var(--bad)}
  /* A++ actionable roll-up: when a panel is stale the freshness chip is a click-to-culprit control;
     the transient 'refreshing…' state (amber dot) shows ONLY during a real in-flight board fetch. */
  .hchip.clickable{cursor:pointer}
  .hchip.refreshing .dot{background:var(--warn)}
  /* A+++ stale-reason sub-line: the crowned panel's OWN copy-gated stale_reason, surfaced inline
     beneath the freshness chip so the operator reads WHY without hovering the panel's own badge. Its
     own line (flex-basis:100%) so the pill never crowds; hidden entirely when the crowned panel
     carries no reason (reason-omitted-when-absent) — never an empty "— " dangle. */
  .chipreason{flex-basis:100%;font-size:10px;color:var(--muted);margin:1px 0 0;padding-left:2px}
  /* A++++ freshness-history spark: a compact green/red strip of the crowned panel's last-N revalidation
     verdicts, so the operator reads at a glance whether the culprit is CHRONICALLY stale (a run of red)
     or a one-off blip. Reuses the --ok/--bad tokens (light+dark), textContent-free (squares carry no
     text), and is HIDDEN entirely below the min-history threshold (never a fabricated trend). */
  .freshspark{display:inline-flex;align-items:center;gap:2px;margin-left:2px;vertical-align:middle}
  .freshspark .fresh-sq{width:5px;height:9px;border-radius:1px;background:var(--muted);opacity:.9}
  .freshspark .fresh-sq.stale{background:var(--bad);opacity:1}
  .freshspark .fresh-sq.ok{background:var(--ok);opacity:1}
  .banner{margin:8px 0 0;padding:7px 11px;border-radius:8px;font-size:12.5px;font-weight:600;
    border:1px solid var(--line);background:var(--card)}
  .banner.idle{border-left:3px solid var(--bad)} .banner.paused{border-left:3px solid var(--warn)}
  /* UNDER-WIDTH ALARM (item B) — the LOUDest banner: full bad-color wash, not just a left rule */
  .banner.width-defect{border:1px solid var(--bad);border-left:4px solid var(--bad);
    background:var(--bad);color:#fff}
  /* REFILLING (bookkeeping-window smoothing) — a CALM, reassuring beat, never the red wash: a soft
     left rule only, so a normal finishing/backfill window never reads as an outage. */
  .banner.refilling{border:1px solid var(--line);border-left:3px solid var(--accent);
    background:var(--card);color:var(--muted)}
  /* the one day-summary sentence */
  .summary{margin:9px 0 0;font-size:14.5px;line-height:1.45;font-weight:600}
  .summary .dim{color:var(--muted);font-weight:500}
  nav{display:flex;gap:5px;flex-wrap:wrap;margin:9px 0 0}
  nav a{font-size:11.5px;text-decoration:none;color:var(--accent);border:1px solid var(--line);
    background:var(--card);padding:3px 9px;border-radius:999px}
  nav a.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  /* sub-tabs: Today | Queue */
  .subtabs{display:flex;gap:0;margin:10px 0 0;border-bottom:1px solid var(--line)}
  .subtab{font:inherit;font-size:13px;font-weight:650;color:var(--muted);background:none;border:none;
    padding:6px 14px;cursor:pointer;border-bottom:2px solid transparent}
  .subtab.active{color:var(--ink);border-bottom-color:var(--accent)}
  .subtab .n{font-size:10.5px;color:var(--muted);font-weight:600}
  /* filters row */
  .filters{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:9px 0 0}
  .pill{font:inherit;font-size:11px;font-weight:640;color:var(--muted);background:var(--card);
    border:1px solid var(--line);border-radius:999px;padding:2px 10px;cursor:pointer}
  .pill.active{color:#fff;background:var(--accent);border-color:var(--accent)}
  .filters select{font:inherit;font-size:11px;color:var(--ink);background:var(--card);
    border:1px solid var(--line);border-radius:6px;padding:2px 6px}
  .snapnote{font-size:11.5px;color:var(--warn);font-weight:650}
  main{padding:2px 0 48px}
  section{margin-top:14px}
  .sechead{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin:0 0 5px}
  .sechead h2{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
    margin:0;font-weight:700}
  .prov{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums}
  /* STALE badge — loud by design: a section older than its cadence must read as a warning, not a
     whisper (agent-updates stale-badge wire). Text is the literal "STALE" (uppercased in CSS). */
  .stalebadge{font-size:10px;font-weight:800;letter-spacing:.07em;color:#fff;background:var(--blocked);
    border-radius:999px;padding:2px 8px;text-transform:uppercase;box-shadow:0 0 0 2px rgba(198,40,40,.22)}
  .empty{color:var(--muted);font-size:12.5px;font-style:italic;margin:4px 0}
  /* ---------- dense rows ---------- */
  .list{background:var(--card);border:1px solid var(--line);border-radius:9px;overflow:hidden;
    box-shadow:var(--shadow)}
  .row{display:flex;gap:8px;align-items:baseline;padding:6px 10px;border-bottom:1px solid var(--line);
    font-size:13px;min-width:0}
  .row:last-child{border-bottom:none}
  .row.flash{animation:fl 1.1s ease}
  @keyframes fl{0%{background:var(--flash)}100%{background:transparent}}
  /* A++ click-to-culprit landing highlight: a brief wash on the stalest panel's section head so the
     operator's eye lands on the culprit after the chip scrolls them to it. */
  .sechead.culprit-flash{animation:cf 2s ease;border-radius:6px}
  @keyframes cf{0%{background:var(--flash)}100%{background:transparent}}
  .row .nm{font-weight:620;flex:0 1 auto;min-width:0}
  .row .oneln{color:var(--muted);font-size:12px;flex:1 1 40%;min-width:0;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap}
  .row .right{margin-left:auto;display:inline-flex;gap:6px;align-items:baseline;white-space:nowrap;flex:0 0 auto}
  .tm{font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .chip{font-size:9px;font-weight:700;letter-spacing:.03em;padding:1px 6px;border-radius:999px;
    color:#fff;text-transform:uppercase;flex:0 0 auto;cursor:default}
  .c-LIVE{background:var(--live)} .c-VERIFIED{background:var(--verified)}
  .c-IN-FLIGHT{background:var(--inflight)} .c-SHELVED{background:var(--shelved)}
  .c-NULL{background:var(--null)} .c-PROMOTE{background:var(--promote)}
  .c-BLOCKED{background:var(--blocked)} .c-DONE{background:var(--done)}
  .tag{font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:0 5px;
    white-space:nowrap;flex:0 0 auto}
  .passes{font-size:10px;color:var(--muted);white-space:nowrap}
  .rlink{font-size:10.5px;text-decoration:none;white-space:nowrap}
  /* headline rows — the ~6 wins of the day */
  .hl{display:block;padding:8px 10px 8px 12px;border-bottom:1px solid var(--line);position:relative}
  .hl:last-child{border-bottom:none}
  .hl::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--verified)}
  .hl.i5::before{background:var(--live)}
  .hl .t{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
  .hl .nm{font-size:14.5px;font-weight:740}
  .hl .why{color:var(--muted);font-size:12.5px;margin-top:1px}
  .minorrow{display:flex;gap:8px;flex-wrap:wrap;align-items:baseline;padding:4px 10px;
    border-bottom:1px solid var(--line);font-size:12px}
  .minorrow:last-child{border-bottom:none}
  .minorfam{font-weight:700;color:var(--ink);white-space:nowrap}
  .minoritems{color:var(--muted)}
  details.more>summary{cursor:pointer;font-size:12px;color:var(--accent);margin-top:7px;list-style:none}
  details.more>summary::-webkit-details-marker{display:none}
  details.inline{display:inline}
  details.inline>summary{cursor:pointer;font-size:10.5px;color:var(--accent);list-style:none;display:inline}
  details.inline>summary::-webkit-details-marker{display:none}
  details.inline .raw{display:block;font:10.5px/1.5 ui-monospace,monospace;color:var(--muted);
    margin:3px 0 2px;word-break:break-word}
  /* running rows */
  .run .nm{font-weight:640}
  .elapsed{font-size:10.5px;color:var(--inflight);font-variant-numeric:tabular-nums;white-space:nowrap}
  /* decisions */
  .decision{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:8px;padding:8px 10px;margin-bottom:6px}
  .decision .q{font-weight:600;font-size:12.5px}
  .decision .one{color:var(--muted);font-size:12px;margin-top:2px}
  .decision .reply{display:inline-block;margin-top:4px;font-size:11px;font-family:ui-monospace,monospace;
    background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:2px 7px;color:var(--ink)}
  .btnrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
  .taybtn{font-size:11.5px;font-weight:640;text-decoration:none;color:#fff;background:var(--accent);
    border:1px solid var(--accent);border-radius:6px;padding:3px 11px}
  .taybtn.ghost{background:transparent;color:var(--accent)}
  .btnhint{font-size:10px;color:var(--muted);margin-top:4px}
  .setup{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--promote);
    border-radius:8px;padding:9px 11px;margin-bottom:8px}
  .setup .st{font-weight:650;font-size:12.5px}
  .setup .sb{color:var(--muted);font-size:12px;margin-top:2px}
  /* queue tab */
  .floorline{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;margin:9px 0 7px;font-size:12.5px}
  .floorline .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex:0 0 auto;position:relative;top:1px}
  .qrow{display:block;padding:7px 10px;border-bottom:1px solid var(--line)}
  .qrow:last-child{border-bottom:none}
  .qrow.parked{border-left:3px solid var(--inflight)}
  .qrow .t{display:flex;gap:7px;align-items:baseline;flex-wrap:wrap}
  .qrow .rk{font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:700;
    min-width:26px;flex:0 0 auto}
  .qrow .nm{font-weight:640;font-size:13px}
  .qrow .why{color:var(--muted);font-size:12px;margin:2px 0 0 33px}
  .qrow .acts{margin-left:auto;display:inline-flex;gap:4px;flex:0 0 auto}
  .fam{font-size:9px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:1px 6px;
    border-radius:999px;color:#fff;flex:0 0 auto}
  .fam-modeling{background:var(--promote)} .fam-data{background:var(--verified)}
  .fam-site{background:var(--live)} .fam-infra{background:var(--done)} .fam-research{background:var(--inflight)}
  .qstatus{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;
    padding:1px 6px;border-radius:999px;color:#fff;background:var(--done);flex:0 0 auto}
  .qstatus.qs-ready-now{background:var(--live)} .qstatus.qs-ready{background:var(--verified)}
  .qstatus.qs-waiting-on-you{background:var(--inflight);text-transform:none;letter-spacing:0}
  .qstatus.qs-answered{background:var(--live);text-transform:none;letter-spacing:0}
  .pmflag{font-size:9px;font-weight:700;color:#fff;background:var(--promote);border-radius:999px;padding:1px 6px}
  .qbtn{cursor:pointer;font:inherit;font-size:12px;text-decoration:none;color:var(--muted);
    border:1px solid var(--line);background:var(--bg);border-radius:6px;padding:0 7px}
  .qbtn:hover{color:var(--ink)}
  .comingrow{padding:7px 10px;border-bottom:1px solid var(--line)}
  .comingrow:last-child{border-bottom:none}
  .comingrow .nm{font-weight:640}
  .comingrow .why{color:var(--muted);font-size:12px;margin-top:1px}
  /* scout activity strip */
  .scoutlog{list-style:none;padding:0;margin:0;font-variant-numeric:tabular-nums}
  .scoutrow{display:block;padding:4px 10px;border-bottom:1px solid var(--line);font-size:12px;line-height:1.45}
  .scoutrow:last-child{border-bottom:none}
  .scoutrow .stime{color:var(--accent);font-size:10.5px;display:inline-block;min-width:56px}
  .scoutrow .stext{color:var(--muted)}
  /* helpers panel: process rows + work-slot width line */
  .hbstale{font-size:11.5px;color:var(--bad);margin:2px 0 6px;display:flex;align-items:center;gap:6px}
  .hwidth{font-size:12.5px;margin:2px 0 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .hwline{font-weight:650}
  .hwreason{color:var(--muted);font-size:11.5px}
  .helperlist{list-style:none;padding:0;margin:0}
  .helperrow{display:flex;align-items:center;gap:8px;padding:5px 10px;border-bottom:1px solid var(--line);font-size:12px}
  .helperrow:last-child{border-bottom:none}
  .hdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;background:var(--muted)}
  .hdot.on{background:var(--ok)} .hdot.off{background:var(--bad)}
  .hbody{display:flex;flex-direction:column;gap:1px;flex:1 1 auto;min-width:0}
  .hname{font-weight:600}
  .hdoes{color:var(--muted);font-size:10.5px;line-height:1.35}
  .hstate{color:var(--muted);font-size:11px;white-space:nowrap;flex:0 0 auto}
  .hstate.stale{color:var(--bad);font-weight:650}
  .pdfs{display:flex;gap:6px;flex-wrap:wrap}
  .pdfs a{display:inline-block;font-size:12px;text-decoration:none;color:var(--accent);
    border:1px solid var(--line);background:var(--card);padding:3px 9px;border-radius:7px}
  .watch{margin:0;padding:12px;background:var(--warn-bg,#fff3cd);border:1px solid var(--warn,#ffeeba);border-radius:4px;list-style-type:none}
  .watch li{margin-bottom:6px;color:var(--text);font-size:14px;font-weight:bold}
  .watch li:before{content:"⚠️ ";}
  .legend{font-size:11px;color:var(--muted);margin-top:6px}
  footer{padding:16px 0;color:var(--muted);font-size:11px}
  /* sticky unsaved-queue-changes bar */
  #qbar{position:fixed;top:0;left:0;right:0;z-index:60;display:none;align-items:center;gap:10px;
    padding:8px 14px;background:var(--card);border-bottom:1px solid var(--line);
    box-shadow:0 2px 8px rgba(20,24,35,.14);flex-wrap:wrap}
  .qbar-msg{font-size:12.5px;font-weight:660;color:var(--blocked);margin-right:auto}
  .qbar-msg.sent{color:var(--live)}
  #qbar button{font:inherit;font-size:11.5px;font-weight:640;border-radius:6px;padding:3px 12px;cursor:pointer}
  .qbar-send{color:#fff;background:var(--accent);border:1px solid var(--accent)}
  .qbar-send:disabled{opacity:.55;cursor:default}
  .qbar-disc{color:var(--accent);background:transparent;border:1px solid var(--line)}
  body.hasbar{padding-top:42px}
  /* ---------- HERO: tonight's games + our pick (redesign v2: the biggest thing, top) ---------- */
  .hero{margin-top:6px}
  .hero .eyebrow{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    font-weight:800;display:flex;align-items:baseline;gap:8px;margin:0 0 6px}
  .hero .eyebrow .prov{font-weight:600;letter-spacing:0}
  .gcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:6px}
  .gcard{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 10px;
    box-shadow:var(--shadow);display:flex;flex-direction:column;gap:5px;position:relative;overflow:hidden}
  .gcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
  .gcard .gtop{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .gcard .team{font-size:17px;font-weight:800;letter-spacing:-.01em;line-height:1.15}
  .gcard .tip{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}
  .gcard .pick{display:flex;align-items:baseline;gap:7px;margin-top:2px}
  .gcard .pick .lab{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;
    color:#fff;background:var(--accent);border-radius:5px;padding:1px 6px;flex:0 0 auto}
  .gcard .pick .val{font-size:14px;font-weight:750}
  .gcard .win{font-size:12px;color:var(--muted);font-weight:600}
  .gcard .win b{color:var(--ink);font-variant-numeric:tabular-nums;font-size:13px}
  .gcard .win .wt{font-weight:600}
  .gcard .win .conf{font-weight:700;color:var(--accent)}
  .gcard .range{font-size:11px;color:var(--muted);display:flex;align-items:baseline;gap:6px;margin-top:1px}
  .gcard .range .rlab{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;
    color:var(--muted);border:1px solid var(--line);border-radius:4px;padding:0 4px;flex:0 0 auto}
  .gcard .range .rval{font-variant-numeric:tabular-nums;font-weight:600;color:var(--ink)}
  .gcard .range .rmut{font-variant-numeric:tabular-nums;font-weight:500;color:var(--muted)}
  .gcard .venue{font-size:11px;color:var(--warn);line-height:1.4;margin-top:1px}
  /* IMPACT-FIRST availability line (BR-V2): who is OUT tonight (the coach signal), not a 28-name dump.
     Reuses the card's existing token language — a small bad-color "Out" label + plain names. */
  .gcard .outs{font-size:11.5px;line-height:1.4;margin-top:1px;color:var(--ink)}
  .gcard .outs .lab{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;
    color:#fff;background:var(--bad);border-radius:5px;padding:1px 6px;margin-right:6px}
  .gcard .outs .stp{color:var(--muted)}
  /* full depth chart is now on-demand (collapsed) so the card leads with the pick + who's out */
  .gcard details.depth>summary{cursor:pointer;font-size:10.5px;color:var(--accent);list-style:none;margin-top:2px}
  .gcard details.depth>summary::-webkit-details-marker{display:none}
  /* ---------- EDGE hero (data-gated: only renders if the board carries a tonight_edge block) ---------- */
  .edge{margin-top:12px;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--promote);
    border-radius:12px;padding:11px 14px;box-shadow:var(--shadow)}
  .edge .et{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:800;color:var(--promote)}
  .edge .eh{font-size:15px;font-weight:780;margin-top:3px}
  .edge .ew{font-size:12.5px;color:var(--muted);margin-top:2px}
  /* ---------- COVERAGE tile: honest interval-calibration readout on the HOME board. Single-sourced
     from accuracy.json (the SAME read_accuracy scorecard the Accuracy tab renders); an audit of our
     own honesty, not a directional call. --verified (blue) accent = independently checked, never the

<script>
(function(){
  "use strict";
  function el(tag, cls, txt){ var e=document.createElement(tag); if(cls)e.className=cls;

  /* CACHE-BUST: append a CHANGING ?v=<ms> token to every polled JSON fetch so GitHub Pages'
     CDN can never serve a stale board/games/history copy on reload. A fresh token per fetch
     (Date.now, not a per-load constant) keeps live polling truly live. */
  function bust(u){ return u + (u.indexOf("?")<0?"?":"&") + "v=" + Date.now(); }

  /* plain meanings for every status word — hover/legend (no robotic log-speak) */
  var CHIPMEAN={
    "LIVE":"Shipped to the live product.",
    "VERIFIED":"Finished and independently double-checked.",
    "IN-FLIGHT":"Running right now.",
    "SHELVED":"Parked, with its numbers written down.",
    "NULL":"Tested honestly — no improvement found.",
    "PROMOTE":"A candidate improvement, awaiting sign-off.",
    "BLOCKED":"Waiting on an input or a decision.",
    "DONE":"Completed and recorded."

  function chip(status){ var c=el("span","chip c-"+status, status);

  var SRC={}, FRESH={};
  var boardFetching=false;   // A++: true only while poll() is actively re-fetching board.json (honest refreshing state)
  // A++++ FRESHNESS-HISTORY spark: a per-panel client-side ring buffer of the last-N revalidation verdicts
  // (true=stale/red, false=fresh/green), keyed by panel. Accumulated once per REAL poll (recordFreshHist,
  // called from poll()'s resolve path — NOT the 1-second cosmetic tick), from the SAME staleInfo verdicts
  // the crown/badges already compute (NO new source, no bake/DB change). The header chip renders the
  // CROWNED panel's own slice so the operator sees chronic-vs-blip without leaving the header. Keyed by
  // panel so a crown change can never show panel A's history under panel B; cleared wholesale on a
  // none-stale poll (the unhealthy window ended). SPARK_MIN gates it: below that many accumulated ticks it
  // renders NOTHING (never a fabricated trend).
  var freshHist={}, SPARK_N=8, SPARK_MIN=3;

  // header roll-up can NAME the stalest panel a reader can actually navigate to. This is a DISPLAY-name
  // lookup only — it is NOT a second freshness authority (staleness is still computed from section_sources

  // panels have rendered yet; sectionHead ALSO refreshes an entry live so a title change can't drift it.
  var PANELNAME={
    needs_anthony:"Needs you", today_games:"Tonight's picks", foul_risk:"Foul-Trouble Watch",
    reports:"Game reports", accuracy_cov:"Coverage check", agent_updates:"What we've learned",
    watch_list:"Watch list", running_now:"Running now", done_today:"Done today",
    helpers:"Helpers running", upcoming:"The full queue" };
  function clock(iso){ var m=/T(\d{2}):(\d{2})/.exec(iso||""); return m ? (m[1]+":"+m[2]) : ""; }

     (kills the 'as of 06:23' UTC leak beside a live 'checked 29s ago' chip; directive 230000Z section 3). */
  function etClock(iso){ if(!iso) return ""; try{ var d=new Date(iso); if(isNaN(d.getTime())) return "";
      return d.toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit'})
              .replace(/\s+/g,'').toLowerCase(); }catch(e){ return ""; } }
  var MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function monthDay(iso){ var m=/^(\d{4})-(\d{2})-(\d{2})/.exec(iso||""); return m ? (MON[(+m[2])-1]+" "+(+m[3])) : (iso||""); }
  /* Section provenance shows a LIVE "checked Xago" (never a frozen "as of" clock): the bake
     re-validates every section against the record, so the honest freshness anchor for each
     section is the board's revalidated_utc, ticking every second (board-refresh doctrine). */
  // ORDER-1 helper: a panel's own freshness stamp = its section_sources[key].as_of (one-status-truth).
  function secAsOf(key){ var m=(SRC && key && SRC[key])||null; return (m && m.as_of) ? m.as_of : null; }
  function staleAfterSecs(){ return (FRESH && FRESH.stale_after_secs) || 300; }
  // ONE freshness authority: given a section key, compute its data age + stale verdict from
  // section_sources exactly as provFor / the STALE badge do. Both provFor (per-panel badge) and
  // stalestSection (the header roll-up) call this — no second staleness rule anywhere.
  function staleInfo(key){
    var m=(SRC && key && SRC[key])||null;
    var asOf=(m && m.as_of) || null;
    var win=(m && m.stale_after) || staleAfterSecs();
    var ageSecs = asOf ? sinceIso(asOf) : null;
    var clientStale = (ageSecs!=null) && (ageSecs > win);
    var stale = !!(m && m.stale) || clientStale;
    return {m:m, asOf:asOf, win:win, ageSecs:ageSecs, stale:stale};
  }
  // The "next refresh ~Xm" hint text — ONLY when a section carries a REAL per-section cadence
  // (m.stale_after) AND is not already overdue. No cadence -> "" (never a fabricated countdown);
  // overdue -> "" (the STALE badge already carries that story). cadence is passed explicitly so a
  // panel on the board-level fallback window (no own cadence) shows nothing.
  function nextRefText(ageSecs, cadence){
    if(ageSecs==null || !cadence) return "";
    var rem = cadence - ageSecs;
    return rem>0 ? (" · next refresh ~"+agoSecs(rem)) : "";
  }
  function provFor(key){
    var info=staleInfo(key);
    var m=info.m;
    var asOf=info.asOf;
    var prov=el("span","prov");
    var src=(m && m.source) ? ("from "+m.source+" · ") : "";
    // HONEST FRESHNESS (BR-V2 — never show stale data as fresh): the ticking age is anchored on the
    // section's REAL data as_of (when the source last changed), NOT the bake instant. The old code
    // ticked off `revalidated_utc` (== every bake), so a panel whose data was 14h old still read
    // "checked 30s ago" and only a server-set flag could badge it — a board that re-stamps itself
    // fresh while its data rots. Now the number reflects DATA age and STALE is computed client-side:
    // stale if the data is older than the board's own stale_after window, OR the assembler flagged it.
    // Ref: Grafana / Datadog "last updated" — staleness is measured from the data timestamp, not render.
    // Per-panel window: use THIS section's own stale_after cadence (queue 5m, review 16h, pipe 8h,
    // updates 48h) so a long-cadence panel is never false-alarmed and a short one is never missed;
    // fall back to the board-level window (the frozen-board net) for recomputed-fresh panels.
    var win = info.win;
    var ageSecs = info.ageSecs;
    var stale = info.stale;
    // HONEST reason for the red flag (A-rung: the STALE badge must explain ITSELF, not just sit red).
    // Prefer the assembler's own copy-gated stale_reason; else compose one from the LIVE client-side age
    // so a frozen board (a 304 that never re-bakes, so no server reason was written) still says why.
    var reason = (m && m.stale_reason) || "";

      reason = (ageSecs!=null)
        ? ("These readings may be out of date — last updated "+agoSecs(ageSecs)+" ago.")
        : "These readings may be out of date.";
    }
    if(asOf){
      prov.innerHTML = src + "as of <b>…</b>";
      prov.setAttribute("data-asof", asOf);
      prov.setAttribute("data-staleafter", win);

      // Only when this section has its OWN cadence (m.stale_after); omitted otherwise (no fabricated
      // countdown) and self-blanks once overdue (nextRefText returns "").
      if(m && m.stale_after){

      }

      // No source stamp at all — say so plainly; never fabricate a fresh tick for data of unknown age.
      prov.innerHTML = src + "freshness unknown";
    }

    return {prov:prov, stale:stale, reason:reason};
  }
  // The loud STALE flag, carrying its own hover-explanation (the section's stale_reason) so a coach
  // who sees red on a panel learns WHY without opening anything. One builder for every panel's badge.
  function staleBadge(reason){ var b=el("span","stalebadge","stale"); if(reason){ b.title=reason; } return b; }
  function sectionHead(title, key){
    if(key && title){ PANELNAME[key]=title; }   // keep the roll-up's display name in sync with what renders
    var wrap=el("div","sechead");
    // A++ click-to-culprit anchor: a stable per-key section-head id the header freshness chip can
    // scroll to (sec-<key>). Keyed panels only; keyless heads (e.g. "Coming soon") stay un-anchored.
    if(key){ wrap.id="sec-"+key; }
    wrap.appendChild(el("h2",null,title));
    var p=provFor(key);
    if(p.stale){ wrap.appendChild(staleBadge(p.reason)); }
    wrap.appendChild(p.prov);
    return wrap;
  }
  // BOARD-LEVEL FRESHNESS ROLL-UP (A+): find the single stalest NAMEABLE panel so the header dot can
  // name the culprit without the operator scanning every panel. Uses the SAME staleInfo verdicts the
  // badges compute (no second authority). Eligibility, honest by construction:
  //   - must be a rendered, nameable panel (in PANELNAME) — an internal section_sources row with no
  //     on-page panel (e.g. pipe_health) is never crowned over a panel the operator can actually see;
  //   - must carry a REAL stale verdict AND a derivable age — an unknown-timestamp section stays
  //     "freshness unknown" and is never crowned stalest over a section with a real, aged verdict.
  // Stalest = greatest data age (oldest as_of) among those. null when nothing qualifies (no manufactured
  // alarm -> the dot keeps its normal generated_utc behavior).
  // A++: returns {key,name,ageSecs,count} — count = how many OTHER nameable panels are ALSO stale
  // (drives the "+N more" suffix), tallied from the SAME staleInfo verdicts (never a second authority).
  // count===0 when only one panel is stale (so the chip never fabricates a "+0 more").
  function stalestSection(){
    var best=null, staleCount=0;
    for(var k in SRC){ if(!SRC.hasOwnProperty(k)) continue;
      var nm=PANELNAME[k]; if(!nm) continue;
      var info=staleInfo(k);
      if(!info.stale || info.ageSecs==null) continue;
      staleCount++;
      // A+++: carry the crowned panel's OWN copy-gated stale_reason (the assembler's section_sources
      // reason string) so the header chip can surface WHY inline. Upstream-only — empty when the
      // section has no reason (reason-omitted-when-absent; NEVER the composed client fallback here).
      if(!best || info.ageSecs>best.ageSecs){ best={key:k, name:nm, ageSecs:info.ageSecs, reason:(info.m && info.m.stale_reason) || ""}; }
    }
    if(best){ best.count=staleCount-1; }   // OTHER stale panels beyond the crowned one
    return best;
  }
  // A++ CLICK-TO-CULPRIT: scroll the operator to the stalest panel's section head + briefly highlight
  // it, so a glance at the header chip becomes a one-click jump to the actual stale panel. No-op when
  // nothing is stale (stalestSection()===null) or the panel is not currently rendered (no sec-<key> id).
  function scrollToStalest(){
    var st=stalestSection(); if(!st) return;
    var target=document.getElementById("sec-"+st.key); if(!target) return;
    if(target.scrollIntoView){ target.scrollIntoView({behavior:"smooth", block:"center"}); }
    if(target.classList){
      target.classList.remove("culprit-flash"); void target.offsetWidth; target.classList.add("culprit-flash");
      setTimeout(function(){ if(target.classList){ target.classList.remove("culprit-flash"); } }, 2000);
    }
  }
  function tickProv(){
    // Tick the DATA-age anchor (data-asof), so "as of Xm ago" reflects when the source last changed —
    // not the bake instant (BR-V2). CRITICAL: poll() returns null on a 304, so a FROZEN board never
    // re-renders — the STALE badge must therefore be driven from the clock here, or a dead board would
    // keep looking fresh forever. Each second we recompute the true age and ensure the header carries a
    // STALE badge once the data crosses the stale window, even with no new bake.
    var pv=document.querySelectorAll(".prov[data-asof]");
    for(var p=0;p<pv.length;p++){
      var node=pv[p];
      var ps=sinceIso(node.getAttribute("data-asof"));
      var bb=node.querySelector("b"); if(bb) bb.textContent=(ps==null)?"just now":(agoSecs(ps)+" ago");
      // tick the per-panel "next refresh ~Xm" hint (data-cadence only; self-blanks once overdue)
      var cad=+node.getAttribute("data-cadence");
      var nrn=node.querySelector(".nextref"); if(nrn && cad){ nrn.textContent=nextRefText(ps, cad); }

      var win=(+node.getAttribute("data-staleafter")) || staleAfterSecs();
      var want=(ps!=null) && (ps > win);

  function agoSecs(s){ s=Math.max(0,s);
    if(s<60) return s+"s"; if(s<3600) return Math.floor(s/60)+"m";

    return Math.floor(s/86400)+"d"; }
  function sinceIso(iso){ if(!iso) return null; var d=new Date(iso);
    if(isNaN(d.getTime())) return null; return Math.round((Date.now()-d.getTime())/1000); }

  /* ---------- header health chips — TRUE anchors, ticking every second ---------- */
  function healthChips(b){
    var wrap=document.getElementById("chips"); wrap.innerHTML="";
    function mk(id, label, title){ var c=el("span","hchip"); c.id=id; c.title=title||"";
      c.appendChild(el("span","dot")); c.appendChild(el("span",null,label)); wrap.appendChild(c); return c; }
    // ONE small freshness dot — the only reader-facing health signal (how fresh the numbers are,
    // and a loud tick to bad if the data goes stale). The old crew-status chips (the monitor
    // heartbeat + the inbox backlog) were internal plumbing that told a reader nothing about
    // tonight's picks, so they were pulled out of the top per the CEO.
    var cd=mk("ch-data","", "How fresh the numbers on this page are (time since the page data last refreshed).");
    // A++ click-to-culprit: the chip scrolls to the stalest panel when one is crowned (no-op otherwise).
    cd.onclick=scrollToStalest;
    // A++++ freshness-history spark holder: a small inline strip sitting right beside the crown pill,
    // populated by tickChips (setChipSpark) with the crowned panel's last-N revalidation verdicts;
    // hidden until enough history has accumulated (no fabricated trend).
    var csp=el("span","freshspark"); csp.id="ch-spark"; csp.style.display="none"; wrap.appendChild(csp);
    // A+++ stale-reason holder: an empty sub-line span, populated by tickChips ONLY when a crowned
    // panel carries its own copy-gated stale_reason; stays display:none (no reason -> no dangle).
    var cr=el("span","chipreason"); cr.id="ch-reason"; cr.style.display="none"; wrap.appendChild(cr);

  }
  function setChip(id, cls, text, title){ var c=document.getElementById(id); if(!c) return;
    c.className="hchip "+cls; c.lastChild.textContent=text; if(title!=null) c.title=title; }
  // A+++: render the crowned panel's stale_reason inline beneath the chip. textContent-safe (the
  // reason is copy-gated upstream but never trusted as markup here); an empty/falsy reason hides the
  // sub-line entirely (reason-omitted-when-absent) so a crowned panel with no reason shows name+age only.
  function setChipReason(txt){ var r=document.getElementById("ch-reason"); if(!r) return;
    if(txt){ r.textContent=txt; r.style.display=""; } else { r.textContent=""; r.style.display="none"; } }
  // A++++ RECORD a revalidation tick into the per-panel freshness ring buffer. Called once per REAL poll
  // (poll().then), NEVER on the cosmetic 1-second tickChips, so 8 entries = 8 revalidations, not 8 seconds.
  // Records EVERY nameable panel that carries a real, aged verdict (so the crowned panel's slice can hold
  // the greens from when it was fresh earlier in the same unhealthy window — that is what distinguishes a
  // one-off blip from chronic staleness). Honesty guards carried intact: only PANELNAME panels (an
  // internal no-panel row is never charted) with a DERIVABLE age (ageSecs!=null — an unknown-timestamp
  // section is never charted, mirroring the crown's own eligibility). A none-stale poll clears the whole
  // buffer (the unhealthy window is over; the next stale event starts a fresh history).
  function recordFreshHist(){
    if(!stalestSection()){ freshHist={}; return; }   // none-stale -> reset all history
    for(var k in SRC){ if(!SRC.hasOwnProperty(k)) continue;

  function tickChips(){
    if(!lastB) return;
    var b=lastB;

    // transient "refreshing…" instead of a frozen stale claim. Driven by the REAL in-flight flag
    // (set/cleared by poll()), never a fake animation; reverts to truth the instant the fetch resolves
    // or fails (poll() clears the flag and re-ticks in both its .then and .catch).
    if(boardFetching){

      setChipReason("");   // an in-flight refresh is not a stale claim -> no reason sub-line
      setChipSpark(null);  // ...nor a history claim -> hide the spark for the transient
      return;
    }
    // A+ freshness ROLL-UP: when any nameable panel has crossed its own staleness window, the header
    // dot NAMES the single stalest panel + its age (so the operator sees the culprit without scanning
    // every panel) and goes loud. A++ makes it ACTIONABLE: the chip is a click-to-culprit control and
    // carries a "+N more" tail when OTHER panels are also stale. When nothing is stale, it keeps its
    // normal behavior below — the dot's colour tracks the page-data age off generated_utc, no alarm.
    var st=stalestSection();
    if(st){
      var more=(st.count>0) ? (" · +"+st.count+" more") : "";   // only when OTHER panels are stale (never "+0 more")

      setChip("ch-data","bad clickable","data · "+st.name+" "+agoSecs(st.ageSecs)+" old"+more,

      // A+++: surface the crowned panel's OWN reason inline (or hide the sub-line when it has none).
      // Recomputed every tick, so the reason follows the crown when it changes between ticks.
      setChipReason(st.reason);
      // A++++: render the crowned panel's freshness-history spark (chronic-vs-blip), or hide it below
      // the min-history threshold. Keyed by st.key, so it always shows THIS crown's own history.
      setChipSpark(st.key);

    /* ---------- queue reorder: local edits + one batched send ---------- */
  var QKEY="hw_queue_ops_v1";
  var QVERB={top:"Move this to the very top of the queue", bump:"Move this toward the front",
             demote:"Push this one spot lower", shelve:"Set this one aside for now"};
  function loadOps(){ try{ var v=JSON.parse(localStorage.getItem(QKEY)); return Array.isArray(v)?v:[]; }
    catch(e){ return []; } }
  function saveOps(ops){ try{ localStorage.setItem(QKEY, JSON.stringify(ops)); }catch(e){} }
  function applyOps(base, ops){
    var order=base.slice();
    (ops||[]).forEach(function(op){
      var i=-1;
      for(var k=0;k<order.length;k++){ if((order[k].task_id||order[k].header)===op.id){ i=k; break; } }
      if(i<0) return;
      var c=order.splice(i,1)[0];
      if(op.action==="top"||op.action==="bump"){ order.unshift(c); }
      else if(op.action==="demote"){ order.splice(Math.min(i+1,order.length),0,c); }
    });
    return order;
  }
  function addOp(id, action){ var ops=loadOps(); ops.push({id:id, action:action}); saveOps(ops);
    rerender(); updateBar(); }
  function discardOps(){ saveOps([]); rerender(); updateBar(); }
  function sendAll(){
    var ops=loadOps(); if(!ops.length) return;
    var n=ops.length;
    var title="QUEUE: batch reorder ("+n+" change"+(n>1?"s":"")+")";
    var lines=ops.map(function(o){ return "QUEUE: "+o.id+": "+o.action; });
    var body=lines.join("\n")+"\n\n— batch queue changes from The Hardwood board";
    var url="https://github.com/AnthonyTurgelis/hardwood-site/issues/new"
      +"?title="+encodeURIComponent(title)+"&body="+encodeURIComponent(body)+"&labels=queue";
    window.open(url,"_blank","noopener");
    saveOps([]); rerender(); updateBar(true);
  }
  function buildBar(){
    var bar=el("div"); bar.id="qbar";
    var msg=el("span","qbar-msg"); msg.id="qbar-msg";
    var send=el("button","qbar-send","Send all to GitHub"); send.type="button"; send.onclick=sendAll;
    var disc=el("button","qbar-disc","Discard"); disc.type="button"; disc.onclick=discardOps;
    bar.appendChild(msg); bar.appendChild(send); bar.appendChild(disc);
    document.body.appendChild(bar);
  }
  function updateBar(sent){
    var bar=document.getElementById("qbar"); if(!bar) return;
    var msg=document.getElementById("qbar-msg");
    var send=bar.querySelector(".qbar-send"), disc=bar.querySelector(".qbar-disc");
    var n=loadOps().length;
    if(n>0){
      msg.className="qbar-msg";
      msg.textContent="● Unsaved changes — "+n+" queue change"+(n>1?"s":"")+" not sent yet";
      send.disabled=false; disc.style.display="";
      bar.style.display="flex"; document.body.classList.add("hasbar");
    } else if(sent){
      msg.className="qbar-msg sent";
      msg.textContent="Sent. The queue updates within a minute.";
      send.disabled=true; disc.style.display="none";
      bar.style.display="flex"; document.body.classList.add("hasbar");
      setTimeout(function(){ if(!loadOps().length){ bar.style.display="none"; document.body.classList.remove("hasbar"); } }, 4000);
    } else {
      bar.style.display="none"; document.body.classList.remove("hasbar");
    }
  }

  /* HERO — tonight's slate is the biggest thing on the board: matchup, ET tip, OUR PICK

    var grid=el("div","gcards");

      var c=el("div","gcard"); c.setAttribute("data-k","tg|"+(g.abbr||g.matchup||""));
      var top=el("div","gtop");
      top.appendChild(el("span","team", g.matchup||g.abbr||""));
      if(g.awaiting_final){ top.appendChild(el("span","tip","Final pending")); }

      c.appendChild(top);
      if(g.call){
        var pk=el("div","pick");
        pk.appendChild(el("span","lab","Our pick"));
        pk.appendChild(el("span","val", g.call));
        c.appendChild(pk);
      }
      // win chance + one-glance confidence read on a single scannable line (the coach question:
      // is this a strong call or a coin-flip?). Falls back to the legacy win_line if win_pct absent.
      if(g.win_pct!=null){
        var w=el("div","win");
        w.appendChild(el("b",null, g.win_pct+"%"));
        w.appendChild(el("span","wt"," to win"));
        if(g.confidence){ w.appendChild(el("span","conf"," · "+g.confidence)); }
        c.appendChild(w);
      } else if(g.win_line){ c.appendChild(el("div","win", g.win_line)); }
      // honest 80% margin band — the pick is an estimate, so show how wide the likely result is.
      if(g.range80){
        var rg=el("div","range");
        rg.appendChild(el("span","rlab","80% range"));
        rg.appendChild(el("span","rval", g.range80));
        c.appendChild(rg);
      }
      // GAME-SHAPE tail read (VIS-P2): chance of a one-possession finish vs a 20+ blowout — baked
      // server-side from the same margin distribution as the range above (client renders, never
      // computes). Omit-not-invent: a game with no distribution shows NO shape line. The "vs
      // typical" context sits inline (muted) with the plain-English definition on hover.
      if(g.tails && g.tails.nail_pct!=null && g.tails.blow_pct!=null){
        var ts=el("div","range tails");
        ts.appendChild(el("span","rlab","Game shape"));
        ts.appendChild(el("span","rval","Nailbiter "+g.tails.nail_pct+"% · Blowout "+g.tails.blow_pct+"%"));
        if(g.tails.nail_base_pct!=null && g.tails.blow_base_pct!=null){
          ts.appendChild(el("span","rmut","typical: "+g.tails.nail_base_pct+"% · "+g.tails.blow_base_pct+"%"));
        }
        ts.title="Nailbiter = decided by 3 points or fewer; blowout = decided by 20 or more. "+
          "Read from tonight's predicted-margin range, next to a typical league night.";
        c.appendChild(ts);
      }
      // one-line HONEST "why we favor them" — the driver behind the pick (our full-roster rating
      // edge, plus an availability or pace note when the row carries one). Reuses the range row's
      // classes (no new CSS); wraps on a phone; graceful-null — rendered only when a driver is baked.
      if(g.driver){
        var wy=el("div","range"); wy.style.flexWrap="wrap"; wy.style.color="var(--ink)";
        wy.appendChild(el("span","rlab","Why"));
        wy.appendChild(el("span","rval", g.driver));
        c.appendChild(wy);
      }
      if(g.venue_note){ c.appendChild(el("div","venue", g.venue_note)); }

      // ---- IMPACT-FIRST availability (BR-V2 reader-value pass) ----
      // The one thing a coach/GM/fan needs from a game card is WHO IS OUT tonight (and who steps up),
      // not a 28-name depth dump in 11px type. So we (1) surface the ruled-out players + any promotion
      // as a plain "Out …" line up top, and (2) keep the full depth chart but COLLAPSED behind a toggle
      // so the card stays scannable and reads as one product, not a table.
      // Discipline: `g.abbr` is guarded (a game missing it must degrade cleanly, never throw and kill
      // the whole hero); omit-not-invent (no outs -> NO line, never a fabricated "nobody out").
      var sides = String(g.abbr||"").split(" @ ");
      var awayAbbr = (sides[0]||"").trim(), homeAbbr = (sides[1]||"").trim();
      // CONSOLIDATED promotion rule (2026-07-22): the "steps up" rule is baked SERVER-SIDE as the
      // `promoted` boolean on every depth row (build_site.py _depth_promoted — the exact old client
      // rule !out && !susp && effective && base && effective < base). This renderer only READS the
      // flag; it no longer re-derives the rule, so it can never drift from the availability
      // readout's "Likely to step up" clause (which reads the same flag). A pre-flag row degrades
      // to no "steps up" entry (omit-not-invent), never a locally re-derived guess.
      function scanSide(dc, abbr){
        var outs=[], steps=[];
        (dc||[]).forEach(function(p){
          if(!p || !p.player) return;
          var tag = abbr ? (" ("+abbr+")") : "";
          if(p.out || p.susp){ outs.push(p.player+tag); }
          else if(p.promoted){ steps.push(p.player+tag); }
        });
        return {outs:outs, steps:steps};
      }
      var aw=scanSide(g.away_depth, awayAbbr), hm=scanSide(g.home_depth, homeAbbr);
      var outs=aw.outs.concat(hm.outs), steps=aw.steps.concat(hm.steps);
      if(outs.length){
        var ol=el("div","outs");
        ol.appendChild(el("span","lab","Out"));
        ol.appendChild(document.createTextNode(outs.join(", ")));
        if(steps.length){ ol.appendChild(el("span","stp"," · steps up: "+steps.join(", "))); }
        c.appendChild(ol);
      }
      // Full depth chart — kept for the reader who wants the whole rotation, but on-demand (collapsed).
      function renderDc(title, dc) {
        if (!dc || !dc.length) return null;
        var wrap = el("div", "dc-wrap");
        wrap.appendChild(el("div", "dc-title", (title||"") + " Depth"));

          // NOTE: dc-promoted is a DISPLAY-ONLY slot-elevation highlight and is DELIBERATELY a
          // broader rule than the consolidated `promoted` steps-up flag (no out/susp guard — an
          // out player whose effective slot moved still shows her slot elevation in the full
          // chart). NOT part of the steps-up rule; do not "consolidate" it onto p.promoted.
          if (p.effective && p.base && p.effective < p.base) { cls.push("dc-promoted"); }
          var nm = el("span", cls.join(" "), p.player);
          var pos = el("span", "dc-pos", p.group + (p.effective ? p.effective : ""));
          pEl.appendChild(nm);
          pEl.appendChild(pos);
          grid.appendChild(pEl);
        });
        wrap.appendChild(grid);
        return wrap;
      }
      var awayDc = renderDc(awayAbbr, g.away_depth);
      var homeDc = renderDc(homeAbbr, g.home_depth);
      if (awayDc || homeDc) {
        var det = el("details", "depth");
        det.appendChild(el("summary", null, "Depth chart ▾"));
        var dcBox = el("div", "dc-box");
        if (awayDc) dcBox.appendChild(awayDc);
        if (homeDc) dcBox.appendChild(homeDc);
        det.appendChild(dcBox);

      grid.appendChild(c);
    });
    s.appendChild(grid);

  }
  /* TONIGHT'S EDGE — data-gated hero (renders ONLY if the board carries a `tonight_edge` block).
     Reserved for a Director-adopted, plain-English betting/monetization edge; renders nothing
     until the emitter surfaces one, so the board is redesign-ready without disclosing an
     un-adopted recommendation (render-from-core; adoption stays a Director call). */
  function renderTonightEdge(e){
    if(!e || !e.headline) return null;
    var s=el("div","edge"); s.setAttribute("data-k","edge");
    s.appendChild(el("div","et", e.label||"Tonight's edge"));
    s.appendChild(el("div","eh", e.headline));
    if(e.detail){ s.appendChild(el("div","ew", e.detail)); }

  }
  /* HOME COVERAGE TILE — a glanceable, honest calibration readout on the front page so a coach sees
     "our ranges cover as advertised" WITHOUT opening the Accuracy tab. SINGLE-SOURCED from
     ./accuracy.json's `calibration` array (the SAME read_accuracy output the Accuracy tab renders);
     nothing is recomputed here. Omit-not-invent: a band missing a real coverage number is dropped,
     and with no bands at all the tile does not render (graceful-null). Thin samples are LABELLED, not
     dressed up as a firm read (anti-cherry-pick discipline). Betting-free: an audit of our own
     honesty, never a pick. */
  var COV_THIN_N=40;   // below this a band's coverage is an early read — flagged, not a firm claim
  function covOff(k){ return !!k.flag || Math.abs((k.actual||0)-(k.target||0))>5; }
  function covThin(k){ return k.n!=null && k.n<COV_THIN_N; }
  /* Coverage trend vs the PRIOR bake — arrow renders ONLY when the feed actually carries a prior
     coverage number for the band (k.prev, the empirical coverage from the previous scorecard). The
     baker keeps only the latest run today, so no prior snapshot exists yet -> no arrow ever fires
     (omit-not-invent; a faked trend would be a data-integrity defect, CEO #1). When a prior IS
     present: the arrow = direction of the coverage-% change (▲ rose / ▼ fell), coloured by whether
     that move went TOWARD nominal (better = up class) or AWAY (worse = down class). */
  function covTrend(k){
    if(!k || k.prev==null || k.actual==null || k.target==null) return null;
    var d=Math.round((k.actual-k.prev)*10)/10;
    if(d===0) return { arrow:"→", cls:"", text:"flat vs last bake" };
    var closer=Math.abs(k.actual-k.target)<Math.abs(k.prev-k.target);
    return { arrow:(d>0?"▲":"▼"), cls:(closer?"up":"down"),
             text:(d>0?"+":"")+d+" pts vs last bake ("+(closer?"toward":"away from")+" target)" };
  }
  function renderCoverageTile(acc){
    if(!acc) return null;
    var cal=(acc.calibration||[]).filter(function(k){
      return k && k.actual!=null && k.target!=null; });   // omit any band without a real number
    if(!cal.length) return null;
    // headline band = the highest target (the 90% range leads); deterministic sort so the tile is stable
    var bands=cal.slice().sort(function(a,b){ return (b.target||0)-(a.target||0); });
    var s=el("section","hero"); s.setAttribute("data-k","coverage");
    var eb=el("div","eyebrow");
    eb.appendChild(el("span",null,"Are our ranges honest?"));
    var p=provFor("accuracy_cov");
    if(p.stale){ eb.appendChild(staleBadge(p.reason)); }
    eb.appendChild(p.prov);
    s.appendChild(eb);
    var tile=el("div","covtile");
    var top=bands[0];
    var base="Our "+top.target+"% ranges contained the actual result "+top.actual+"% of the time";
    var suffix=(!covThin(top) && !covOff(top)) ? " — right about where they should." : ".";
    tile.appendChild(el("div","ch", base+suffix));
    var row=el("div","cbands");
    bands.forEach(function(k){
      var b=el("div","cband");
      var big=el("div","cbig"+(covOff(k)?" off":""), k.actual+"%");
      var tr=covTrend(k);   // renders nothing today (no prior snapshot in the feed)
      if(tr){ var ta=el("span","ctrend "+tr.cls, tr.arrow); ta.title=tr.text; big.appendChild(ta); }
      b.appendChild(big);
      var sub=el("div","csub");
      sub.appendChild(document.createTextNode("inside our "+k.target+"% range"
        + (k.n!=null?(" · n="+k.n):"")));
      if(covThin(k)){ sub.appendChild(el("span","cthin"," · thin sample")); }
      b.appendChild(sub);
      row.appendChild(b);
    });
    tile.appendChild(row);
    // Season POINT accuracy — how CLOSE we are, alongside how HONEST the ranges are.
    // Single-sourced from acc.backtest.headline (read_accuracy_backtest); nothing recomputed here.
    // Omit-not-invent: no headline / no avg_miss -> no point row; a null win_pct drops only that stat.
    var h=(acc.backtest && acc.backtest.available!==false) ? acc.backtest.headline : null;
    if(h && h.avg_miss!=null){
      var pr=el("div","cpoint");
      var m1=el("div","cpm");
      m1.appendChild(el("b",null, h.avg_miss+" pts"));
      m1.appendChild(el("span",null,"off the final margin, on average"
        + (h.n_games?(" · "+h.n_games+" games"):"")));
      pr.appendChild(m1);
      if(h.win_pct!=null){
        var m2=el("div","cpm");
        m2.appendChild(el("b",null, h.win_pct+"%"));
        m2.appendChild(el("span",null,"of the time we call the right winner"));
        pr.appendChild(m2);
      }
      tile.appendChild(pr);
    }
    // honest one-liner, DERIVED from the data (never a marketing claim)
    var cw=el("div","cw"), msg;
    if(bands.some(covThin)){ msg="An early read on a thin sample — we publish it now and firm it up as more games grade."; }
    else if(bands.some(covOff)){ msg="One range is running off its target — we show it plainly rather than hide it."; }
    else { msg="A range should contain the real result about as often as it claims — and ours do. Audited on our own scored games, not a marketing number."; }
    cw.appendChild(document.createTextNode(msg+" "));
    var a=el("a","rlink","See the full scorecard →"); a.href="./accuracy.html";
    cw.appendChild(a);
    tile.appendChild(cw);
    s.appendChild(tile);
    return s;
  }
  /* FOUL-TROUBLE WATCH — mount point for tonight's foul-risk readout. Renders ONLY when
     ./foul_risk.json is present with entries (a separate data feed produces it); until then
     nothing shows (graceful degradation). Descriptive readout of who is at risk of foul
     trouble tonight and why — never a betting call. Accepts a flexible entry shape so it
     works whatever exact fields the feed lands with. */
  function foulLevel(p){
    var v=(p.level!=null)?p.level:(p.score!=null?p.score:null);
    if(v!=null){ v=+v; if(v>1){ v=v/100; } return Math.max(0,Math.min(1,v)); }
    var w=String(p.risk||p.tier||"").toLowerCase();
    if(/high|severe|red/.test(w)) return .9;
    if(/elevat|medium|amber|watch/.test(w)) return .6;
    if(/low|mild|green/.test(w)) return .3;
    return .5;
  }
  function foulColor(lv){ return lv>=0.75?"var(--bad)":(lv>=0.45?"var(--warn)":"var(--muted)"); }
  function renderFoulWatch(f){
    if(!f) return null;
    var rows=f.players||f.watch||f.items||[];
    if(!rows.length) return null;   // no entries -> render nothing (never an empty card)
    var s=el("section"); s.setAttribute("data-k","foulwatch");
    var head=el("div","sechead"); head.appendChild(el("h2",null,"Foul-Trouble Watch"));
    var p=provFor("foul_risk");
    if(p.stale){ head.appendChild(staleBadge(p.reason)); }
    head.appendChild(p.prov);
    s.appendChild(head);
    if(f.note){ s.appendChild(el("p","empty", f.note)); }
    var list=el("div","list");
    rows.forEach(function(r){
      var row=el("div","row"); row.setAttribute("data-k","foul|"+(r.name||r.player||""));
      row.appendChild(el("span","nm", r.name||r.player||""));
      if(r.team){ row.appendChild(el("span","tag", r.team)); }
      if(r.matchup){ row.appendChild(el("span","tag", r.matchup)); }
      if(r.detail||r.why){ row.appendChild(el("span","oneln", r.detail||r.why)); }
      var right=el("span","right");
      var lv=foulLevel(r);
      // severity meter: colored fill PLUS an always-present text label (identity never color-alone)
      var meter=el("span"); meter.style.cssText="display:inline-block;width:46px;height:6px;border-radius:999px;background:var(--line);overflow:hidden;position:relative;top:-1px";
      var fill=el("span"); fill.style.cssText="display:block;height:100%;width:"+Math.round(lv*100)+"%;background:"+foulColor(lv);
      meter.appendChild(fill);
      right.appendChild(meter);
      right.appendChild(el("span","tm", r.risk||r.tier||(lv>=.75?"High":lv>=.45?"Elevated":"Low")));
      row.appendChild(right);
      list.appendChild(row);
    });
    s.appendChild(list);
    return s;
  }
  function pdfWrap(items){

    (items||[]).forEach(function(p){ var a=el("a",null,p.label); a.href=p.href; a.target="_blank";

    var list=el("div","list");

  /* ---------- render ---------- */
  var lastLive=null;   // newest live payload
  var lastB=null;      // what is currently displayed (live or snapshot)
  var FOUL=null;       // tonight's foul-risk feed (./foul_risk.json), null until it lands
  var ACC=null;        // self-graded scorecard (./accuracy.json), null until it lands — feeds the HOME coverage tile
  function render(b){
    lastB=b;
    SRC=b.section_sources||{};
    // Register the foul-watch feed's freshness so its panel stamps + sorts like any other section.
    if(FOUL && (FOUL.as_of||FOUL.generated_utc)){
      SRC.foul_risk={ as_of:(FOUL.as_of||FOUL.generated_utc), source:(FOUL.source||"tonight's foul-risk read"),
        stale_after:(FOUL.stale_after||43200) };
    }
    // Register the coverage tile's freshness so its badge + within-tier sort behave like any section.
    // accuracy re-bakes ~daily, so a 48h window avoids false-alarming a normal overnight-old scorecard.
    if(ACC && (ACC.generated_utc||ACC.date)){
      SRC.accuracy_cov={ as_of:(ACC.generated_utc||ACC.date),
        source:(ACC.source||"our self-graded scorecard"), stale_after:172800 };
    }
    FRESH=b.freshness||{};
    var sec=b.sections||{};
    healthChips(b); banner(b);
    document.getElementById("summary").innerHTML="";
    var sm=document.getElementById("summary");
    if(b.day_summary){ sm.appendChild(document.createTextNode(b.day_summary)); }
    sm.appendChild(el("span","dim","  ·  "+(b.date||"")));
    renderSubtabs(b); renderFilters(b);
    var main=document.getElementById("main"); main.innerHTML="";
    if(activeTab==="today"){
      // TIERED HIERARCHY (BR-V2 product-triage): the front page leads with the PRODUCT and sinks the
      // crew/monitor plumbing — instead of ordering purely by which panel was re-baked most recently,
      // which floated an empty "Running now" and the internal ticker ABOVE tonight's picks and the game
      // reports (the ops-dashboard feel). The tiers, top to bottom:
      //   Tier 0  an ACTIONABLE "Needs you" — a real decision the CEO must make outranks everything.
      //   Tier 1  PRODUCT — tonight's picks, tonight's edge, game reports.
      //   Tier 2  secondary reader value — what we learned, the daily-review watch list.
      //   Tier 3  crew / ops chrome — running now, done today, helper jobs, the monitor ticker; these
      //           carry no reader value up front, so they always land at the bottom, never in prime space.
      // Within a tier we still sort MOST-RECENT first (section as_of DESC), then by declared order, so
      // picks lead reports and a stale panel sinks inside its own tier. An empty "Needs you" is not a
      // decision, so it drops to Tier 3. running_live is the LIVE-gated list (empty means nothing is
      // running — never fall back to the delta cards, which can hold stale/finished entries);
      // only a legacy snapshot with no running_live at all falls back to running_now.
      var live=(sec.running_live!=null)? sec.running_live : sec.running_now;
      var decActionable=!!((sec.needs_anthony && sec.needs_anthony.length) || (b.setup && b.setup.length));
      var panels=[];
      // Keep the BR-V2 tier ordering (product leads, crew chrome sinks) AND graft in the
      // look-upgrade's Foul-Trouble Watch panel (tier 1, beside tonight's games).
      function addPanel(node, key, tier){ if(node){ panels.push({node:node, asOf:secAsOf(key), tier:tier, i:panels.length}); } }
      addPanel(renderDecisions(sec.needs_anthony, b.setup, b.answer_all), "needs_anthony", decActionable?0:3);
      addPanel(renderTodayGames(sec.today_games), "today_games", 1);
      addPanel(renderFoulWatch(FOUL), "foul_risk", 1);
      addPanel(renderTonightEdge(sec.tonight_edge), null, 1);
      addPanel(renderReports(b.reports, b.rollover), "reports", 1);
      addPanel(renderCoverageTile(ACC), "accuracy_cov", 2);
      addPanel(renderAgentUpdates(sec.agent_updates), "agent_updates", 2);
      addPanel(renderWatch(sec.watch_list), "watch_list", 2);
      addPanel(renderRunning(live), "running_now", 3);
      addPanel(renderDone(sec.done_today), "done_today", 3);
      addPanel(renderHelpers(b.helpers), null, 3);
      addPanel(renderScoutActivity(b.scout_activity), "scout_activity", 3);
      panels.sort(function(a,c){
        if(a.tier!==c.tier) return a.tier-c.tier;  // product tiers first, crew/ops chrome last
        var av=a.asOf||"", cv=c.asOf||"";          // within a tier: most-recent panel first
        if(av!==cv) return av<cv?1:-1;             // as_of DESC
        return a.i-c.i;                             // stable: declared order on ties (picks before reports)
      });
      panels.forEach(function(p){ main.appendChild(p.node); });
    } else {
      main.appendChild(renderQueue(sec.upcoming, sec.coming_soon, !!viewDate));
    }
    document.getElementById("foot").textContent =
      "Auto-generated from the working record. Last refreshed " + (b.generated_et||"") +
      ". Every number on this page is baked in advance — your browser never touches a database.";
    tickElapsed(); tickProv();
    flash();
  }
  function rerender(){ render(viewDate && snapB ? snapB : (lastLive||lastB)); }

  /* ---------- live runtime: poll own JSON, ETag, ago-chip, flash ---------- */
  var URL="./board.json", etag=null,lastMod=null,lastFetch=0,cardHTML={},first=true;
  function updAgo(){
    var s=Math.max(0,Math.round((Date.now()-lastFetch)/1000));
    var t = s<60 ? (s+"s ago") : (Math.floor(s/60)+"m "+(s%60)+"s ago");
    var a=document.getElementById("ago"); if(a) a.innerHTML = lastFetch? ("live · checked <b>"+t+"</b>") : "";
  }
  function flash(){
    var nodes=document.querySelectorAll("#main [data-k]"), nm={};
    for(var i=0;i<nodes.length;i++){ var n=nodes[i]; var k=n.getAttribute("data-k"), h=n.innerHTML; nm[k]=h;
      if(!first && cardHTML[k]!==undefined && cardHTML[k]!==h){ n.classList.remove("flash"); void n.offsetWidth; n.classList.add("flash"); } }
    cardHTML=nm; first=false;
  }
  function poll(){
    var h={}; if(etag)h["If-None-Match"]=etag; if(lastMod)h["If-Modified-Since"]=lastMod;
    // A++ honest refreshing state: flag the in-flight fetch + tick so the chip shows "refreshing…"
    // while the request is genuinely open; cleared (and re-ticked to truth) in BOTH branches below.
    boardFetching=true; tickChips();
    fetch(bust(URL),{headers:h,cache:"no-cache"}).then(function(r){
      if(r.status===304) return null;
      etag=r.headers.get("ETag")||etag; lastMod=r.headers.get("Last-Modified")||lastMod; return r.json();
    }).then(function(b){ boardFetching=false; lastFetch=Date.now(); if(b){ lastLive=b; if(!viewDate){ render(b); } else { healthChips(b); } } else { tickChips(); }
      // A++++: a completed fetch (200 or 304) IS a revalidation tick — record this poll's per-panel
      // verdicts (SRC is now current from render), then re-tick so the crown's history spark redraws.
      recordFreshHist(); tickChips(); updAgo(); }).catch(function(e){
      boardFetching=false; tickChips();
      if(!lastFetch){ document.getElementById("main").innerHTML='<p class="empty">Could not load the board (board.json). '+(e&&e.message?e.message:"")+'</p>'; }
    });
  }
  poll(); setInterval(poll,60000);
  /* foul-risk feed — polled independently of the board; graceful-null on 404/absent so the
     panel simply does not appear until the feed lands. */
  function pollFoul(){
    fetch(bust("./foul_risk.json"),{cache:"no-cache"}).then(function(r){ return r.ok? r.json() : null; })
      .then(function(j){ if(j){ var changed=JSON.stringify(j)!==JSON.stringify(FOUL); FOUL=j;
        if(changed && !viewDate && lastLive){ render(lastLive); } } }).catch(function(){});
  }
  pollFoul(); setInterval(pollFoul,60000);
  /* accuracy scorecard feed — polled independently of the board (same pattern as foul-risk). The
     HOME coverage tile is single-sourced from ./accuracy.json; graceful-null on 404/absent so the
     tile simply does not appear until the scorecard lands. Slow feed (re-bakes ~daily) -> 5-min poll. */
  function pollAccuracy(){
    fetch(bust("./accuracy.json"),{cache:"no-cache"}).then(function(r){ return r.ok? r.json() : null; })
      .then(function(j){ if(j){ var changed=JSON.stringify(j)!==JSON.stringify(ACC); ACC=j;
        if(changed && !viewDate && lastLive){ render(lastLive); } } }).catch(function(){});
  }
  pollAccuracy(); setInterval(pollAccuracy,300000);
  setInterval(function(){ updAgo(); tickChips(); tickProv(); }, 1000);
  setInterval(tickElapsed, 15000);

  /* ---------- queue-edit bar: build, sync across tabs, warn on leave ---------- */
  buildBar(); updateBar();
  window.addEventListener("storage", function(e){ if(e.key===QKEY){ rerender(); updateBar(); } });
  window.addEventListener("beforeunload", function(e){
    if(loadOps().length){ e.preventDefault(); e.returnValue=""; return ""; }
  });
})();
</script>
</body>
