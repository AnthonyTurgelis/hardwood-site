<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — Status Board</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#16181d; --muted:#5b6472; --line:#e5e8ee;
    --accent:#2b6cb0; --shadow:0 1px 3px rgba(20,24,35,.08);
    --live:#1f883d; --verified:#0969da; --inflight:#9a6700; --shelved:#6e7781;
    --null:#6e7781; --promote:#8250df; --blocked:#cf222e; --done:#57606a;
    --ok:#1f883d; --warn:#9a6700; --bad:#cf222e;
    --flash:rgba(43,108,176,.14);
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#050505; --card:#131518; --ink:#ffffff; --muted:#aebac9; --line:#262d36;
      --accent:#58a6ff; --shadow:none; --live:#3fb950; --verified:#58a6ff; --inflight:#d29922;
      --shelved:#8b949e; --null:#8b949e; --promote:#a371f7; --blocked:#f85149; --done:#8b949e;
      --ok:#3fb950; --warn:#d29922; --bad:#f85149; --flash:rgba(88,166,255,.20); }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:13.5px/1.42 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-text-size-adjust:100%}
  a{color:var(--accent)}
  
  /* Depth Chart Styles */
  .dc-box { display: flex; gap: 16px; margin-top: 12px; font-size: 11px; padding: 12px; background: var(--bg); border-radius: 6px; border: 1px solid var(--line); }
  .dc-wrap { flex: 1; }
  .dc-title { font-weight: 600; margin-bottom: 6px; color: var(--muted); text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
  .dc-grid { display: flex; flex-direction: column; gap: 4px; }
  .dc-player { display: flex; justify-content: space-between; align-items: baseline; }
  .dc-name { font-weight: 500; }
  .dc-out { text-decoration: line-through; color: var(--muted); }
  .dc-promoted { color: var(--live); font-weight: 600; }
  .dc-pos { color: var(--muted); font-size: 10px; }

  .wrap{max-width:860px;margin:0 auto;padding:0 12px}
  header{padding:6px 0 2px}
  .hrow{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:16px;margin:0}
  .ago{font-size:11px;color:var(--muted);white-space:nowrap}
  .ago b{color:var(--live);font-variant-numeric:tabular-nums}
  /* health chips — true anchors, ticking every second */
  .chips{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0 0}
  .hchip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:var(--muted);
    border:1px solid var(--line);background:var(--card);border-radius:999px;padding:2px 9px;
    font-variant-numeric:tabular-nums;white-space:nowrap}
  .hchip .dot{width:7px;height:7px;border-radius:50%;background:var(--done);flex:0 0 auto}
  .hchip.ok .dot{background:var(--ok)} .hchip.warn .dot{background:var(--warn)}
  .hchip.bad .dot{background:var(--bad)}
  .banner{margin:8px 0 0;padding:7px 11px;border-radius:8px;font-size:12.5px;font-weight:600;
    border:1px solid var(--line);background:var(--card)}
  .banner.idle{border-left:3px solid var(--bad)} .banner.paused{border-left:3px solid var(--warn)}
  /* the one day-summary sentence */
  .summary{margin:9px 0 0;font-size:14.5px;line-height:1.45;font-weight:600}
  .summary .dim{color:var(--muted);font-weight:500}
  nav{display:flex;gap:5px;flex-wrap:wrap;margin:9px 0 0}
  nav a{font-size:11.5px;text-decoration:none;color:var(--accent);border:1px solid var(--line);
    background:var(--card);padding:3px 9px;border-radius:999px}
  nav a.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  /* sub-tabs: Today | Queue */
  .subtabs{display:flex;gap:0;margin:10px 0 0;border-bottom:1px solid var(--line)}
  .subtab{font:inherit;font-size:13px;font-weight:650;color:var(--muted);background:none;border:none;
    padding:6px 14px;cursor:pointer;border-bottom:2px solid transparent}
  .subtab.active{color:var(--ink);border-bottom-color:var(--accent)}
  .subtab .n{font-size:10.5px;color:var(--muted);font-weight:600}
  /* filters row */
  .filters{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:9px 0 0}
  .pill{font:inherit;font-size:11px;font-weight:640;color:var(--muted);background:var(--card);
    border:1px solid var(--line);border-radius:999px;padding:2px 10px;cursor:pointer}
  .pill.active{color:#fff;background:var(--accent);border-color:var(--accent)}
  .filters select{font:inherit;font-size:11px;color:var(--ink);background:var(--card);
    border:1px solid var(--line);border-radius:6px;padding:2px 6px}
  .snapnote{font-size:11.5px;color:var(--warn);font-weight:650}
  main{padding:2px 0 48px}
  section{margin-top:14px}
  .sechead{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin:0 0 5px}
  .sechead h2{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
    margin:0;font-weight:700}
  .prov{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums}
  /* STALE badge — loud by design: a section older than its cadence must read as a warning, not a
     whisper (agent-updates stale-badge wire). Text is the literal "STALE" (uppercased in CSS). */
  .stalebadge{font-size:10px;font-weight:800;letter-spacing:.07em;color:#fff;background:var(--blocked);
    border-radius:999px;padding:2px 8px;text-transform:uppercase;box-shadow:0 0 0 2px rgba(198,40,40,.22)}
  .empty{color:var(--muted);font-size:12.5px;font-style:italic;margin:4px 0}
  /* ---------- dense rows ---------- */
  .list{background:var(--card);border:1px solid var(--line);border-radius:9px;overflow:hidden;
    box-shadow:var(--shadow)}
  .row{display:flex;gap:8px;align-items:baseline;padding:6px 10px;border-bottom:1px solid var(--line);
    font-size:13px;min-width:0}
  .row:last-child{border-bottom:none}
  .row.flash{animation:fl 1.1s ease}
  @keyframes fl{0%{background:var(--flash)}100%{background:transparent}}
  .row .nm{font-weight:620;flex:0 1 auto;min-width:0}
  .row .oneln{color:var(--muted);font-size:12px;flex:1 1 40%;min-width:0;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap}
  .row .right{margin-left:auto;display:inline-flex;gap:6px;align-items:baseline;white-space:nowrap;flex:0 0 auto}
  .tm{font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .chip{font-size:9px;font-weight:700;letter-spacing:.03em;padding:1px 6px;border-radius:999px;
    color:#fff;text-transform:uppercase;flex:0 0 auto;cursor:default}
  .c-LIVE{background:var(--live)} .c-VERIFIED{background:var(--verified)}
  .c-IN-FLIGHT{background:var(--inflight)} .c-SHELVED{background:var(--shelved)}
  .c-NULL{background:var(--null)} .c-PROMOTE{background:var(--promote)}
  .c-BLOCKED{background:var(--blocked)} .c-DONE{background:var(--done)}
  .tag{font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:0 5px;
    white-space:nowrap;flex:0 0 auto}
  .passes{font-size:10px;color:var(--muted);white-space:nowrap}
  .rlink{font-size:10.5px;text-decoration:none;white-space:nowrap}
  /* headline rows — the ~6 wins of the day */
  .hl{display:block;padding:8px 10px 8px 12px;border-bottom:1px solid var(--line);position:relative}
  .hl:last-child{border-bottom:none}
  .hl::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--verified)}
  .hl.i5::before{background:var(--live)}
  .hl .t{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
  .hl .nm{font-size:14.5px;font-weight:740}
  .hl .why{color:var(--muted);font-size:12.5px;margin-top:1px}
  .minorrow{display:flex;gap:8px;flex-wrap:wrap;align-items:baseline;padding:4px 10px;
    border-bottom:1px solid var(--line);font-size:12px}
  .minorrow:last-child{border-bottom:none}
  .minorfam{font-weight:700;color:var(--ink);white-space:nowrap}
  .minoritems{color:var(--muted)}
  details.more>summary{cursor:pointer;font-size:12px;color:var(--accent);margin-top:7px;list-style:none}
  details.more>summary::-webkit-details-marker{display:none}
  details.inline{display:inline}
  details.inline>summary{cursor:pointer;font-size:10.5px;color:var(--accent);list-style:none;display:inline}
  details.inline>summary::-webkit-details-marker{display:none}
  details.inline .raw{display:block;font:10.5px/1.5 ui-monospace,monospace;color:var(--muted);
    margin:3px 0 2px;word-break:break-word}
  /* running rows */
  .run .nm{font-weight:640}
  .elapsed{font-size:10.5px;color:var(--inflight);font-variant-numeric:tabular-nums;white-space:nowrap}
  /* decisions */
  .decision{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:8px;padding:8px 10px;margin-bottom:6px}
  .decision .q{font-weight:600;font-size:12.5px}
  .decision .one{color:var(--muted);font-size:12px;margin-top:2px}
  .decision .reply{display:inline-block;margin-top:4px;font-size:11px;font-family:ui-monospace,monospace;
    background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:2px 7px;color:var(--ink)}
  .btnrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
  .taybtn{font-size:11.5px;font-weight:640;text-decoration:none;color:#fff;background:var(--accent);
    border:1px solid var(--accent);border-radius:6px;padding:3px 11px}
  .taybtn.ghost{background:transparent;color:var(--accent)}
  .btnhint{font-size:10px;color:var(--muted);margin-top:4px}
  .setup{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--promote);
    border-radius:8px;padding:9px 11px;margin-bottom:8px}
  .setup .st{font-weight:650;font-size:12.5px}
  .setup .sb{color:var(--muted);font-size:12px;margin-top:2px}
  /* queue tab */
  .floorline{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;margin:9px 0 7px;font-size:12.5px}
  .floorline .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex:0 0 auto;position:relative;top:1px}
  .qrow{display:block;padding:7px 10px;border-bottom:1px solid var(--line)}
  .qrow:last-child{border-bottom:none}
  .qrow.parked{border-left:3px solid var(--inflight)}
  .qrow .t{display:flex;gap:7px;align-items:baseline;flex-wrap:wrap}
  .qrow .rk{font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:700;
    min-width:26px;flex:0 0 auto}
  .qrow .nm{font-weight:640;font-size:13px}
  .qrow .why{color:var(--muted);font-size:12px;margin:2px 0 0 33px}
  .qrow .acts{margin-left:auto;display:inline-flex;gap:4px;flex:0 0 auto}
  .fam{font-size:9px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:1px 6px;
    border-radius:999px;color:#fff;flex:0 0 auto}
  .fam-modeling{background:var(--promote)} .fam-data{background:var(--verified)}
  .fam-site{background:var(--live)} .fam-infra{background:var(--done)} .fam-research{background:var(--inflight)}
  .qstatus{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;
    padding:1px 6px;border-radius:999px;color:#fff;background:var(--done);flex:0 0 auto}
  .qstatus.qs-ready-now{background:var(--live)} .qstatus.qs-ready{background:var(--verified)}
  .qstatus.qs-waiting-on-you{background:var(--inflight);text-transform:none;letter-spacing:0}
  .qstatus.qs-answered{background:var(--live);text-transform:none;letter-spacing:0}
  .pmflag{font-size:9px;font-weight:700;color:#fff;background:var(--promote);border-radius:999px;padding:1px 6px}
  .qbtn{cursor:pointer;font:inherit;font-size:12px;text-decoration:none;color:var(--muted);
    border:1px solid var(--line);background:var(--bg);border-radius:6px;padding:0 7px}
  .qbtn:hover{color:var(--ink)}
  .comingrow{padding:7px 10px;border-bottom:1px solid var(--line)}
  .comingrow:last-child{border-bottom:none}
  .comingrow .nm{font-weight:640}
  .comingrow .why{color:var(--muted);font-size:12px;margin-top:1px}
  /* scout activity strip */
  .scoutlog{list-style:none;padding:0;margin:0;font-variant-numeric:tabular-nums}
  .scoutrow{display:block;padding:4px 10px;border-bottom:1px solid var(--line);font-size:12px;line-height:1.45}
  .scoutrow:last-child{border-bottom:none}
  .scoutrow .stime{color:var(--accent);font-size:10.5px;display:inline-block;min-width:56px}
  .scoutrow .stext{color:var(--muted)}
  /* helpers panel: process rows + work-slot width line */
  .hbstale{font-size:11.5px;color:var(--bad);margin:2px 0 6px;display:flex;align-items:center;gap:6px}
  .hwidth{font-size:12.5px;margin:2px 0 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .hwline{font-weight:650}
  .hwreason{color:var(--muted);font-size:11.5px}
  .helperlist{list-style:none;padding:0;margin:0}
  .helperrow{display:flex;align-items:center;gap:8px;padding:5px 10px;border-bottom:1px solid var(--line);font-size:12px}
  .helperrow:last-child{border-bottom:none}
  .hdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;background:var(--muted)}
  .hdot.on{background:var(--ok)} .hdot.off{background:var(--bad)}
  .hbody{display:flex;flex-direction:column;gap:1px;flex:1 1 auto;min-width:0}
  .hname{font-weight:600}
  .hdoes{color:var(--muted);font-size:10.5px;line-height:1.35}
  .hstate{color:var(--muted);font-size:11px;white-space:nowrap;flex:0 0 auto}
  .hstate.stale{color:var(--bad);font-weight:650}
  .pdfs{display:flex;gap:6px;flex-wrap:wrap}
  .pdfs a{display:inline-block;font-size:12px;text-decoration:none;color:var(--accent);
    border:1px solid var(--line);background:var(--card);padding:3px 9px;border-radius:7px}
  .watch{margin:0;padding:12px;background:var(--warn-bg,#fff3cd);border:1px solid var(--warn,#ffeeba);border-radius:4px;list-style-type:none}
  .watch li{margin-bottom:6px;color:var(--text);font-size:14px;font-weight:bold}
  .watch li:before{content:"⚠️ ";}
  .legend{font-size:11px;color:var(--muted);margin-top:6px}
  footer{padding:16px 0;color:var(--muted);font-size:11px}
  /* sticky unsaved-queue-changes bar */
  #qbar{position:fixed;top:0;left:0;right:0;z-index:60;display:none;align-items:center;gap:10px;
    padding:8px 14px;background:var(--card);border-bottom:1px solid var(--line);
    box-shadow:0 2px 8px rgba(20,24,35,.14);flex-wrap:wrap}
  .qbar-msg{font-size:12.5px;font-weight:660;color:var(--blocked);margin-right:auto}
  .qbar-msg.sent{color:var(--live)}
  #qbar button{font:inherit;font-size:11.5px;font-weight:640;border-radius:6px;padding:3px 12px;cursor:pointer}
  .qbar-send{color:#fff;background:var(--accent);border:1px solid var(--accent)}
  .qbar-send:disabled{opacity:.55;cursor:default}
  .qbar-disc{color:var(--accent);background:transparent;border:1px solid var(--line)}
  body.hasbar{padding-top:42px}
  /* ---------- HERO: tonight's games + our pick (redesign v2: the biggest thing, top) ---------- */
  .hero{margin-top:6px}
  .hero .eyebrow{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    font-weight:800;display:flex;align-items:baseline;gap:8px;margin:0 0 6px}
  .hero .eyebrow .prov{font-weight:600;letter-spacing:0}
  .gcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:6px}
  .gcard{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 10px;
    box-shadow:var(--shadow);display:flex;flex-direction:column;gap:5px;position:relative;overflow:hidden}
  .gcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
  .gcard .gtop{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .gcard .team{font-size:17px;font-weight:800;letter-spacing:-.01em;line-height:1.15}
  .gcard .tip{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}
  .gcard .pick{display:flex;align-items:baseline;gap:7px;margin-top:2px}
  .gcard .pick .lab{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;
    color:#fff;background:var(--accent);border-radius:5px;padding:1px 6px;flex:0 0 auto}
  .gcard .pick .val{font-size:14px;font-weight:750}
  .gcard .win{font-size:12px;color:var(--muted);font-weight:600}
  .gcard .win b{color:var(--ink);font-variant-numeric:tabular-nums}
  .gcard .venue{font-size:11px;color:var(--warn);line-height:1.4;margin-top:1px}
  /* ---------- EDGE hero (data-gated: only renders if the board carries a tonight_edge block) ---------- */
  .edge{margin-top:12px;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--promote);
    border-radius:12px;padding:11px 14px;box-shadow:var(--shadow)}
  .edge .et{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:800;color:var(--promote)}
  .edge .eh{font-size:15px;font-weight:780;margin-top:3px}
  .edge .ew{font-size:12.5px;color:var(--muted);margin-top:2px}
  /* freshness / stale */
  .prov b{color:var(--live);font-variant-numeric:tabular-nums;font-weight:700}
  .banner.stale{border-left:3px solid var(--warn)}
  @media (max-width:520px){
    .row{flex-wrap:wrap}
    .row .oneln{flex-basis:100%;order:3;white-space:normal}
    .qrow .why{margin-left:0}
    .qrow .acts{margin-left:0}
    .gcards{grid-template-columns:1fr}
    .gcard .team{font-size:16px}
  }

  /* Logos for matchups */
  .matchup-row{display:flex;align-items:center;gap:12px;}
  .team-grp{display:flex;align-items:center;gap:6px;}
  .team-logo{width:22px;height:22px;object-fit:contain;}
  .team-abbr{font-size:16px;font-weight:800;letter-spacing:-.01em;}
  .vs{font-size:12px;color:var(--muted);font-weight:600;}

  </style>
</head>
<body>
<div class="wrap">
<header>
  <div class="hrow">
    <h1>The Hardwood — Status Board</h1>
    <span class="ago" id="ago"></span>
  </div>
  <div class="chips" id="chips"></div>
  <div id="banner"></div>
  <div class="summary" id="summary"></div>
  <nav>
    <a class="active" href="./index.html">Board</a>
    <a href="./queue.html">What's Next</a>
    <a href="./games.html">Games</a>
    <a href="./teams.html">Teams</a>
    <a href="./players.html">Players</a>
    <a href="./review.html">Daily Review</a>
    <a href="./accuracy.html">Our Accuracy</a>
    <a href="./ledger.html">Error Map</a>
  <a href="./org.html">The Team</a>
  <a href="./scouting.html">Scouting</a>
  <a href="./deepdive.html">Deep Dives</a>
  </nav>
  <div class="subtabs" id="subtabs"></div>
  <div class="filters" id="filters"></div>
</header>
<main id="main"><p class="empty">Loading the board…</p></main>
<footer id="foot"></footer>
</div>
<script>
(function(){
  "use strict";
  function el(tag, cls, txt){ var e=document.createElement(tag); if(cls)e.className=cls;
    if(txt!=null)e.textContent=txt; return e; }

  /* plain meanings for every status word — hover/legend (no robotic log-speak) */
  var CHIPMEAN={
    "LIVE":"Shipped to the live product.",
    "VERIFIED":"Finished and independently double-checked.",
    "IN-FLIGHT":"Running right now.",
    "SHELVED":"Parked, with its numbers written down.",
    "NULL":"Tested honestly — no improvement found.",
    "PROMOTE":"A candidate improvement, awaiting sign-off.",
    "BLOCKED":"Waiting on an input or a decision.",
    "DONE":"Completed and recorded."
  };
  function chip(status){ var c=el("span","chip c-"+status, status);
    if(CHIPMEAN[status]) c.title=CHIPMEAN[status]; return c; }

  var SRC={}, FRESH={};
  function clock(iso){ var m=/T(\d{2}):(\d{2})/.exec(iso||""); return m ? (m[1]+":"+m[2]) : ""; }
  /* Eastern-time clock from any ISO/UTC stamp — the board never shows a raw UTC clock to a human
     (kills the 'as of 06:23' UTC leak beside a live 'checked 29s ago' chip; directive 230000Z section 3). */
  function etClock(iso){ if(!iso) return ""; try{ var d=new Date(iso); if(isNaN(d.getTime())) return "";
      return d.toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit'})
              .replace(/\s+/g,'').toLowerCase(); }catch(e){ return ""; } }
  var MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function monthDay(iso){ var m=/^(\d{4})-(\d{2})-(\d{2})/.exec(iso||""); return m ? (MON[(+m[2])-1]+" "+(+m[3])) : (iso||""); }
  /* Section provenance shows a LIVE "checked Xago" (never a frozen "as of" clock): the bake
     re-validates every section against the record, so the honest freshness anchor for each
     section is the board's revalidated_utc, ticking every second (board-refresh doctrine). */
  // ORDER-1 helper: a panel's own freshness stamp = its section_sources[key].as_of (one-status-truth).
  function secAsOf(key){ var m=(SRC && key && SRC[key])||null; return (m && m.as_of) ? m.as_of : null; }
  function staleAfterSecs(){ return (FRESH && FRESH.stale_after_secs) || 300; }
  function provFor(key){
    var m=(SRC && SRC[key])||null;
    var asOf=(m && m.as_of) || null;
    var prov=el("span","prov");
    var src=(m && m.source) ? ("from "+m.source+" · ") : "";
    // HONEST FRESHNESS (BR-V2 — never show stale data as fresh): the ticking age is anchored on the
    // section's REAL data as_of (when the source last changed), NOT the bake instant. The old code
    // ticked off `revalidated_utc` (== every bake), so a panel whose data was 14h old still read
    // "checked 30s ago" and only a server-set flag could badge it — a board that re-stamps itself
    // fresh while its data rots. Now the number reflects DATA age and STALE is computed client-side:
    // stale if the data is older than the board's own stale_after window, OR the assembler flagged it.
    // Ref: Grafana / Datadog "last updated" — staleness is measured from the data timestamp, not render.
    // Per-panel window: use THIS section's own stale_after cadence (queue 5m, review 16h, pipe 8h,
    // updates 48h) so a long-cadence panel is never false-alarmed and a short one is never missed;
    // fall back to the board-level window (the frozen-board net) for recomputed-fresh panels.
    var win = (m && m.stale_after) || staleAfterSecs();
    var ageSecs = asOf ? sinceIso(asOf) : null;
    var clientStale = (ageSecs!=null) && (ageSecs > win);
    var stale = !!(m && m.stale) || clientStale;
    if(asOf){
      prov.innerHTML = src + "as of <b>…</b>";
      prov.setAttribute("data-asof", asOf);
      prov.setAttribute("data-staleafter", win);
    } else {
      // No source stamp at all — say so plainly; never fabricate a fresh tick for data of unknown age.
      prov.innerHTML = src + "freshness unknown";
    }
    if(m && m.stale_reason){ prov.title=m.stale_reason; }
    return {prov:prov, stale:stale};
  }
  function sectionHead(title, key){
    var wrap=el("div","sechead"); wrap.appendChild(el("h2",null,title));
    var p=provFor(key);
    if(p.stale){ wrap.appendChild(el("span","stalebadge","stale")); }
    wrap.appendChild(p.prov);
    return wrap;
  }
  function tickProv(){
    // Tick the DATA-age anchor (data-asof), so "as of Xm ago" reflects when the source last changed —
    // not the bake instant (BR-V2). CRITICAL: poll() returns null on a 304, so a FROZEN board never
    // re-renders — the STALE badge must therefore be driven from the clock here, or a dead board would
    // keep looking fresh forever. Each second we recompute the true age and ensure the header carries a
    // STALE badge once the data crosses the stale window, even with no new bake.
    var pv=document.querySelectorAll(".prov[data-asof]");
    for(var p=0;p<pv.length;p++){
      var node=pv[p];
      var ps=sinceIso(node.getAttribute("data-asof"));
      var bb=node.querySelector("b"); if(bb) bb.textContent=(ps==null)?"just now":(agoSecs(ps)+" ago");
      var head=node.parentNode; if(!head) continue;
      var win=(+node.getAttribute("data-staleafter")) || staleAfterSecs();
      var want=(ps!=null) && (ps > win);
      var existing=head.querySelector(".stalebadge");
      if(want && !existing){ head.insertBefore(el("span","stalebadge age","stale"), node); }
      else if(!want && existing && existing.className.indexOf("age")>=0){ head.removeChild(existing); }
    }
  }
  function agoSecs(s){ s=Math.max(0,s);
    if(s<60) return s+"s"; if(s<3600) return Math.floor(s/60)+"m";
    if(s<86400) return Math.floor(s/3600)+"h "+Math.floor((s%3600)/60)+"m";
    return Math.floor(s/86400)+"d"; }
  function sinceIso(iso){ if(!iso) return null; var d=new Date(iso);
    if(isNaN(d.getTime())) return null; return Math.round((Date.now()-d.getTime())/1000); }

    /* ---------- queue reorder: local edits + one batched send ---------- */
  var QKEY="hw_queue_ops_v1";
  var QVERB={top:"Move this to the very top of the queue", bump:"Move this toward the front",
             demote:"Push this one spot lower", shelve:"Set this one aside for now"};
  function loadOps(){ try{ var v=JSON.parse(localStorage.getItem(QKEY)); return Array.isArray(v)?v:[]; }
    catch(e){ return []; } }
  function saveOps(ops){ try{ localStorage.setItem(QKEY, JSON.stringify(ops)); }catch(e){} }
  function applyOps(base, ops){
    var order=base.slice();
    (ops||[]).forEach(function(op){
      var i=-1;
      for(var k=0;k<order.length;k++){ if((order[k].task_id||order[k].header)===op.id){ i=k; break; } }
      if(i<0) return;
      var c=order.splice(i,1)[0];
      if(op.action==="top"||op.action==="bump"){ order.unshift(c); }
      else if(op.action==="demote"){ order.splice(Math.min(i+1,order.length),0,c); }
    });
    return order;
  }
  function addOp(id, action){ var ops=loadOps(); ops.push({id:id, action:action}); saveOps(ops);
    rerender(); updateBar(); }
  function discardOps(){ saveOps([]); rerender(); updateBar(); }
  function sendAll(){
    var ops=loadOps(); if(!ops.length) return;
    var n=ops.length;
    var title="QUEUE: batch reorder ("+n+" change"+(n>1?"s":"")+")";
    var lines=ops.map(function(o){ return "QUEUE: "+o.id+": "+o.action; });
    var body=lines.join("\n")+"\n\n— batch queue changes from The Hardwood board";
    var url="https://github.com/AnthonyTurgelis/hardwood-site/issues/new"
      +"?title="+encodeURIComponent(title)+"&body="+encodeURIComponent(body)+"&labels=queue";
    window.open(url,"_blank","noopener");
    saveOps([]); rerender(); updateBar(true);
  }
  function buildBar(){
    var bar=el("div"); bar.id="qbar";
    var msg=el("span","qbar-msg"); msg.id="qbar-msg";
    var send=el("button","qbar-send","Send all to GitHub"); send.type="button"; send.onclick=sendAll;
    var disc=el("button","qbar-disc","Discard"); disc.type="button"; disc.onclick=discardOps;
    bar.appendChild(msg); bar.appendChild(send); bar.appendChild(disc);
    document.body.appendChild(bar);
  }
  function updateBar(sent){
    var bar=document.getElementById("qbar"); if(!bar) return;
    var msg=document.getElementById("qbar-msg");
    var send=bar.querySelector(".qbar-send"), disc=bar.querySelector(".qbar-disc");
    var n=loadOps().length;
    if(n>0){
      msg.className="qbar-msg";
      msg.textContent="● Unsaved changes — "+n+" queue change"+(n>1?"s":"")+" not sent yet";
      send.disabled=false; disc.style.display="";
      bar.style.display="flex"; document.body.classList.add("hasbar");
    } else if(sent){
      msg.className="qbar-msg sent";
      msg.textContent="Sent. The queue updates within a minute.";
      send.disabled=true; disc.style.display="none";
      bar.style.display="flex"; document.body.classList.add("hasbar");
      setTimeout(function(){ if(!loadOps().length){ bar.style.display="none"; document.body.classList.remove("hasbar"); } }, 4000);
    } else {
      bar.style.display="none"; document.body.classList.remove("hasbar");
    }
  }

  /* ---------- running now: every live lane, with a ticking elapsed timer ---------- */
  function renderRunning(live){
    var s=el("section"); s.appendChild(sectionHead("Running now","running_now"));
    if(!live || !live.length){ s.appendChild(el("p","empty","Nothing is running this minute.")); return s; }
    var list=el("div","list");
    live.forEach(function(c){
      var r=el("div","row run"); r.setAttribute("data-k","run|"+c.name);
      r.appendChild(chip("IN-FLIGHT"));
      r.appendChild(el("span","nm", c.name));
      if(c.one_liner){ r.appendChild(el("span","oneln", c.one_liner)); }
      var right=el("span","right");
      if(c.team){ right.appendChild(el("span","tag", c.team)); }
      if(c.kind && c.kind!=="lane"){ right.appendChild(el("span","tag", c.kind)); }
      // ELAPSED vs CONFIRMED (BR-V2 Running-Now truth): if the claim carries a real start time we show
      // "for Xm" (true elapsed). If it doesn't (start_unknown — the claim ledger records no start), we
      // must NOT fake an elapsed-since-start; the anchor is the ledger's last reconcile, so we show
      // "confirmed Xm ago" = the last time the ledger positively saw this lane running.
      var elp=el("span","elapsed");
      if(c.at_iso){ elp.setAttribute("data-since", c.at_iso);
        if(c.start_unknown){ elp.setAttribute("data-confirm","1"); } }
      right.appendChild(elp);
      r.appendChild(right);
      list.appendChild(r);
    });
    s.appendChild(list);
    return s;
  }
  function tickElapsed(){
    var nodes=document.querySelectorAll(".elapsed[data-since]");
    for(var i=0;i<nodes.length;i++){

      var conf=nodes[i].getAttribute("data-confirm");
      nodes[i].textContent = (s==null)? "" : (conf? ("confirmed "+agoSecs(s)+" ago") : ("for "+agoSecs(s)));
    }
    var tms=document.querySelectorAll(".hw-tm[data-utc]");
    for(var j=0;j<tms.length;j++){
      var t=sinceIso(tms[j].getAttribute("data-utc"));
      if(t!=null && t>=0){ /* keep the baked ET clock; append relative time */
        var base=tms[j].getAttribute("data-base")||tms[j].textContent.split(" · ")[0];
        tms[j].setAttribute("data-base", base);
        tms[j].textContent = base+" · "+agoSecs(t)+" ago";

    }
  }

      c.appendChild(top);
      if(g.call){
        var pk=el("div","pick");
        pk.appendChild(el("span","lab","Our pick"));
        pk.appendChild(el("span","val", g.call));
        c.appendChild(pk);
      }
      if(g.win_line){ c.appendChild(el("div","win", g.win_line)); }
      if(g.venue_note){ c.appendChild(el("div","venue", g.venue_note)); }
      
      // Depth Chart Rendering
      function renderDc(title, dc) {
        if (!dc || !dc.length) return null;
        var wrap = el("div", "dc-wrap");
        wrap.appendChild(el("div", "dc-title", title + " Depth"));
        var grid = el("div", "dc-grid");
        dc.forEach(function(p) {
          var pEl = el("div", "dc-player");
          var cls = ["dc-name"];
          if (p.out || p.susp) { cls.push("dc-out"); }
          if (p.effective && p.base && p.effective < p.base) { cls.push("dc-promoted"); }
          var nm = el("span", cls.join(" "), p.player);
          var pos = el("span", "dc-pos", p.group + (p.effective ? p.effective : ""));
          pEl.appendChild(nm);
          pEl.appendChild(pos);
          grid.appendChild(pEl);
        });
        wrap.appendChild(grid);
        return wrap;
      }
      var dcBox = el("div", "dc-box");
      var awayDc = renderDc(g.abbr.split(" @ ")[0], g.away_depth);
      if (awayDc) dcBox.appendChild(awayDc);
      var homeDc = renderDc(g.abbr.split(" @ ")[1], g.home_depth);
      if (homeDc) dcBox.appendChild(homeDc);
      if (awayDc || homeDc) c.appendChild(dcBox);

      grid.appendChild(c);
    });
    s.appendChild(grid);
    return s;
  }
  /* TONIGHT'S EDGE — data-gated hero (renders ONLY if the board carries a `tonight_edge` block).
     Reserved for a Director-adopted, plain-English betting/monetization edge; renders nothing
     until the emitter surfaces one, so the board is redesign-ready without disclosing an
     un-adopted recommendation (render-from-core; adoption stays a Director call). */
  function renderTonightEdge(e){
    if(!e || !e.headline) return null;
    var s=el("div","edge"); s.setAttribute("data-k","edge");
    s.appendChild(el("div","et", e.label||"Tonight's edge"));
    s.appendChild(el("div","eh", e.headline));
    if(e.detail){ s.appendChild(el("div","ew", e.detail)); }
    return s;
  }
  function pdfWrap(items){
    var wrap=el("div","pdfs");
    (items||[]).forEach(function(p){ var a=el("a",null,p.label); a.href=p.href; a.target="_blank";
      a.rel="noopener"; wrap.appendChild(a); });
    return wrap;
  }
  /* game reports — TONIGHT's product up top, yesterday's under a dated archive header,
     a placeholder until tonight's land, plus the night-readiness confirmation (Task 1) */
  function renderReports(rep, rollover){
    if(!rep) return null;
    var s=el("section"); s.appendChild(sectionHead("Game reports","reports"));
    if(rep.today && rep.today.length){
      s.appendChild(el("div","subhead","Tonight — "+monthDay(rep.today_date)));
      s.appendChild(pdfWrap(rep.today));
    } else {
      s.appendChild(el("p","empty", rep.placeholder||"Tonight's reports land later today."));
    }
    if(rep.archive && rep.archive.length){
      var det=el("details","more");
      det.appendChild(el("summary",null, monthDay(rep.archive_date)+" reports"));
      det.appendChild(pdfWrap(rep.archive));
      s.appendChild(det);
    }
    if(rollover && rollover.label){
      var rl=el("div","rollover"); rl.title=rollover.note||"";
      rl.appendChild(el("span",null, rollover.label));
      s.appendChild(rl);
    }
    return s;
  }

  /* ---------- agent updates ---------- */
  function renderAgentUpdates(updates){
    if(!updates || !updates.length) return null;
    var s=el("section"); s.appendChild(sectionHead("Agent Updates","agent_updates"));
    var list=el("div","list");
    updates.forEach(function(u){
      var d=el("div","decision"); d.setAttribute("id", "msg-"+u.id);
      d.style.borderLeftColor="var(--promote)";
      d.appendChild(el("div","q", u.title));
      var time = el("div","oneln", u.timestamp);
      time.style.color="var(--tx-dim)";
      time.style.fontSize="0.85em";
      d.appendChild(time);
      var body = el("div","oneln");
      body.style.whiteSpace="pre-wrap";
      body.style.marginTop="8px";
      body.style.lineHeight="1.5";
      
      var html = u.body_markdown || "";
      html = html.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      html = html.replace(/^### (.*$)/gm, '<strong style="font-size:1.05em;color:var(--tx-norm)">$1</strong>');
      html = html.replace(/^## (.*$)/gm, '<strong style="font-size:1.1em;color:var(--tx-norm);margin-top:8px;display:block">$1</strong>');
      html = html.replace(/^# (.*$)/gm, '<strong style="font-size:1.2em;color:var(--tx-norm);margin-top:8px;display:block">$1</strong>');
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--tx-norm)">$1</strong>');
      html = html.replace(/^\* (.*$)/gm, '• $1');
      html = html.replace(/^&gt; \[!IMPORTANT\]/gm, '<strong style="color:var(--warn)">IMPORTANT:</strong>');
      html = html.replace(/^&gt; ?(.*)/gm, '<div style="border-left:2px solid var(--promote); padding-left:8px; margin:4px 0; color:var(--tx-dim)">$1</div>');
      
      body.innerHTML = html;
      d.appendChild(body);
      list.appendChild(d);
    });
    s.appendChild(list);
    return s;
  }


  /* ---------- queue tab: the FULL list, floor status, one-tap reorder ---------- */
  function flattenUpcoming(up){
    var base=[];
    ((up&&up.items)||[]).forEach(function(c){ base.push(c); });
    var more=(up&&up.more_by_family)||{};
    Object.keys(more).forEach(function(f){ (more[f]||[]).forEach(function(c){ base.push(c); }); });
    base.sort(function(a,b){ return (a.rank||999)-(b.rank||999); });
    return base;
  }
  function queueRow(c, i, snapshot){
    var r=el("div","qrow"+(c.parked?" parked":"")); r.setAttribute("data-k","upc|"+(c.task_id||c.header));
    var t=el("div","t");
    t.appendChild(el("span","rk","#"+(i+1)));
    t.appendChild(el("span","nm", c.name||c.header||""));
    if(c.family){ t.appendChild(el("span","fam fam-"+c.family, c.family)); }
    if(c.seat){ t.appendChild(el("span","tag", c.seat)); }
    if(c.parked){
      var dt=(c.days_waiting!=null)?(" · "+c.days_waiting+" day"+(c.days_waiting===1?"":"s")):"";
      t.appendChild(el("span","qstatus qs-waiting-on-you", "waiting on you"+dt));
    } else if(c.answered){
      t.appendChild(el("span","qstatus qs-answered", "answered — now executing"));
    } else if(c.status){
      t.appendChild(el("span","qstatus qs-"+String(c.status).replace(/\s+/g,"-"), c.status));
    }
    if(c.pm_authored){ t.appendChild(el("span","pmflag","auto-planned")); }
    if(!snapshot && c.actions && c.actions.length){
      var acts=el("span","acts");
      var tid=c.task_id||c.header;
      c.actions.forEach(function(a){
        var b=el("button","qbtn", a.icon); b.type="button";
        b.title=QVERB[a.verb]||a.verb;
        b.onclick=(function(verb){ return function(){ addOp(tid, verb); }; })(a.verb);
        acts.appendChild(b);
      });
      t.appendChild(acts);
    }
    r.appendChild(t);
    if(c.why){ r.appendChild(el("div","why","Why: "+c.why)); }
    return r;
  }
  function renderQueue(up, comingSoon, snapshot){
    var s=el("section"); s.appendChild(sectionHead("The full queue — everything lined up, in order","upcoming"));
    var base=flattenUpcoming(up);
    var fl=(up&&up.floor)||null;
    if(fl){
      var fline=el("div","floorline");
      var dot=el("span","dot"); dot.style.background = fl.ok ? "var(--ok)" : "var(--warn)";
      fline.appendChild(dot);
      fline.appendChild(el("span",null, fl.label||""));
      s.appendChild(fline);
    }
    if(!base.length){ s.appendChild(el("p","empty","The queue is clear.")); return s; }
    if(up && up.note){ var n=el("p","empty"); n.style.fontStyle="normal"; n.textContent=up.note; s.appendChild(n); }
    var order=snapshot? base : applyOps(base, loadOps());
    var list=el("div","list");
    order.forEach(function(c,i){ list.appendChild(queueRow(c,i,snapshot)); });
    s.appendChild(list);
    if(comingSoon && comingSoon.length){
      var s2=el("div"); s2.appendChild(sectionHead("Coming soon",""));
      var cl=el("div","list");
      comingSoon.forEach(function(c){
        var r=el("div","comingrow");
        var t=el("div","t"); t.appendChild(el("span","nm", c.header||""));
        t.appendChild(el("span","tag", c.state||"coming soon"));
        r.appendChild(t);
        if(c.why){ r.appendChild(el("div","why","A win: "+c.why)); }
        if(c.note){ r.appendChild(el("div","why", c.note)); }
        cl.appendChild(r);
      });
      s2.appendChild(cl);
      s.appendChild(s2);
    }
    return s;
  }

  /* ---------- sub-tabs + filters ---------- */
  var activeTab="today";
  function renderSubtabs(b){
    var w=document.getElementById("subtabs"); w.innerHTML="";
    var c=b.counts||{};
    var qn=(c.upcoming!=null)? c.upcoming : "";
    [["today","Today"+(c.done_today?(" ("+c.done_today+")"):"")],
     ["queue","Queue"+(qn!==""?(" ("+qn+")"):"")]].forEach(function(t){
      var btn=el("button","subtab"+(activeTab===t[0]?" active":""), t[1]); btn.type="button";
      btn.onclick=function(){ activeTab=t[0]; rerender(); };
      w.appendChild(btn);
    });
  }
  var viewDate=null;    // null = live; else "YYYY-MM-DD" snapshot
  var snapB=null;
  function renderFilters(b){
    var w=document.getElementById("filters"); w.innerHTML="";
    if(activeTab!=="today"){ return; }
    [["all","All"],["headlines","Headlines only"]].forEach(function(p){
      var btn=el("button","pill"+(impactFilter===p[0]?" active":""), p[1]); btn.type="button";
      btn.onclick=function(){ impactFilter=p[0]; rerender(); };
      w.appendChild(btn);
    });
    var sel=el("select"); sel.title="Look back at an earlier day's board";
    var today=(lastLive && lastLive.date) || b.date;
    var d0=new Date(today+"T12:00:00");
    for(var i=0;i<8;i++){
      var d=new Date(d0.getTime()-i*86400000);
      var iso=d.toISOString().slice(0,10);
      var o=el("option",null, i===0? "Today" : iso);
      o.value=iso; sel.appendChild(o);
    }
    sel.value=viewDate||today;
    sel.onchange=function(){
      var v=sel.value;
      if(v===today){ viewDate=null; snapB=null; rerender(); return; }
      fetch("./history/board_"+v+".json",{cache:"no-cache"}).then(function(r){
        if(!r.ok){ throw new Error("no snapshot"); } return r.json();
      }).then(function(j){ viewDate=v; snapB=j; rerender(); })
      .catch(function(){ viewDate=null; snapB=null; rerender();
        var f=document.getElementById("filters");
        if(f){ f.appendChild(el("span","snapnote","No saved board for "+v+".")); } });
    };
    w.appendChild(sel);
    if(viewDate){
      var back=el("button","pill active","← back to live"); back.type="button";
      back.onclick=function(){ viewDate=null; snapB=null; rerender(); };
      w.appendChild(back);
      w.appendChild(el("span","snapnote","Viewing "+viewDate+" — a saved copy, not live."));
    }
  }

  /* ---------- render ---------- */
  var lastLive=null;   // newest live payload
  var lastB=null;      // what is currently displayed (live or snapshot)
  function render(b){
    lastB=b;
    SRC=b.section_sources||{};
    FRESH=b.freshness||{};
    var sec=b.sections||{};
    healthChips(b); banner(b);
    document.getElementById("summary").innerHTML="";
    var sm=document.getElementById("summary");
    if(b.day_summary){ sm.appendChild(document.createTextNode(b.day_summary)); }
    sm.appendChild(el("span","dim","  ·  "+(b.date||"")));
    renderSubtabs(b); renderFilters(b);
    var main=document.getElementById("main"); main.innerHTML="";
    if(activeTab==="today"){
      // ORDER-1 (Director v6 0740Z): panels self-order by their own section as_of, MOST-RECENT AT
      // THE TOP — "I stop scrolling at the one I've seen last." Each panel's stamp comes from
      // section_sources[key].as_of (one-status-truth). PIN EXCEPTION (documented): an ACTIONABLE
      // "Needs you" panel pins ABOVE the recency sort — a decision the CEO must action outranks
      // recency; when it is empty ("Nothing needs you") it is NOT pinned and sorts by its own as_of
      // like every other panel. The live-recomputed panels (running/done/today_games) carry the
      // bake-instant as_of so they cluster at the top; a stable sort preserves their declared order
      // on that tie, and panels with no section as_of (tonight's edge, monitor activity) sink last.
      // running_live is the LIVE-gated list (empty means nothing is running — never fall back to the
      // delta-derived cards, which can hold corpses; directive 230000Z section 3). Only a legacy
      // snapshot with no running_live at all falls back to running_now.
      var live=(sec.running_live!=null)? sec.running_live : sec.running_now;
      var decActionable=!!((sec.needs_anthony && sec.needs_anthony.length) || (b.setup && b.setup.length));
      var panels=[];
      function addPanel(node, key, pin){ if(node){ panels.push({node:node, asOf:secAsOf(key), pin:!!pin, i:panels.length}); } }
      addPanel(renderDecisions(sec.needs_anthony, b.setup, b.answer_all), "needs_anthony", decActionable);
      addPanel(renderTodayGames(sec.today_games), "today_games");
      addPanel(renderTonightEdge(sec.tonight_edge), null);
      addPanel(renderReports(b.reports, b.rollover), "reports");
      addPanel(renderAgentUpdates(sec.agent_updates), "agent_updates");
      addPanel(renderRunning(live), "running_now");
      addPanel(renderDone(sec.done_today), "done_today");
      addPanel(renderWatch(sec.watch_list), "watch_list");
      // Crew plumbing (helper processes / scheduled jobs) is NOT reader product — pass a null sort
      // key so it sinks to the bottom cluster with the monitor ticker instead of floating up on its
      // fresh stamp. The panel and its loud stale guards are kept; they just no longer lead (CEO).
      addPanel(renderHelpers(b.helpers), null);
      addPanel(renderScoutActivity(b.scout_activity), "scout_activity");
      panels.sort(function(a,c){
        if(a.pin!==c.pin) return a.pin?-1:1;      // pinned actionable "Needs you" stays on top
        var av=a.asOf||"", cv=c.asOf||"";         // ISO stamps sort lexically; missing as_of sinks
        if(av!==cv) return av<cv?1:-1;            // as_of DESC — most recent panel first
        return a.i-c.i;                            // stable: preserve declared order on ties
      });
      panels.forEach(function(p){ main.appendChild(p.node); });
    } else {
      main.appendChild(renderQueue(sec.upcoming, sec.coming_soon, !!viewDate));
    }
    document.getElementById("foot").textContent =
      "Auto-generated from the working record. Last refreshed " + (b.generated_et||"") +
      ". Every number on this page is baked in advance — your browser never touches a database.";
    tickElapsed(); tickProv();
    flash();
  }
  function rerender(){ render(viewDate && snapB ? snapB : (lastLive||lastB)); }

  /* ---------- live runtime: poll own JSON, ETag, ago-chip, flash ---------- */
  var URL="./board.json", etag=null,lastMod=null,lastFetch=0,cardHTML={},first=true;
  function updAgo(){
    var s=Math.max(0,Math.round((Date.now()-lastFetch)/1000));
    var t = s<60 ? (s+"s ago") : (Math.floor(s/60)+"m "+(s%60)+"s ago");
    var a=document.getElementById("ago"); if(a) a.innerHTML = lastFetch? ("live · checked <b>"+t+"</b>") : "";
  }
  function flash(){
    var nodes=document.querySelectorAll("#main [data-k]"), nm={};
    for(var i=0;i<nodes.length;i++){ var n=nodes[i]; var k=n.getAttribute("data-k"), h=n.innerHTML; nm[k]=h;
      if(!first && cardHTML[k]!==undefined && cardHTML[k]!==h){ n.classList.remove("flash"); void n.offsetWidth; n.classList.add("flash"); } }
    cardHTML=nm; first=false;
  }
  function poll(){
    var h={}; if(etag)h["If-None-Match"]=etag; if(lastMod)h["If-Modified-Since"]=lastMod;
    fetch(URL,{headers:h,cache:"no-cache"}).then(function(r){
      if(r.status===304) return null;
      etag=r.headers.get("ETag")||etag; lastMod=r.headers.get("Last-Modified")||lastMod; return r.json();
    }).then(function(b){ lastFetch=Date.now(); if(b){ lastLive=b; if(!viewDate){ render(b); } else { healthChips(b); } } updAgo(); }).catch(function(e){
      if(!lastFetch){ document.getElementById("main").innerHTML='<p class="empty">Could not load the board (board.json). '+(e&&e.message?e.message:"")+'</p>'; }
    });
  }
  poll(); setInterval(poll,60000);
  setInterval(function(){ updAgo(); tickChips(); tickProv(); }, 1000);
  setInterval(tickElapsed, 15000);

  /* ---------- queue-edit bar: build, sync across tabs, warn on leave ---------- */
  buildBar(); updateBar();
  window.addEventListener("storage", function(e){ if(e.key===QKEY){ rerender(); updateBar(); } });
  window.addEventListener("beforeunload", function(e){
    if(loadOps().length){ e.preventDefault(); e.returnValue=""; return ""; }
  });
})();
</script>
</body>
