<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — Status Board</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#16181d; --muted:#5b6472; --line:#e5e8ee;
    --accent:#2b6cb0; --shadow:0 1px 3px rgba(20,24,35,.08);
    --live:#1f883d; --verified:#0969da; --inflight:#9a6700; --shelved:#6e7781;
    --null:#6e7781; --promote:#8250df; --blocked:#cf222e; --done:#57606a;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#0d1117; --card:#161b22; --ink:#e6edf3; --muted:#8b949e; --line:#222a35;
      --accent:#58a6ff; --shadow:none; --live:#3fb950; --verified:#58a6ff; --inflight:#d29922;
      --shelved:#8b949e; --null:#8b949e; --promote:#a371f7; --blocked:#f85149; --done:#8b949e; }
  }
  :root{ --flash:rgba(43,108,176,.18); }
  @media (prefers-color-scheme:dark){ :root{ --flash:rgba(88,166,255,.24); } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:13.5px/1.42 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-text-size-adjust:100%}
  header{padding:10px 14px 4px;max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:17px;margin:0}
  .sub{color:var(--muted);font-size:12px;max-width:1080px;margin:0 auto;padding:0 14px}
  .ago{font-size:11px;color:var(--muted);white-space:nowrap}
  .ago b{color:var(--live);font-variant-numeric:tabular-nums}
  nav{display:flex;gap:5px;flex-wrap:wrap;max-width:1080px;margin:6px auto 0;padding:0 14px}
  nav a{font-size:12px;text-decoration:none;color:var(--accent);border:1px solid var(--line);
    background:var(--card);padding:4px 10px;border-radius:999px}
  nav a.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  main{max-width:1080px;margin:0 auto;padding:8px 14px 48px}
  section{margin-top:14px}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
    margin:0 0 7px;font-weight:700}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:7px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 10px;
    box-shadow:var(--shadow)}
  .card.flash{animation:fl 1.1s ease}
  @keyframes fl{0%{background:var(--flash)}100%{background:var(--card)}}
  .card .top{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
  .card .name{font-weight:650;font-size:13px}
  .card .one{color:var(--muted);font-size:12px;margin-top:2px}
  .meta{font-size:10.5px;color:var(--muted);margin-left:auto;white-space:nowrap}
  .chip{font-size:9.5px;font-weight:700;letter-spacing:.03em;padding:1px 6px;border-radius:999px;
    color:#fff;text-transform:uppercase}
  .c-LIVE{background:var(--live)} .c-VERIFIED{background:var(--verified)}
  .c-IN-FLIGHT{background:var(--inflight)} .c-SHELVED{background:var(--shelved)}
  .c-NULL{background:var(--null)} .c-PROMOTE{background:var(--promote)}
  .c-BLOCKED{background:var(--blocked)} .c-DONE{background:var(--done)}
  .decision{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:8px;padding:8px 10px;margin-bottom:6px}
  .decision .q{font-weight:600;font-size:12.5px}
  .decision .reply{display:inline-block;margin-top:4px;font-size:11px;font-family:ui-monospace,monospace;
    background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:2px 7px;color:var(--ink)}
  .btnrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
  .taybtn{font-size:11.5px;font-weight:640;text-decoration:none;color:#fff;background:var(--accent);
    border:1px solid var(--accent);border-radius:6px;padding:3px 11px}
  .taybtn:hover{filter:brightness(1.06)}
  .taybtn.ghost{background:transparent;color:var(--accent)}
  .btnhint{font-size:10px;color:var(--muted);margin-top:4px}
  /* ntfy one-time setup card */
  .setup{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--promote);
    border-radius:8px;padding:9px 11px;margin-bottom:8px}
  .setup .st{font-weight:650;font-size:12.5px}
  .setup .sb{color:var(--muted);font-size:12px;margin-top:2px}
  .setup .topic{display:inline-block;margin-top:6px;font-family:ui-monospace,monospace;font-size:11.5px;
    background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:2px 8px;color:var(--ink)}
  /* upcoming — goal-level next-up cards */
  .upc{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 10px;box-shadow:var(--shadow)}
  .upc .ut{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap}
  .upc .rk{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:700}
  .upc .uh{font-weight:640;font-size:13px}
  .fam{font-size:9.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:1px 6px;
    border-radius:999px;color:#fff}
  .fam-modeling{background:var(--promote)} .fam-data{background:var(--verified)}
  .fam-site{background:var(--live)} .fam-infra{background:var(--done)} .fam-research{background:var(--inflight)}
  .upc .uw{color:var(--muted);font-size:12px;margin-top:2px}
  .qbtn{font-size:12px;text-decoration:none;color:var(--muted);border:1px solid var(--line);
    background:var(--bg);border-radius:6px;padding:1px 8px}
  .qbtn:hover{color:var(--ink)}
  .famgrp{font-size:11px;color:var(--muted);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.04em;font-weight:700}
  details.more>summary{cursor:pointer;font-size:12px;color:var(--accent);margin-top:8px;list-style:none}
  details.more>summary::-webkit-details-marker{display:none}
  .watch li{margin-bottom:3px;color:var(--muted);font-size:12px}
  .scoutlog{list-style:none;padding:0;margin:7px 0 0;font-variant-numeric:tabular-nums}
  .scoutrow{display:flex;gap:8px;align-items:baseline;padding:2px 0;font-size:12px;line-height:1.45}
  .scoutrow .stime{color:var(--accent);font-size:11px;min-width:58px;flex:0 0 auto}
  .scoutrow .stext{color:var(--muted)}
  .pdfs a{display:inline-block;margin:0 6px 6px 0;font-size:12px;text-decoration:none;color:var(--accent);
    border:1px solid var(--line);background:var(--card);padding:4px 9px;border-radius:7px}
  .empty{color:var(--muted);font-size:12.5px;font-style:italic}
  footer{max-width:1080px;margin:0 auto;padding:16px 14px;color:var(--muted);font-size:11px}
  .team{font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:0 5px}
  .meta{display:flex;align-items:center;gap:5px}
  .donelist{list-style:none;padding:0;margin:7px 0 0}
  .donelist li{display:flex;align-items:center;gap:6px;padding:3px 2px;border-bottom:1px solid var(--line);font-size:12px;color:var(--muted)}
  .donelist li .name{color:var(--ink);font-weight:550}
  .donelist li .hw-stamp{margin-left:auto}
  .morelbl{font-size:11px;color:var(--muted);margin:8px 0 2px}
  /* queue reorder — local edits + sticky unsaved-changes bar (batch mode) */
  #qbar{position:fixed;top:0;left:0;right:0;z-index:60;display:none;align-items:center;gap:10px;
    padding:8px 14px;background:var(--card);border-bottom:1px solid var(--line);
    box-shadow:0 2px 8px rgba(20,24,35,.14);flex-wrap:wrap}
  .qbar-msg{font-size:12.5px;font-weight:660;color:var(--blocked);margin-right:auto}
  .qbar-msg.sent{color:var(--live)}
  #qbar button{font:inherit;font-size:11.5px;font-weight:640;border-radius:6px;padding:3px 12px;cursor:pointer}
  .qbar-send{color:#fff;background:var(--accent);border:1px solid var(--accent)}
  .qbar-send:disabled{opacity:.55;cursor:default}
  .qbar-disc{color:var(--accent);background:transparent;border:1px solid var(--line)}
  body.hasbar{padding-top:42px}
  .qbtn{cursor:pointer;font-family:inherit}
  /* optional 4th card layer — collapsed extra context */
  details.cardmore{margin-top:6px}
  details.cardmore>summary{cursor:pointer;font-size:11.5px;color:var(--accent);list-style:none}
  details.cardmore>summary::-webkit-details-marker{display:none}
  .cardmore-body{font-size:12px;color:var(--muted);margin-top:4px}
  .cardmore-list{margin:4px 0 0;padding-left:18px;font-size:12px;color:var(--muted)}
  .cardmore-list li{margin-bottom:2px}
  /* per-section provenance (source + as-of) + STALE flag */
  .sechead{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin:0 0 7px}
  .sechead h2{margin:0}
  .prov{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums}
  .stalebadge{font-size:9px;font-weight:700;letter-spacing:.04em;color:#fff;background:var(--blocked);
    border-radius:999px;padding:1px 6px;text-transform:uppercase}
  /* done-today impact hierarchy (5/4 stand out; minor items grouped) */
  .card.impact-5{border-left:3px solid var(--live)}
  .card.impact-4{border-left:3px solid var(--verified)}
  .card.impact-5 .name,.card.impact-4 .name{font-size:14px;font-weight:750}
  .minorrow{display:flex;gap:8px;flex-wrap:wrap;align-items:baseline;padding:3px 2px;border-bottom:1px solid var(--line)}
  .minorfam{font-size:11px;font-weight:700;color:var(--ink);white-space:nowrap}
  .minoritems{font-size:11px;color:var(--muted)}
  /* upcoming queue: seat / status / pm-authored tags */
  .upc .seat{font-size:9.5px;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:0 5px}
  .upc .qstatus{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;
    padding:1px 6px;border-radius:999px;color:#fff;background:var(--done)}
  .upc .qstatus.qs-ready-now{background:var(--live)} .upc .qstatus.qs-ready{background:var(--verified)}
  /* AWAITING_ANTHONY shelf: parked (amber, waiting on you) + answered (green, executing) */
  .upc .qstatus.qs-parked{background:var(--inflight);text-transform:none;letter-spacing:0}
  .upc .qstatus.qs-answered{background:var(--live);text-transform:none;letter-spacing:0}
  .upc.parked{border-left:3px solid var(--inflight)}
  .upc .pmflag{font-size:9px;font-weight:700;color:#fff;background:var(--promote);border-radius:999px;padding:1px 6px}
</style>
</head>
<body>
<header>
  <h1>The Hardwood — Status Board</h1>
  <span class="ago" id="ago"></span>
</header>
<div class="sub" id="sub">Loading…</div>
<nav>
  <a class="active" href="./index.html">Board</a>
  <a href="./games.html">Games</a>
  <a href="./teams.html">Teams</a>
  <a href="./players.html">Players</a>
  <a href="./review.html">Daily Review</a>
  <a href="./accuracy.html">Our Accuracy</a>
  <a href="./ledger.html">Error Map</a>
</nav>
<main id="main"><p class="empty">Loading the board…</p></main>
<footer id="foot"></footer>
<script src="./hardwood.js"></script>
<script>
(function(){
  "use strict";
  function el(tag, cls, txt){ var e=document.createElement(tag); if(cls)e.className=cls;
    if(txt!=null)e.textContent=txt; return e; }
  function chip(status){ var c=el("span","chip c-"+status, status); return c; }
  var SRC={};   // board.section_sources — per-section provenance (source + as_of + stale)
  function clock(iso){ var m=/T(\d{2}):(\d{2})/.exec(iso||""); return m ? (m[1]+":"+m[2]) : ""; }
  function sectionHead(title, key){
    // section heading + its provenance line (which record it was baked from + as-of), and a
    // visible STALE flag when the source is newer than the bake (directive: staleness per section).
    var wrap=el("div","sechead"); wrap.appendChild(el("h2",null,title));
    var m=SRC && SRC[key];
    if(m){
      if(m.stale){ wrap.appendChild(el("span","stalebadge","stale")); }
      var t="from "+(m.source||"the record");
      if(m.as_of){ t+=" · as of "+clock(m.as_of); }
      wrap.appendChild(el("span","prov", t));
    }
    return wrap;
  }
  function moreToggle(more){
    // optional 4th card layer: a "more ▾" toggle, collapsed by default, holding extra
    // context or steps. Renders only when the card carries a `more` field (string or list),
    // so nothing above the fold ever gets longer.
    if(more==null || (Array.isArray(more) && !more.length) || (typeof more==="string" && !more.trim())) return null;
    var det=el("details","cardmore");
    det.appendChild(el("summary",null,"more ▾"));
    if(Array.isArray(more)){
      var ul=el("ul","cardmore-list");
      more.forEach(function(step){ ul.appendChild(el("li",null,String(step))); });
      det.appendChild(ul);
    } else {
      det.appendChild(el("div","cardmore-body", String(more)));
    }
    return det;
  }

  /* ---------- queue reorder: local page state + batch send (no network per change) ---------- */
  var QKEY="hw_queue_ops_v1";
  var QVERB={top:"Move this to the very top of the queue", bump:"Move this to the front of the queue",
             demote:"Push this one spot lower", shelve:"Set this one aside for now"};
  function loadOps(){ try{ var v=JSON.parse(localStorage.getItem(QKEY)); return Array.isArray(v)?v:[]; }
    catch(e){ return []; } }
  function saveOps(ops){ try{ localStorage.setItem(QKEY, JSON.stringify(ops)); }catch(e){} }
  function applyOps(base, ops){
    // replay the pending edits on top of the fresh server list, so local reorders survive a poll
    var order=base.slice();
    (ops||[]).forEach(function(op){
      var i=-1;
      for(var k=0;k<order.length;k++){ if((order[k].task_id||order[k].header)===op.id){ i=k; break; } }
      if(i<0) return;
      var c=order.splice(i,1)[0];
      // "top" (⤒ move-to-top) and "bump" both land the item at #1 locally; the emitted
      // QUEUE: line keeps them distinct so the scout applies each atomically. The
      // AWAITING_ANTHONY answer→top conversion reuses the SAME "top" op (one code path).
      if(op.action==="top"||op.action==="bump"){ order.unshift(c); }
      else if(op.action==="demote"){ order.splice(Math.min(i+1,order.length),0,c); }
      // shelve: leave removed
    });
    return order;
  }
  function addOp(id, action){ var ops=loadOps(); ops.push({id:id, action:action}); saveOps(ops);
    if(lastB) render(lastB); updateBar(); }
  function discardOps(){ saveOps([]); if(lastB) render(lastB); updateBar(); }
  function sendAll(){
    var ops=loadOps(); if(!ops.length) return;
    var n=ops.length;
    var title="QUEUE: batch reorder ("+n+" change"+(n>1?"s":"")+")";
    var lines=ops.map(function(o){ return "QUEUE: "+o.id+": "+o.action; });
    var body=lines.join("\n")+"\n\n— batch queue changes from The Hardwood board";
    var url="https://github.com/AnthonyTurgelis/hardwood-site/issues/new"
      +"?title="+encodeURIComponent(title)+"&body="+encodeURIComponent(body)+"&labels=queue";
    window.open(url,"_blank","noopener");
    saveOps([]); if(lastB) render(lastB); updateBar(true);   // handed off to GitHub — clear local edits
  }
  function buildBar(){
    var bar=el("div"); bar.id="qbar";
    var msg=el("span","qbar-msg"); msg.id="qbar-msg";
    var send=el("button","qbar-send","Send all to GitHub"); send.type="button"; send.onclick=sendAll;
    var disc=el("button","qbar-disc","Discard"); disc.type="button"; disc.onclick=discardOps;
    bar.appendChild(msg); bar.appendChild(send); bar.appendChild(disc);
    document.body.appendChild(bar);
  }
  function updateBar(sent){
    var bar=document.getElementById("qbar"); if(!bar) return;
    var msg=document.getElementById("qbar-msg");
    var send=bar.querySelector(".qbar-send"), disc=bar.querySelector(".qbar-disc");
    var n=loadOps().length;
    if(n>0){
      msg.className="qbar-msg";
      msg.textContent="● Unsaved changes — "+n+" queue change"+(n>1?"s":"")+" not sent yet";
      send.disabled=false; disc.style.display="";
      bar.style.display="flex"; document.body.classList.add("hasbar");
    } else if(sent){
      msg.className="qbar-msg sent";
      msg.textContent="Sent. The queue updates within a minute.";
      send.disabled=true; disc.style.display="none";
      bar.style.display="flex"; document.body.classList.add("hasbar");
      setTimeout(function(){ if(!loadOps().length){ bar.style.display="none"; document.body.classList.remove("hasbar"); } }, 4000);
    } else {
      bar.style.display="none"; document.body.classList.remove("hasbar");
    }
  }

  function setupCard(su){
    // one-time setup card (ntfy #224500 or Discord #014500). No secret is ever baked — the
    // ntfy topic / Discord webhook live only in local gitignored files; the card shows HOW.
    var c=el("div","setup"); c.setAttribute("data-k","setup|"+(su.kind||"ntfy"));
    c.appendChild(el("div","st", su.header||"Setup"));
    if(su.body){ c.appendChild(el("div","sb", su.body)); }
    if(su.topic){  // legacy: only ever set on a private/local render, never the public board
      var t=el("span","topic", su.topic); c.appendChild(t);
      var row=el("div","btnrow");
      var a=el("a","taybtn","Open in ntfy →"); a.href=su.url||("https://ntfy.sh/"+su.topic);
      a.target="_blank"; a.rel="noopener"; row.appendChild(a);
      c.appendChild(row);
    }
    var m=moreToggle(su.more); if(m) c.appendChild(m);
    return c;
  }
  function ansButtons(it){
    // each option becomes a tap that opens a pre-filled GitHub issue (the tap IS the reply);
    // [Other…] opens a fill-in template. Three-tap UX.
    if(!it.answers || !it.answers.length) return null;
    var row=el("div","btnrow");
    it.answers.forEach(function(a){
      var b=el("a", "taybtn"+(a.kind==="other"?" ghost":""), a.label); b.href=a.url;
      b.target="_blank"; b.rel="noopener"; row.appendChild(b);
    });
    return row;
  }
  function answerAllCard(aa){
    // batch card: one pre-filled issue lists every open item inline
    if(!aa || !aa.url) return null;
    var d=el("div","decision"); d.setAttribute("data-k","dec|all");
    d.style.borderLeftColor="var(--promote)";
    d.appendChild(el("div","q", "Answer everything in one go"));
    d.appendChild(el("div","one","One screen lists every open decision with its options — fill the blanks, hit submit once."));
    var row=el("div","btnrow");
    var b=el("a","taybtn", aa.label||"Answer all"); b.href=aa.url; b.target="_blank"; b.rel="noopener";
    row.appendChild(b); d.appendChild(row);
    return d;
  }
  function renderDecisions(items, setup, answerAll){
    var s=el("section"); s.appendChild(sectionHead("Needs Anthony — the decision inbox","needs_anthony"));
    // setup is a LIST of one-time cards (ntfy + Discord); no secret is baked (public board).
    (setup||[]).forEach(function(su){ s.appendChild(setupCard(su)); });
    if(!items || !items.length){
      var e=el("div","decision"); e.style.borderLeftColor="var(--live)";
      e.appendChild(el("div","q","Nothing needs you right now."));
      e.appendChild(el("div","one","The board is caught up — no decisions are waiting on you."));
      s.appendChild(e); return s;
    }
    var aac=answerAllCard(answerAll); if(aac){ s.appendChild(aac); }  // batch card first when >=2 open
    items.forEach(function(it){
      var d=el("div","decision"); d.setAttribute("data-k","dec|"+it.n);
      d.appendChild(el("div","q", it.n + ". " + it.text));
      var ab=ansButtons(it);
      if(ab){ d.appendChild(ab); d.appendChild(el("div","btnhint","Tap Yes/No to send a ready-made reply, or Other… to type one line. Opens a pre-filled note on GitHub; hit submit.")); }
      else if(it.reply){ d.appendChild(el("div","reply","reply: " + it.reply)); }
      var dm=moreToggle(it.more); if(dm) d.appendChild(dm);
      s.appendChild(d);
    });
    return s;
  }
  function upcCard(c){
    var card=el("div","upc"+(c.parked?" parked":"")); card.setAttribute("data-k","upc|"+(c.task_id||c.header));
    var ut=el("div","ut");
    if(c.rank!=null){ ut.appendChild(el("span","rk","#"+c.rank)); }
    ut.appendChild(el("span","uh", c.name||c.header||""));
    if(c.family){ ut.appendChild(el("span","fam fam-"+c.family, c.family)); }
    if(c.seat){ ut.appendChild(el("span","seat", c.seat)); }
    // AWAITING_ANTHONY shelf chips: parked items show "waiting on you · N days"; a freshly
    // answered item briefly shows "answered — now executing" before it jumps to the top.
    if(c.parked){
      var dt=(c.days_waiting!=null)?(" · "+c.days_waiting+" day"+(c.days_waiting===1?"":"s")):"";
      ut.appendChild(el("span","qstatus qs-parked", "waiting on you"+dt));
    } else if(c.answered){
      ut.appendChild(el("span","qstatus qs-answered", "answered — now executing"));
    } else if(c.status){
      ut.appendChild(el("span","qstatus qs-"+String(c.status).replace(/\s+/g,"-"), c.status));
    }
    if(c.pm_authored){ ut.appendChild(el("span","pmflag","PM")); }
    card.appendChild(ut);
    if(c.why){ card.appendChild(el("div","uw","A win: "+c.why)); }
    if(c.actions && c.actions.length){
      // reorder applies LOCALLY in the page — instant, no network per change; the sticky bar
      // gathers every edit into ONE send. (Per-change instant/network mode removed.)
      var row=el("div","btnrow");
      var tid=c.task_id||c.header;
      c.actions.forEach(function(a){
        var b=el("button","qbtn", a.icon); b.type="button";
        b.title=QVERB[a.verb]||a.verb;
        b.onclick=(function(verb){ return function(){ addOp(tid, verb); }; })(a.verb);
        row.appendChild(b);
      });
      card.appendChild(row);
    }
    var um=moreToggle(c.more); if(um) card.appendChild(um);
    return card;
  }
  function comingCard(c){
    var card=el("div","upc"); card.setAttribute("data-k","soon|"+(c.header||""));
    card.style.borderLeftColor="var(--muted)";
    var ut=el("div","ut");
    ut.appendChild(el("span","uh", c.header||""));
    ut.appendChild(el("span","fam", c.state||"coming soon"));
    card.appendChild(ut);
    if(c.why){ card.appendChild(el("div","uw","A win: "+c.why)); }
    if(c.note){ card.appendChild(el("div","one", c.note)); }
    return card;
  }
  function flattenUpcoming(up){
    // one global ordered list = top cards + the by-family "more" pool, sorted by server rank,
    // so a local reorder can move an item across the top/more boundary
    var base=[];
    ((up&&up.items)||[]).forEach(function(c){ base.push(c); });
    var more=(up&&up.more_by_family)||{};
    Object.keys(more).forEach(function(f){ (more[f]||[]).forEach(function(c){ base.push(c); }); });
    base.sort(function(a,b){ return (a.rank||999)-(b.rank||999); });
    return base;
  }
  function renderUpcoming(up, comingSoon){
    var s=el("section"); s.appendChild(sectionHead("Upcoming — what's next","upcoming"));
    var base=flattenUpcoming(up);
    var hasSoon=comingSoon && comingSoon.length;
    if(!base.length && !hasSoon){
      s.appendChild(el("p","empty","The queue is clear.")); return s; }
    if(up && up.note){ s.appendChild(el("p","one", up.note)); }
    // replay pending local edits (bump / demote / shelve) on top of the fresh server order
    var order=applyOps(base, loadOps());
    var top=order.slice(0,10), rest=order.slice(10);
    var g=el("div","grid");
    top.forEach(function(c){ g.appendChild(upcCard(c)); });
    // future-state goal cards — roadmap, not the live queue
    (comingSoon||[]).forEach(function(c){ g.appendChild(comingCard(c)); });
    s.appendChild(g);
    if(rest.length){
      var byFam={};
      rest.forEach(function(c){ (byFam[c.family]=byFam[c.family]||[]).push(c); });
      var fams=Object.keys(byFam);
      var det=el("details","more");
      det.appendChild(el("summary", null, "▸ show all "+rest.length+" more queued"));
      fams.sort().forEach(function(f){
        det.appendChild(el("div","famgrp", f));
        var gg=el("div","grid");
        byFam[f].forEach(function(c){ gg.appendChild(upcCard(c)); });
        det.appendChild(gg);
      });
      s.appendChild(det);
    }
    return s;
  }
  function stampSpan(c){
    // per-card timestamp "17:42 · 8m ago" (hardwood.js ticks .hw-stamp[data-utc]); fixed in meta
    var st=el("span","hw-stamp");
    if(c.at_iso){ st.setAttribute("data-utc", c.at_iso); }
    st.setAttribute("data-fallback", c.time||"");
    st.textContent = c.time||"";
    return st;
  }
  function laneCard(title, c, impact){
    var card=el("div","card"); card.setAttribute("data-k", title+"|"+c.name+"|"+(c.time||""));
    if(impact){ card.classList.add("impact-"+(impact>=5?5:impact>=4?4:3)); }
    var top=el("div","top");
    top.appendChild(el("span","name", c.name));
    top.appendChild(chip(c.chip));
    var meta=el("span","meta");
    if(c.team){ meta.appendChild(el("span","team",c.team)); }
    if(c.kind){ meta.appendChild(el("span","team",c.kind)); }
    meta.appendChild(stampSpan(c));
    top.appendChild(meta);
    card.appendChild(top);
    if(c.one_liner){ card.appendChild(el("div","one", c.one_liner)); }
    var lm=moreToggle(c.more); if(lm) card.appendChild(lm);
    return card;
  }
  function renderCards(title, cards, plainLines, srcKey){
    var s=el("section"); s.appendChild(srcKey ? sectionHead(title, srcKey) : el("h2",null,title));
    var g=el("div","grid"); var any=false;
    (cards||[]).forEach(function(c){ any=true; g.appendChild(laneCard(title,c)); });
    if(!any && plainLines && plainLines.length){
      plainLines.forEach(function(t,i){
        var card=el("div","card"); card.setAttribute("data-k",title+"|plain|"+i);
        card.appendChild(el("div","one", t)); g.appendChild(card); any=true;
      });
    }
    if(!any){ s.appendChild(el("p","empty","Nothing here right now.")); return s; }
    s.appendChild(g); return s;
  }
  function renderDone(cards){
    // IMPACT HIERARCHY: 5s/4s = full bold cards with their
    // one-line why; 3s = normal cards; 2s/1s = small, GROUPED by team into one row per family,
    // tucked behind a "show N minor items" toggle so the default view stays glanceable.
    var s=el("section"); s.appendChild(sectionHead("Done Today","done_today"));
    if(!cards || !cards.length){ s.appendChild(el("p","empty","Nothing finished yet today.")); return s; }
    var major=[], normal=[], minor=[];
    cards.forEach(function(c){ var im=c.impact||2;
      if(im>=4){ major.push(c); } else if(im===3){ normal.push(c); } else { minor.push(c); } });
    // sort visible by impact desc then time (server order is time-desc already)
    major.sort(function(a,b){ return (b.impact||0)-(a.impact||0); });
    var vis=major.concat(normal);
    var g=el("div","grid");
    vis.forEach(function(c){ g.appendChild(laneCard("Done Today", c, c.impact)); });
    s.appendChild(g);
    if(minor.length){
      var det=el("details","more");
      det.appendChild(el("summary", null, "▸ show "+minor.length+" minor item"+(minor.length>1?"s":"")+" (fixes, verifications, housekeeping)"));
      var byFam={};
      minor.forEach(function(c){ var f=c.team||"Other"; (byFam[f]=byFam[f]||[]).push(c); });
      Object.keys(byFam).sort().forEach(function(f){
        var arr=byFam[f];
        var row=el("div","minorrow"); row.setAttribute("data-k","doneminor|"+f);
        row.appendChild(el("span","minorfam", f+": "+arr.length+" item"+(arr.length>1?"s":"")));
        row.appendChild(el("span","minoritems", arr.map(function(c){ return c.name; }).join(" · ")));
        det.appendChild(row);
      });
      s.appendChild(det);
    }
    return s;
  }
  function renderScoutActivity(items){
    // THE SCOUT ACTIVITY strip — a wall-clock ticker of the always-on monitor's last actions so a
    // stalled restart is visible, never inferred from a dead terminal. Compact, telemetry-styled;
    // hidden when the log has no readable actions.
    if(!items || !items.length) return null;
    var s=el("section"); s.appendChild(sectionHead("Scout Activity","scout_activity"));
    var ul=el("ul","scoutlog");
    items.slice().reverse().forEach(function(a){   // newest first
      var li=el("li","scoutrow");
      li.appendChild(el("span","stime", a.time||""));
      li.appendChild(el("span","stext", a.text||""));
      if(a.detail){                                 // raw internal log behind a 'details' toggle
        var d=el("details","sdetail");
        d.appendChild(el("summary",null,"details"));
        d.appendChild(el("span","sraw", a.detail));
        li.appendChild(d);
      }
      ul.appendChild(li);
    });
    s.appendChild(ul); return s;
  }
  function renderWatch(lines){
    var s=el("section"); s.appendChild(sectionHead("Watch List","watch_list"));
    if(!lines || !lines.length){ s.appendChild(el("p","empty","Clear.")); return s; }
    var ul=el("ul","watch");
    lines.forEach(function(t){ ul.appendChild(el("li",null,t)); });
    s.appendChild(ul); return s;
  }
  function renderPdfs(pdfs){
    if(!pdfs || !pdfs.length) return null;
    var s=el("section"); s.appendChild(el("h2",null,"Gameday Reports — " + (pdfs[0].date||"")));
    var wrap=el("div","pdfs");
    pdfs.forEach(function(p){ var a=el("a",null,p.label); a.href=p.href; a.target="_blank";
      a.rel="noopener"; wrap.appendChild(a); });
    s.appendChild(wrap); return s;
  }

  var lastB=null;
  function render(b){
    lastB=b;
    SRC=b.section_sources||{};
    var sec=b.sections||{};
    document.getElementById("sub").textContent =
      (b.date||"") + " · " + (b.counts? (b.counts.running+" running · "+b.counts.done_today+
      " done today · "+b.counts.needs_anthony+" awaiting you") : "");
    var main=document.getElementById("main"); main.innerHTML="";
    main.appendChild(renderDecisions(sec.needs_anthony, b.setup, b.answer_all));
    // Running-Now shows ALL live lanes: the coordinator's authoritative
    // running_live list wins when present; else the delta-derived IN-FLIGHT cards.
    var live=(sec.running_live && sec.running_live.length)? sec.running_live : sec.running_now;
    main.appendChild(renderCards("Running Now", live, sec.running_plain, "running_now"));
    var pdfs=renderPdfs(b.pdfs); if(pdfs) main.appendChild(pdfs);
    main.appendChild(renderDone(sec.done_today));
    main.appendChild(renderUpcoming(sec.upcoming, sec.coming_soon));
    var sa=renderScoutActivity(b.scout_activity); if(sa) main.appendChild(sa);
    main.appendChild(renderWatch(sec.watch_list));
    document.getElementById("foot").textContent =
      "Auto-generated from the working record. Last refreshed " + (b.generated_et||b.generated_utc||"") +
      ". Every number a stranger sees is baked here — no live database is ever contacted from your browser.";
    flash();
  }

  /* ---------- shared live runtime (poll own JSON, ETag, ago-chip, flash) ---------- */
  var URL="./board.json", etag=null,lastMod=null,lastFetch=0,cardHTML={},first=true;
  function updAgo(){
    var s=Math.max(0,Math.round((Date.now()-lastFetch)/1000));
    var t = s<60 ? (s+"s ago") : (Math.floor(s/60)+"m "+(s%60)+"s ago");
    var a=document.getElementById("ago"); if(a) a.innerHTML = lastFetch? ("live · updated <b>"+t+"</b>") : "";
  }
  function flash(){
    var nodes=document.querySelectorAll("#main [data-k]"), nm={};
    nodes.forEach(function(n){ var k=n.getAttribute("data-k"), h=n.innerHTML; nm[k]=h;
      if(!first && cardHTML[k]!==undefined && cardHTML[k]!==h){ n.classList.remove("flash"); void n.offsetWidth; n.classList.add("flash"); } });
    cardHTML=nm; first=false;
  }
  function poll(){
    var h={}; if(etag)h["If-None-Match"]=etag; if(lastMod)h["If-Modified-Since"]=lastMod;
    fetch(URL,{headers:h,cache:"no-cache"}).then(function(r){
      if(r.status===304) return null;
      etag=r.headers.get("ETag")||etag; lastMod=r.headers.get("Last-Modified")||lastMod; return r.json();
    }).then(function(b){ lastFetch=Date.now(); if(b){ render(b); } updAgo(); }).catch(function(e){
      if(!lastFetch){ document.getElementById("main").innerHTML='<p class="empty">Could not load the board (board.json). '+(e&&e.message?e.message:"")+'</p>'; }
    });
  }
  poll(); setInterval(poll,60000); setInterval(updAgo,1000);

  /* ---------- queue-edit bar: build, sync across tabs, warn on leave ---------- */
  buildBar(); updateBar();
  // another tab may add/clear edits — mirror its state here (persists across tabs)
  window.addEventListener("storage", function(e){ if(e.key===QKEY){ if(lastB) render(lastB); updateBar(); } });
  // block an accidental page-leave while edits are still un-sent
  window.addEventListener("beforeunload", function(e){
    if(loadOps().length){ e.preventDefault(); e.returnValue=""; return ""; }
  });
})();
</script>
</body>
