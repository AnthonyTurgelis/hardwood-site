<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — Status Board</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#16181d; --muted:#5b6472; --line:#e5e8ee;
    --accent:#2b6cb0; --shadow:0 1px 3px rgba(20,24,35,.08);
    --live:#1f883d; --verified:#0969da; --inflight:#9a6700; --shelved:#6e7781;
    --null:#6e7781; --promote:#8250df; --blocked:#cf222e; --done:#57606a;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#0d1117; --card:#161b22; --ink:#e6edf3; --muted:#8b949e; --line:#222a35;
      --accent:#58a6ff; --shadow:none; --live:#3fb950; --verified:#58a6ff; --inflight:#d29922;
      --shelved:#8b949e; --null:#8b949e; --promote:#a371f7; --blocked:#f85149; --done:#8b949e; }
  }
  :root{ --flash:rgba(43,108,176,.18); }
  @media (prefers-color-scheme:dark){ :root{ --flash:rgba(88,166,255,.24); } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:13.5px/1.42 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-text-size-adjust:100%}
  header{padding:10px 14px 4px;max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:17px;margin:0}
  .sub{color:var(--muted);font-size:12px;max-width:1080px;margin:0 auto;padding:0 14px}
  .ago{font-size:11px;color:var(--muted);white-space:nowrap}
  .ago b{color:var(--live);font-variant-numeric:tabular-nums}
  nav{display:flex;gap:5px;flex-wrap:wrap;max-width:1080px;margin:6px auto 0;padding:0 14px}
  nav a{font-size:12px;text-decoration:none;color:var(--accent);border:1px solid var(--line);
    background:var(--card);padding:4px 10px;border-radius:999px}
  nav a.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  main{max-width:1080px;margin:0 auto;padding:8px 14px 48px}
  section{margin-top:14px}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
    margin:0 0 7px;font-weight:700}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:7px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 10px;
    box-shadow:var(--shadow)}
  .card.flash{animation:fl 1.1s ease}
  @keyframes fl{0%{background:var(--flash)}100%{background:var(--card)}}
  .card .top{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
  .card .name{font-weight:650;font-size:13px}
  .card .one{color:var(--muted);font-size:12px;margin-top:2px}
  .meta{font-size:10.5px;color:var(--muted);margin-left:auto;white-space:nowrap}
  .chip{font-size:9.5px;font-weight:700;letter-spacing:.03em;padding:1px 6px;border-radius:999px;
    color:#fff;text-transform:uppercase}
  .c-LIVE{background:var(--live)} .c-VERIFIED{background:var(--verified)}
  .c-IN-FLIGHT{background:var(--inflight)} .c-SHELVED{background:var(--shelved)}
  .c-NULL{background:var(--null)} .c-PROMOTE{background:var(--promote)}
  .c-BLOCKED{background:var(--blocked)} .c-DONE{background:var(--done)}
  .decision{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:8px;padding:8px 10px;margin-bottom:6px}
  .decision .q{font-weight:600;font-size:12.5px}
  .decision .reply{display:inline-block;margin-top:4px;font-size:11px;font-family:ui-monospace,monospace;
    background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:2px 7px;color:var(--ink)}
  .btnrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
  .taybtn{font-size:11.5px;font-weight:640;text-decoration:none;color:#fff;background:var(--accent);
    border:1px solid var(--accent);border-radius:6px;padding:3px 11px}
  .taybtn:hover{filter:brightness(1.06)}
  .taybtn.ghost{background:transparent;color:var(--accent)}
  .btnhint{font-size:10px;color:var(--muted);margin-top:4px}
  /* ntfy one-time setup card */
  .setup{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--promote);
    border-radius:8px;padding:9px 11px;margin-bottom:8px}
  .setup .st{font-weight:650;font-size:12.5px}
  .setup .sb{color:var(--muted);font-size:12px;margin-top:2px}
  .setup .topic{display:inline-block;margin-top:6px;font-family:ui-monospace,monospace;font-size:11.5px;
    background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:2px 8px;color:var(--ink)}
  /* upcoming — goal-level next-up cards */
  .upc{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 10px;box-shadow:var(--shadow)}
  .upc .ut{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap}
  .upc .rk{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:700}
  .upc .uh{font-weight:640;font-size:13px}
  .fam{font-size:9.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:1px 6px;
    border-radius:999px;color:#fff}
  .fam-modeling{background:var(--promote)} .fam-data{background:var(--verified)}
  .fam-site{background:var(--live)} .fam-infra{background:var(--done)} .fam-research{background:var(--inflight)}
  .upc .uw{color:var(--muted);font-size:12px;margin-top:2px}
  .qbtn{font-size:12px;text-decoration:none;color:var(--muted);border:1px solid var(--line);
    background:var(--bg);border-radius:6px;padding:1px 8px}
  .qbtn:hover{color:var(--ink)}
  .famgrp{font-size:11px;color:var(--muted);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.04em;font-weight:700}
  details.more>summary{cursor:pointer;font-size:12px;color:var(--accent);margin-top:8px;list-style:none}
  details.more>summary::-webkit-details-marker{display:none}
  .watch li{margin-bottom:3px;color:var(--muted);font-size:12px}
  .pdfs a{display:inline-block;margin:0 6px 6px 0;font-size:12px;text-decoration:none;color:var(--accent);
    border:1px solid var(--line);background:var(--card);padding:4px 9px;border-radius:7px}
  .empty{color:var(--muted);font-size:12.5px;font-style:italic}
  footer{max-width:1080px;margin:0 auto;padding:16px 14px;color:var(--muted);font-size:11px}
  .team{font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:0 5px}
  .meta{display:flex;align-items:center;gap:5px}
  .donelist{list-style:none;padding:0;margin:7px 0 0}
  .donelist li{display:flex;align-items:center;gap:6px;padding:3px 2px;border-bottom:1px solid var(--line);font-size:12px;color:var(--muted)}
  .donelist li .name{color:var(--ink);font-weight:550}
  .donelist li .hw-stamp{margin-left:auto}
  .morelbl{font-size:11px;color:var(--muted);margin:8px 0 2px}
</style>
</head>
<body>
<header>
  <h1>The Hardwood — Status Board</h1>
  <span class="ago" id="ago"></span>
</header>
<div class="sub" id="sub">Loading…</div>
<nav>
  <a class="active" href="./index.html">Board</a>
  <a href="./games.html">Games</a>
  <a href="./teams.html">Teams</a>
  <a href="./players.html">Players</a>
  <a href="./review.html">Daily Review</a>
  <a href="./accuracy.html">Our Accuracy</a>
  <a href="./ledger.html">Error Map</a>
</nav>
<main id="main"><p class="empty">Loading the board…</p></main>
<footer id="foot"></footer>
<script src="./hardwood.js"></script>
<script>
(function(){
  "use strict";
  function el(tag, cls, txt){ var e=document.createElement(tag); if(cls)e.className=cls;
    if(txt!=null)e.textContent=txt; return e; }
  function chip(status){ var c=el("span","chip c-"+status, status); return c; }

  function setupCard(su){
    // one-time setup card (ntfy #224500 or Discord #014500). No secret is ever baked — the
    // ntfy topic / Discord webhook live only in local gitignored files; the card shows HOW.
    var c=el("div","setup"); c.setAttribute("data-k","setup|"+(su.kind||"ntfy"));
    c.appendChild(el("div","st", su.header||"Setup"));
    if(su.body){ c.appendChild(el("div","sb", su.body)); }
    if(su.topic){  // legacy: only ever set on a private/local render, never the public board
      var t=el("span","topic", su.topic); c.appendChild(t);
      var row=el("div","btnrow");
      var a=el("a","taybtn","Open in ntfy →"); a.href=su.url||("https://ntfy.sh/"+su.topic);
      a.target="_blank"; a.rel="noopener"; row.appendChild(a);
      c.appendChild(row);
    }
    return c;
  }
  function ansButtons(it){
    // each option becomes a tap that opens a pre-filled GitHub issue (the tap IS the reply);
    // [Other…] opens a fill-in template. Three-tap UX.
    if(!it.answers || !it.answers.length) return null;
    var row=el("div","btnrow");
    it.answers.forEach(function(a){
      var b=el("a", "taybtn"+(a.kind==="other"?" ghost":""), a.label); b.href=a.url;
      b.target="_blank"; b.rel="noopener"; row.appendChild(b);
    });
    return row;
  }
  function answerAllCard(aa){
    // batch card: one pre-filled issue lists every open item inline
    if(!aa || !aa.url) return null;
    var d=el("div","decision"); d.setAttribute("data-k","dec|all");
    d.style.borderLeftColor="var(--promote)";
    d.appendChild(el("div","q", "Answer everything in one go"));
    d.appendChild(el("div","one","One screen lists every open decision with its options — fill the blanks, hit submit once."));
    var row=el("div","btnrow");
    var b=el("a","taybtn", aa.label||"Answer all"); b.href=aa.url; b.target="_blank"; b.rel="noopener";
    row.appendChild(b); d.appendChild(row);
    return d;
  }
  function renderDecisions(items, setup, answerAll){
    var s=el("section"); s.appendChild(el("h2",null,"Needs Anthony — the decision inbox"));
    // setup is a LIST of one-time cards (ntfy + Discord); no secret is baked (public board).
    (setup||[]).forEach(function(su){ s.appendChild(setupCard(su)); });
    if(!items || !items.length){
      var e=el("div","decision"); e.style.borderLeftColor="var(--live)";
      e.appendChild(el("div","q","Nothing needs you right now."));
      e.appendChild(el("div","one","The board is caught up — no decisions are waiting on you."));
      s.appendChild(e); return s;
    }
    var aac=answerAllCard(answerAll); if(aac){ s.appendChild(aac); }  // batch card first when >=2 open
    items.forEach(function(it){
      var d=el("div","decision"); d.setAttribute("data-k","dec|"+it.n);
      d.appendChild(el("div","q", it.n + ". " + it.text));
      var ab=ansButtons(it);
      if(ab){ d.appendChild(ab); d.appendChild(el("div","btnhint","Tap Yes/No to send a ready-made reply, or Other… to type one line. Opens a pre-filled note on GitHub; hit submit.")); }
      else if(it.reply){ d.appendChild(el("div","reply","reply: " + it.reply)); }
      s.appendChild(d);
    });
    return s;
  }
  function upcCard(c){
    var card=el("div","upc"); card.setAttribute("data-k","upc|"+(c.task_id||c.header));
    var ut=el("div","ut");
    if(c.rank!=null){ ut.appendChild(el("span","rk","#"+c.rank)); }
    ut.appendChild(el("span","uh", c.header||""));
    if(c.family){ ut.appendChild(el("span","fam fam-"+c.family, c.family)); }
    card.appendChild(ut);
    if(c.why){ card.appendChild(el("div","uw","A win: "+c.why)); }
    if(c.actions && c.actions.length){
      var row=el("div","btnrow");
      c.actions.forEach(function(a){ var b=el("a","qbtn", a.icon); b.title="Tap to "+a.verb+" this on the queue";
        b.href=a.url; b.target="_blank"; b.rel="noopener"; row.appendChild(b); });
      card.appendChild(row);
    }
    return card;
  }
  function comingCard(c){
    var card=el("div","upc"); card.setAttribute("data-k","soon|"+(c.header||""));
    card.style.borderLeftColor="var(--muted)";
    var ut=el("div","ut");
    ut.appendChild(el("span","uh", c.header||""));
    ut.appendChild(el("span","fam", c.state||"coming soon"));
    card.appendChild(ut);
    if(c.why){ card.appendChild(el("div","uw","A win: "+c.why)); }
    if(c.note){ card.appendChild(el("div","one", c.note)); }
    return card;
  }
  function renderUpcoming(up, comingSoon){
    var s=el("section"); s.appendChild(el("h2",null,"Upcoming — what's next"));
    if((!up || !up.available) && (!comingSoon || !comingSoon.length)){
      s.appendChild(el("p","empty","The queue is clear.")); return s; }
    if(up && up.note){ s.appendChild(el("p","one", up.note)); }
    var g=el("div","grid");
    ((up&&up.items)||[]).forEach(function(c){ g.appendChild(upcCard(c)); });
    // future-state goal cards — roadmap, not the live queue
    (comingSoon||[]).forEach(function(c){ g.appendChild(comingCard(c)); });
    s.appendChild(g);
    var more=up.more_by_family||{}; var fams=Object.keys(more);
    if(fams.length){
      var det=el("details","more");
      var sum=el("summary", null, "▸ show all "+(up.more_count||0)+" more queued");
      det.appendChild(sum);
      fams.sort().forEach(function(f){
        det.appendChild(el("div","famgrp", f));
        var gg=el("div","grid");
        more[f].forEach(function(c){ gg.appendChild(upcCard(c)); });
        det.appendChild(gg);
      });
      s.appendChild(det);
    }
    return s;
  }
  function stampSpan(c){
    // per-card timestamp "17:42 · 8m ago" (hardwood.js ticks .hw-stamp[data-utc]); fixed in meta
    var st=el("span","hw-stamp");
    if(c.at_iso){ st.setAttribute("data-utc", c.at_iso); }
    st.setAttribute("data-fallback", c.time||"");
    st.textContent = c.time||"";
    return st;
  }
  function laneCard(title, c){
    var card=el("div","card"); card.setAttribute("data-k", title+"|"+c.name+"|"+(c.time||""));
    var top=el("div","top");
    top.appendChild(el("span","name", c.name));
    top.appendChild(chip(c.chip));
    var meta=el("span","meta");
    if(c.team){ meta.appendChild(el("span","team",c.team)); }
    if(c.kind){ meta.appendChild(el("span","team",c.kind)); }
    meta.appendChild(stampSpan(c));
    top.appendChild(meta);
    card.appendChild(top);
    if(c.one_liner){ card.appendChild(el("div","one", c.one_liner)); }
    return card;
  }
  function renderCards(title, cards, plainLines){
    var s=el("section"); s.appendChild(el("h2",null,title));
    var g=el("div","grid"); var any=false;
    (cards||[]).forEach(function(c){ any=true; g.appendChild(laneCard(title,c)); });
    if(!any && plainLines && plainLines.length){
      plainLines.forEach(function(t,i){
        var card=el("div","card"); card.setAttribute("data-k",title+"|plain|"+i);
        card.appendChild(el("div","one", t)); g.appendChild(card); any=true;
      });
    }
    if(!any){ s.appendChild(el("p","empty","Nothing here right now.")); return s; }
    s.appendChild(g); return s;
  }
  function renderDone(cards){
    // topline density: top 5 as full cards, the rest collapsed to one-line rows
    var s=el("section"); s.appendChild(el("h2",null,"Done Today"));
    if(!cards || !cards.length){ s.appendChild(el("p","empty","Nothing finished yet today.")); return s; }
    var topN=cards.slice(0,5), rest=cards.slice(5);
    var g=el("div","grid");
    topN.forEach(function(c){ g.appendChild(laneCard("Done Today",c)); });
    s.appendChild(g);
    if(rest.length){
      s.appendChild(el("div","morelbl", rest.length + " more finished earlier"));
      var ul=el("ul","donelist");
      rest.forEach(function(c){
        var li=el("li"); li.setAttribute("data-k","done|"+c.name+"|"+(c.time||""));
        li.appendChild(chip(c.chip));
        li.appendChild(el("span","name", c.name));
        li.appendChild(stampSpan(c));
        ul.appendChild(li);
      });
      s.appendChild(ul);
    }
    return s;
  }
  function renderWatch(lines){
    var s=el("section"); s.appendChild(el("h2",null,"Watch List"));
    if(!lines || !lines.length){ s.appendChild(el("p","empty","Clear.")); return s; }
    var ul=el("ul","watch");
    lines.forEach(function(t){ ul.appendChild(el("li",null,t)); });
    s.appendChild(ul); return s;
  }
  function renderPdfs(pdfs){
    if(!pdfs || !pdfs.length) return null;
    var s=el("section"); s.appendChild(el("h2",null,"Gameday Reports — " + (pdfs[0].date||"")));
    var wrap=el("div","pdfs");
    pdfs.forEach(function(p){ var a=el("a",null,p.label); a.href=p.href; a.target="_blank";
      a.rel="noopener"; wrap.appendChild(a); });
    s.appendChild(wrap); return s;
  }

  function render(b){
    var sec=b.sections||{};
    document.getElementById("sub").textContent =
      (b.date||"") + " · " + (b.counts? (b.counts.running+" running · "+b.counts.done_today+
      " done today · "+b.counts.needs_anthony+" awaiting you") : "");
    var main=document.getElementById("main"); main.innerHTML="";
    main.appendChild(renderDecisions(sec.needs_anthony, b.setup, b.answer_all));
    // Running-Now shows ALL live lanes: the coordinator's authoritative
    // running_live list wins when present; else the delta-derived IN-FLIGHT cards.
    var live=(sec.running_live && sec.running_live.length)? sec.running_live : sec.running_now;
    main.appendChild(renderCards("Running Now", live, sec.running_plain));
    var pdfs=renderPdfs(b.pdfs); if(pdfs) main.appendChild(pdfs);
    main.appendChild(renderDone(sec.done_today));
    main.appendChild(renderUpcoming(sec.upcoming, sec.coming_soon));
    main.appendChild(renderWatch(sec.watch_list));
    document.getElementById("foot").textContent =
      "Auto-generated from the working record. Last refreshed " + (b.generated_utc||"") +
      ". Every number a stranger sees is baked here — no live database is ever contacted from your browser.";
    flash();
  }

  /* ---------- shared live runtime (poll own JSON, ETag, ago-chip, flash) ---------- */
  var URL="./board.json", etag=null,lastMod=null,lastFetch=0,cardHTML={},first=true;
  function updAgo(){
    var s=Math.max(0,Math.round((Date.now()-lastFetch)/1000));
    var t = s<60 ? (s+"s ago") : (Math.floor(s/60)+"m "+(s%60)+"s ago");
    var a=document.getElementById("ago"); if(a) a.innerHTML = lastFetch? ("live · updated <b>"+t+"</b>") : "";
  }
  function flash(){
    var nodes=document.querySelectorAll("#main [data-k]"), nm={};
    nodes.forEach(function(n){ var k=n.getAttribute("data-k"), h=n.innerHTML; nm[k]=h;
      if(!first && cardHTML[k]!==undefined && cardHTML[k]!==h){ n.classList.remove("flash"); void n.offsetWidth; n.classList.add("flash"); } });
    cardHTML=nm; first=false;
  }
  function poll(){
    var h={}; if(etag)h["If-None-Match"]=etag; if(lastMod)h["If-Modified-Since"]=lastMod;
    fetch(URL,{headers:h,cache:"no-cache"}).then(function(r){
      if(r.status===304) return null;
      etag=r.headers.get("ETag")||etag; lastMod=r.headers.get("Last-Modified")||lastMod; return r.json();
    }).then(function(b){ lastFetch=Date.now(); if(b){ render(b); } updAgo(); }).catch(function(e){
      if(!lastFetch){ document.getElementById("main").innerHTML='<p class="empty">Could not load the board (board.json). '+(e&&e.message?e.message:"")+'</p>'; }
    });
  }
  poll(); setInterval(poll,60000); setInterval(updAgo,1000);
})();
</script>
</body>
</html>
