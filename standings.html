<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — Standings & Outlook</title>
<style>
  :root{ --bg:#f4f6f8; --card:#fff; --card2:#f7f9fc; --ink:#161a21; --muted:#5a6675; --dim:#8a93a3;
    --line:#e3e7ee; --line2:#d3d9e3; --acc:#2b6cb0; --good:#1a7f4b; --shadow:0 1px 2px rgba(20,24,35,.06); }
  @media (prefers-color-scheme:dark){ :root{ --bg:#0d1117; --card:#161b22; --card2:#1c2330; --ink:#e6edf3;
    --muted:#9aa7b4; --dim:#6b7684; --line:#242c38; --line2:#39424f; --acc:#58a6ff; --good:#3fb950; --shadow:none; } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13.5px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  header{padding:10px 14px 4px;max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:17px;margin:0}
  .ago{font-size:11px;color:var(--dim);white-space:nowrap}
  .sub{color:var(--muted);font-size:12px;max-width:1080px;margin:0 auto;padding:0 14px}
  nav{display:flex;gap:5px;flex-wrap:wrap;max-width:1080px;margin:6px auto 0;padding:0 14px}
  nav a{font-size:12px;text-decoration:none;color:var(--acc);border:1px solid var(--line);background:var(--card);padding:4px 10px;border-radius:999px}
  nav a.active{background:var(--acc);color:#fff;border-color:var(--acc)}
  main{max-width:1080px;margin:0 auto;padding:8px 14px 48px}
  .lede{color:var(--muted);font-size:12.5px;margin:8px 0 6px;max-width:820px}
  .prog{color:var(--dim);font-size:12px;margin:0 0 14px}
  .prog b{color:var(--muted);font-weight:680}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:2px}
  .scrollx{overflow-x:auto}
  table{border-collapse:collapse;width:100%;font-size:12.5px}
  th,td{padding:7px 9px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:680;font-size:11px;text-transform:uppercase;letter-spacing:.03em;position:sticky;top:0;background:var(--card)}
  th.l,td.l{text-align:left}
  tbody tr:last-child td{border-bottom:none}
  td.rk{color:var(--dim);width:22px}
  td.tm{font-weight:660}
  td.tm .full{color:var(--muted);font-weight:400;font-size:11.5px;margin-left:6px}
  .conf{display:inline-block;font-size:10px;color:var(--dim);border:1px solid var(--line2);border-radius:4px;padding:0 4px;margin-left:6px;vertical-align:1px}
  td.rec{font-variant-numeric:tabular-nums;font-weight:640}
  td.num{font-variant-numeric:tabular-nums;color:var(--muted)}
  td.proj{font-variant-numeric:tabular-nums;color:var(--ink)}
  td.proj .band{color:var(--dim);font-size:11.5px;margin-left:3px}
  td.pct{font-variant-numeric:tabular-nums}
  td.pct.hi{color:var(--good);font-weight:660}
  td.pct.lo{color:var(--dim)}
  td.na{color:var(--dim)}
  .sep td{border-top:2px solid var(--line2)}
  .note{color:var(--dim);font-size:11.5px;line-height:1.5;margin:12px 2px 0;max-width:820px}
  .note b{color:var(--muted);font-weight:680}
  .empty{color:var(--dim);font-style:italic}
  footer{max-width:1080px;margin:0 auto;padding:16px 14px;color:var(--dim);font-size:11px}
</style>
<link rel="stylesheet" href="./hardwood.css">
</head>
<body>
<header>
  <h1>The Hardwood — Standings &amp; Outlook</h1>
  <span class="ago" id="ago"></span>
</header>
<div class="sub">Where every team stands today — and where our season simulation lands them at the finish.</div>
<nav>
  <a href="./index.html">Board</a>
  <a href="./queue.html">What's Next</a>
  <a href="./games.html">Games</a>
  <a class="active" href="./standings.html">Standings</a>
  <a href="./availability.html">Injuries</a>
  <a href="./teams.html">Teams</a>
  <a href="./coach.html">Coach</a>
  <a href="./tempo.html">Tempo</a>
  <a href="./gm.html">GM</a>
  <a href="./players.html">Players</a>
  <a href="./compare.html">Compare</a>
  <a href="./situation.html">Situations</a>
  <a href="./review.html">Daily Review</a>
  <a href="./accuracy.html">Our Accuracy</a>
  <a href="./ledger.html">Error Map</a>
  <a href="./org.html">The Team</a>
  <a href="./scouting.html">Scouting</a>
  <a href="./deepdive.html">Deep Dives</a>
  <a href="./primer.html">Learn</a>
</nav>
<main id="main"><p class="empty">Loading…</p></main>
<footer id="foot"></footer>
<script src="./hardwood.js"></script>
<script>
(function(){
  "use strict";
  function el(t,c,x){ var e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; }

  // Probability -> short honest label. null => "—"; >=99.5% => ">99%"; <0.5% => "<1%".
  function fmtPct(p){
    if(p==null) return "—";
    var v=p*100;
    if(v>=99.5) return ">99%";
    if(v<0.5) return "<1%";
    return Math.round(v)+"%";
  }
  // Win% with no leading zero (".793"); 1.000 stays "1.000".
  function fmtWpct(w){
    if(w==null) return "—";
    var s=w.toFixed(3);
    return s.charAt(0)==="0" ? s.slice(1) : s;
  }

  function render(d){
    var main=document.getElementById("main"); main.innerHTML="";
    var teams=(d && d.teams)||[];
    if(!teams.length){ main.appendChild(el("p","empty","Standings coming soon.")); return; }
    var pr=d.progress||{};

    main.appendChild(el("p","lede",
      "Current record for all "+teams.length+" teams, plus each team's projected final-win "+
      "range and playoff and title odds. The projected columns are outputs of our season "+
      "simulation — a spread of how the rest of the year could go, not certainties."));

    // honest season-progress line (self-updates from the bake)
    var prog=el("p","prog");
    prog.appendChild(document.createTextNode(d.season+" season · "));
    if(pr.games_played!=null && pr.games_total!=null){
      prog.appendChild(el("b",null, pr.games_played+" of "+pr.games_total+" games played"));
      if(pr.pct_complete!=null) prog.appendChild(document.createTextNode(" ("+pr.pct_complete+"% through)"));
      if(pr.games_unplayed!=null) prog.appendChild(document.createTextNode(" · "+pr.games_unplayed+" still to play"));
    }
    if(pr.final_date) prog.appendChild(document.createTextNode(" · regular season runs to "+pr.final_date));
    if(pr.standings_asof) prog.appendChild(document.createTextNode(" · record as of "+pr.standings_asof));
    if(pr.outlook_asof) prog.appendChild(document.createTextNode(" · projection as of "+pr.outlook_asof));
    main.appendChild(prog);

    var card=el("div","card"); var sc=el("div","scrollx");
    var t=el("table"); var thead=el("thead"); var hr=el("tr");
    [["#","rk"],["Team","l"],["W-L",""],["Win%",""],["GB",""],
     ["Proj. wins",""],["Playoff",""],["Title",""]].forEach(function(h){
      var th=el("th",h[1]==="l"?"l":null,h[0]); hr.appendChild(th);
    });
    thead.appendChild(hr); t.appendChild(thead);
    var tb=el("tbody");

    teams.forEach(function(r,i){
      var tr=el("tr");
      // draw a divider after the 8th team (the league-wide playoff cut line)
      if(i===8) tr.className="sep";
      tr.appendChild(el("td","rk",String(i+1)));

      var tm=el("td","tm l");
      tm.appendChild(document.createTextNode(r.team||"—"));
      if(r.team_full) tm.appendChild(el("span","full",r.team_full));
      if(r.conference) tm.appendChild(el("span","conf",r.conference));
      tr.appendChild(tm);

      tr.appendChild(el("td","rec",(r.wins!=null&&r.losses!=null)?(r.wins+"-"+r.losses):"—"));
      tr.appendChild(el("td","num",fmtWpct(r.win_pct)));
      var gb=(r.games_back==null)?"—":(r.games_back===0?"—":r.games_back.toFixed(1));
      tr.appendChild(el("td","num",gb));

      // projected final wins: median [p5–p95] (omit-not-invent: dash when no sim row)
      var pc=el("td","proj");
      if(r.proj_median_wins==null){ pc.className="proj na"; pc.textContent="—"; }
      else{
        pc.appendChild(document.createTextNode(r.proj_median_wins.toFixed(1)));
        var b=r.proj_range_90;
        if(b && b.length===2 && b[0]!=null && b[1]!=null)
          pc.appendChild(el("span","band"," ["+b[0].toFixed(1)+"–"+b[1].toFixed(1)+"]"));
      }
      tr.appendChild(pc);

      // playoff odds
      var po=el("td","pct");
      po.textContent=fmtPct(r.p_playoff);
      if(r.p_playoff!=null){ po.className="pct "+(r.p_playoff>=0.85?"hi":(r.p_playoff<0.15?"lo":"")); }
      else po.className="pct na";
      tr.appendChild(po);

      // title odds
      var to=el("td","pct");
      to.textContent=fmtPct(r.p_title);
      if(r.p_title!=null){ to.className="pct "+(r.p_title>=0.10?"hi":(r.p_title<0.05?"lo":"")); }
      else to.className="pct na";
      tr.appendChild(to);

      // NOTE: market/futures column intentionally omitted — F24 futures seam is r.market
      // (currently null for every team). A "vs. market" column drops in here once the feed lands.
      tb.appendChild(tr);
    });
    t.appendChild(tb); sc.appendChild(t); card.appendChild(sc); main.appendChild(card);

    var note=el("p","note");
    note.appendChild(el("b",null,"How to read this. "));
    note.appendChild(document.createTextNode(
      "Record and games-back are today's actual standings. Proj. wins is the median final-win "+
      "total across the simulations, with the [p5–p95] band showing where the total lands in 9 of "+
      "every 10 runs. Playoff and Title are the share of simulations in which a team makes the "+
      "league-wide top-8 and wins the championship. Teams are ordered by current win%; the line "+
      "after the 8th team marks today's playoff cut. Projections update when the nightly "+
      "simulation re-runs — they describe a range of outcomes, not a prediction of the exact finish."));
    main.appendChild(note);

    document.getElementById("foot").textContent="Baked "+(d.generated_et||d.generated_utc||"")+".";
  }

  var lastFetch=0;
  function updAgo(){ var a=document.getElementById("ago"); if(!a)return;
    if(!lastFetch){ a.innerHTML=""; return; }
    var s=Math.max(0,Math.round((Date.now()-lastFetch)/1000));
    a.innerHTML="live · updated <b>"+(s<60?(s+"s ago"):(Math.floor(s/60)+"m ago"))+"</b>"; }
  function poll(){ fetch("./standings.json",{cache:"no-cache"}).then(function(r){ return r.json(); })
    .then(function(d){ lastFetch=Date.now(); render(d); updAgo(); })
    .catch(function(e){ if(!lastFetch){ document.getElementById("main").innerHTML='<p class="empty">Could not load. '+(e&&e.message?e.message:"")+'</p>'; } }); }
  poll(); setInterval(poll,300000); setInterval(updAgo,1000);
})();
</script>
</body>
</html>
