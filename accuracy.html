<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — Our Accuracy</title>
<style>
  :root{ --bg:#f6f7f9; --card:#ffffff; --ink:#16181d; --muted:#5b6472; --line:#e5e8ee; --accent:#2b6cb0; --shadow:0 1px 3px rgba(20,24,35,.08); --good:#1f883d; --warn:#9a6700; --flash:rgba(43,108,176,.18); }
  @media (prefers-color-scheme:dark){ :root{ --bg:#0d1117; --card:#161b22; --ink:#e6edf3; --muted:#8b949e; --line:#222a35; --accent:#58a6ff; --shadow:none; --good:#3fb950; --warn:#d29922; --flash:rgba(88,166,255,.24); } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13.5px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  header{padding:10px 14px 4px;max-width:1000px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:17px;margin:0}
  .sub{color:var(--muted);font-size:12px;max-width:1000px;margin:0 auto;padding:0 14px}
  .ago{font-size:11px;color:var(--muted);white-space:nowrap}
  .ago b{color:var(--good);font-variant-numeric:tabular-nums}
  nav{display:flex;gap:5px;flex-wrap:wrap;max-width:1000px;margin:6px auto 0;padding:0 14px}
  nav a{font-size:12px;text-decoration:none;color:var(--accent);border:1px solid var(--line);background:var(--card);padding:4px 10px;border-radius:999px}
  nav a.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  main{max-width:1000px;margin:0 auto;padding:8px 14px 48px}
  .lede{color:var(--muted);font-size:12.5px;margin:6px 0 2px}
  section{margin-top:14px}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 7px;font-weight:700}
  .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:7px}
  .metric{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 11px;box-shadow:var(--shadow);display:flex;align-items:center;gap:11px}
  .metric.flash,.cal.flash{animation:fl 1.1s ease}
  @keyframes fl{0%{background:var(--flash)}100%{background:var(--card)}}
  .metric .val{font-size:23px;font-weight:750;line-height:1;min-width:74px;text-align:center}
  .metric .val small{font-size:12px;font-weight:600;color:var(--muted)}
  .metric .body{flex:1}
  .metric .lbl{font-weight:640;font-size:13px}
  .metric .note{color:var(--muted);font-size:11.5px;margin-top:1px}
  .metric .tag{font-size:10px;color:var(--muted);margin-top:3px}
  .nodata .val{color:var(--muted);font-size:13px;font-weight:600}
  .cal{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:7px;box-shadow:var(--shadow)}
  .cal .lbl{font-weight:620;font-size:12.5px}
  .bar{height:9px;background:var(--line);border-radius:999px;margin-top:8px;position:relative;overflow:hidden}
  .bar > i{position:absolute;top:0;left:0;bottom:0;background:var(--good);border-radius:999px}
  .bar > b{position:absolute;top:-3px;width:2px;height:15px;background:var(--ink);opacity:.55}
  .cal .row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:6px}
  .spark{display:flex;gap:6px;align-items:flex-end;height:70px;margin-top:6px}
  .spark .b{flex:1;background:var(--accent);border-radius:4px 4px 0 0;min-height:4px;opacity:.85;position:relative}
  .spark .b span{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:10px;color:var(--muted)}
  .spark .b.cur{opacity:1;outline:2px solid var(--ink);outline-offset:1px}
  .subh{font-size:12.5px;font-weight:700;color:var(--ink);margin:12px 0 5px}
  .subh small{font-weight:500;color:var(--muted);font-size:11.5px}
  .readline{font-size:12.5px;color:var(--muted);margin:26px 0 0}
  .readline b{color:var(--ink)}
  .empty{color:var(--muted);font-style:italic}
  .hero{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px 15px;box-shadow:var(--shadow);margin-top:10px}
  .hero .big{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .hero .num{font-size:40px;font-weight:800;line-height:1;letter-spacing:-.5px}
  .hero .num small{font-size:15px;font-weight:600;color:var(--muted);letter-spacing:0}
  .hero .win{font-size:13px;color:var(--muted)}
  .hero .win b{color:var(--ink);font-variant-numeric:tabular-nums;font-weight:700}
  .hero .line{font-size:13.5px;margin:9px 0 0}
  .hero .lean{font-size:12.5px;color:var(--muted);margin:7px 0 0;padding-left:9px;border-left:3px solid var(--good)}
  .hero .caveat{font-size:12px;color:var(--muted);margin:9px 0 0}
  footer{max-width:860px;margin:0 auto;padding:24px 16px;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<header>
  <h1>The Hardwood — Our Accuracy</h1>
  <span class="ago" id="ago"></span>
</header>
<div class="sub" id="sub">Loading…</div>
<nav>
  <a href="./index.html">Board</a>
  <a href="./queue.html">What's Next</a>
  <a href="./games.html">Games</a>
  <a href="./teams.html">Teams</a>
  <a href="./players.html">Players</a>
  <a href="./review.html">Daily Review</a>
  <a class="active" href="./accuracy.html">Our Accuracy</a>
  <a href="./ledger.html">Error Map</a>
  <a href="./org.html">The Team</a>
  <a href="./scouting.html">Scouting</a>
  <a href="./deepdive.html">Deep Dives</a>
</nav>
<main id="main"><p class="empty">Loading the scorecard…</p></main>
<footer id="foot"></footer>
<script src="./hardwood.js"></script>
<script>
(function(){
  "use strict";
  function el(t,c,x){ var e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; }

  function metricCard(m){
    var c=el("div","metric" + (m.no_data?" nodata":"")); c.setAttribute("data-k","m|"+m.surface);
    var v=el("div","val");
    if(m.no_data || m.value==null){ v.textContent="not yet tracked"; }
    else{ v.textContent = m.value; if(m.unit && m.unit!=="%"){ var s=el("small"); s.textContent=" "+m.unit; v.appendChild(s);} else if(m.unit==="%"){ v.textContent = m.value + "%"; } }
    var body=el("div","body");
    body.appendChild(el("div","lbl", m.surface));
    if(m.note) body.appendChild(el("div","note", m.note));
    var tag = (m.n?("based on " + m.n + " graded cases"):"") + (m.kind?(m.n?" · ":"") + m.kind:"");
    if(tag) body.appendChild(el("div","tag", tag));
    c.appendChild(v); c.appendChild(body); return c;
  }

  function calCard(k){
    var c=el("div","cal"); c.setAttribute("data-k","c|"+k.surface);
    c.appendChild(el("div","lbl", k.surface));
    var pct=Math.max(0,Math.min(100,k.actual));
    var bar=el("div","bar");
    var fill=el("i"); fill.style.width=pct+"%";
    if(Math.abs(k.actual-k.target)>5) fill.style.background="var(--warn)";
    var tgt=el("b"); tgt.style.left=Math.max(0,Math.min(100,k.target))+"%";
    bar.appendChild(fill); bar.appendChild(tgt);
    c.appendChild(bar);
    var row=el("div","row");
    row.appendChild(el("span",null,"actual: " + k.actual + "%"));
    row.appendChild(el("span",null,"target: " + k.target + "%" + (k.n?(" · "+k.n+" games"):"")));
    c.appendChild(row);
    return c;
  }

  function sparkline(monthly, seasonAvg){
    var s=el("section"); s.appendChild(el("h2",null,"Recent form — game-margin error by month"));
    var vals=monthly.filter(function(m){return m.value!=null;});
    if(!vals.length){ s.appendChild(el("p","empty","No monthly history yet.")); return s; }
    s.appendChild(el("p","lede","Shorter bars mean tighter calls; the outlined bar is the latest month."));
    var max=Math.max.apply(null, vals.map(function(m){return m.value;}));
    var wrap=el("div","spark");
    vals.forEach(function(m,i){
      var b=el("div","b" + (i===vals.length-1?" cur":"")); b.style.height=Math.round((m.value/max)*100)+"%";
      b.title=m.month+": "+m.value+" pts";
      var lab=el("span"); lab.textContent=(m.month||"").slice(5)+" · "+m.value; b.appendChild(lab);
      wrap.appendChild(b);
    });
    var box=el("div"); box.style.paddingBottom="22px"; box.appendChild(wrap);
    s.appendChild(box);
    var last=vals[vals.length-1];
    if(last && seasonAvg!=null){
      var diff=last.value-seasonAvg;
      var word=Math.abs(diff)<0.5 ? "right in line with" : (diff<0 ? "tighter than" : "a touch looser than");
      var r=el("p","readline");
      r.innerHTML="Latest month: <b>"+last.value+" pts</b> — "+word+" our season average of "+seasonAvg+" pts"
        + (last.n?(", on a small "+last.n+"-game sample (read it lightly)"):"") + ".";
      s.appendChild(r);
    }
    return s;
  }

  function headlineSection(h){
    var s=el("section"); s.setAttribute("data-k","headline");
    s.appendChild(el("h2",null,"How accurate are we?"));
    var box=el("div","hero");
    var big=el("div","big");
    var num=el("div","num");
    num.textContent = (h.avg_miss==null?"—":h.avg_miss);
    var u=el("small"); u.textContent=" pts avg miss"; num.appendChild(u);
    big.appendChild(num);
    if(h.win_pct!=null){
      var w=el("div","win"); w.innerHTML="right winner <b>"+h.win_pct+"%</b> of the time"
        + (h.n_games?(" · <b>"+h.n_games+"</b> games this season"):"");
      big.appendChild(w);
    }
    box.appendChild(big);
    if(h.line) box.appendChild(el("p","line", h.line));
    if(h.bias_line) box.appendChild(el("p","lean", h.bias_line));
    if(h.caveat) box.appendChild(el("p","caveat", h.caveat));
    s.appendChild(box);
    return s;
  }

  function backtestSection(bt){
    var s=el("section"); s.setAttribute("data-k","backtest");
    s.appendChild(el("h2",null, bt.heading || "Re-checking our framework against the past"));
    if(bt.metrics && bt.metrics.length){
      var g=el("div","mgrid");
      bt.metrics.forEach(function(m){
        var c=el("div","metric"); c.setAttribute("data-k","bt|"+m.label);
        var v=el("div","val");
        if(m.value==null){ v.textContent="—"; }
        else if(m.unit==="%"){ v.textContent=m.value+"%"; }
        else { v.textContent=m.value; if(m.unit){ var sm=el("small"); sm.textContent=" "+m.unit; v.appendChild(sm); } }
        var body=el("div","body");
        body.appendChild(el("div","lbl", m.label));
        if(m.note) body.appendChild(el("div","note", m.note));
        c.appendChild(v); c.appendChild(body); g.appendChild(c);
      });
      s.appendChild(g);
    }
    if(bt.calibration && bt.calibration.length){
      bt.calibration.forEach(function(k){ s.appendChild(calCard({surface:k.label, actual:k.actual, target:k.target})); });
    }
    if(bt.takeaway) s.appendChild(el("p","lede", bt.takeaway));
    return s;
  }

  function render(a){
    document.getElementById("sub").textContent = (a.date||"") + " · a prediction platform that publishes its own scorecard";
    var main=document.getElementById("main"); main.innerHTML="";
    main.appendChild(el("p","lede","Honest, self-graded accuracy. Every figure comes from grading our own past predictions against what actually happened — " + (a.source||"") + "."));
    if(a.backtest && a.backtest.available && a.backtest.headline){ main.appendChild(headlineSection(a.backtest.headline)); }
    if(a.backtest && a.backtest.available){ main.appendChild(backtestSection(a.backtest)); }
    if(!a.available){
      if(!(a.backtest && a.backtest.available)) main.appendChild(el("p","empty", a.note || "No graded accuracy available yet."));
      document.getElementById("foot").textContent = "Baked " + (a.generated_et||a.generated_utc||"") + ".";
      flash(); return;
    }

    if(a.surfaces && a.surfaces.length){
      var s1=el("section"); s1.appendChild(el("h2",null,"How accurate we are, per surface"));
      var groups=[
        {kind:"live games", title:"This season, live",
         desc:"Graded on the games we've actually predicted and played this year."},
        {kind:"season reconstruction", title:"Across our full game history",
         desc:"Our current method re-scored on every past game we have — a larger, steadier read."}
      ];
      var used={};
      groups.forEach(function(gr){
        var items=a.surfaces.filter(function(m){ return m.kind===gr.kind; });
        if(!items.length) return;
        items.forEach(function(m){ used[m.surface]=1; });
        var sh=el("div","subh"); sh.appendChild(document.createTextNode(gr.title+" "));
        sh.appendChild(el("small",null,"— "+gr.desc)); s1.appendChild(sh);
        var g=el("div","mgrid"); items.forEach(function(m){ g.appendChild(metricCard(m)); });
        s1.appendChild(g);
      });
      var rest=a.surfaces.filter(function(m){ return !used[m.surface]; });
      if(rest.length){ var g2=el("div","mgrid"); rest.forEach(function(m){ g2.appendChild(metricCard(m)); }); s1.appendChild(g2); }
      main.appendChild(s1);
    }
    if(a.calibration && a.calibration.length){
      var s2=el("section"); s2.appendChild(el("h2",null,"Are our prediction ranges honest?"));
      s2.appendChild(el("p","lede","When we give a range, it should contain the real result about as often as it claims."));
      a.calibration.forEach(function(k){ s2.appendChild(calCard(k)); });
      main.appendChild(s2);
    }
    if(a.monthly && a.monthly.length){ main.appendChild(sparkline(a.monthly, (a.backtest&&a.backtest.headline)?a.backtest.headline.avg_miss:null)); }
    document.getElementById("foot").textContent = "Baked " + (a.generated_et||a.generated_utc||"") + ". Lower error is better; a single WNBA game's margin is mostly luck, for us and for the market alike.";
    flash();
  }
  /* ---------- shared live runtime ---------- */
  var URL="./accuracy.json", etag=null,lastMod=null,lastFetch=0,cardHTML={},first=true;
  function updAgo(){
    var s=Math.max(0,Math.round((Date.now()-lastFetch)/1000));
    var t = s<60 ? (s+"s ago") : (Math.floor(s/60)+"m "+(s%60)+"s ago");
    var a=document.getElementById("ago"); if(a) a.innerHTML = lastFetch? ("live · updated <b>"+t+"</b>") : "";
  }
  function flash(){
    var nodes=document.querySelectorAll("#main [data-k]"), nm={};
    nodes.forEach(function(n){ var k=n.getAttribute("data-k"), h=n.innerHTML; nm[k]=h;
      if(!first && cardHTML[k]!==undefined && cardHTML[k]!==h){ n.classList.remove("flash"); void n.offsetWidth; n.classList.add("flash"); } });
    cardHTML=nm; first=false;
  }
  function poll(){
    var h={}; if(etag)h["If-None-Match"]=etag; if(lastMod)h["If-Modified-Since"]=lastMod;
    fetch(URL,{headers:h,cache:"no-cache"}).then(function(r){
      if(r.status===304) return null;
      etag=r.headers.get("ETag")||etag; lastMod=r.headers.get("Last-Modified")||lastMod; return r.json();
    }).then(function(a){ lastFetch=Date.now(); if(a){ render(a); } updAgo(); }).catch(function(e){
      if(!lastFetch){ document.getElementById("main").innerHTML='<p class="empty">Could not load the scorecard. '+(e&&e.message?e.message:"")+'</p>'; }
    });
  }
  poll(); setInterval(poll,60000); setInterval(updAgo,1000);
})();
</script>
</body>
</html>
