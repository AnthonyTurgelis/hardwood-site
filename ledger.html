<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — Error Map</title>
<style>
  :root{ --bg:#f6f7f9; --card:#ffffff; --ink:#16181d; --muted:#5b6472; --line:#e5e8ee; --accent:#2b6cb0; --shadow:0 1px 3px rgba(20,24,35,.08); }
  @media (prefers-color-scheme:dark){ :root{ --bg:#0d1117; --card:#161b22; --ink:#e6edf3; --muted:#8b949e; --line:#222a35; --accent:#58a6ff; --shadow:none; } }
  :root{ --flash:rgba(43,108,176,.18); }
  @media (prefers-color-scheme:dark){ :root{ --flash:rgba(88,166,255,.24); } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13.5px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  header{padding:10px 14px 4px;max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{font-size:17px;margin:0}
  .sub{color:var(--muted);font-size:12px;max-width:1080px;margin:0 auto;padding:0 14px}
  .ago{font-size:11px;color:var(--muted);white-space:nowrap}
  .ago b{color:var(--accent);font-variant-numeric:tabular-nums}
  nav{display:flex;gap:5px;flex-wrap:wrap;max-width:1080px;margin:6px auto 0;padding:0 14px}
  nav a{font-size:12px;text-decoration:none;color:var(--accent);border:1px solid var(--line);background:var(--card);padding:4px 10px;border-radius:999px}
  nav a.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  main{max-width:1080px;margin:0 auto;padding:8px 14px 48px}
  .lede{color:var(--muted);font-size:12.5px;margin:6px 0}
  section{margin-top:14px}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 7px;font-weight:700}
  .placeholder{background:var(--card);border:1px dashed var(--line);border-radius:10px;padding:20px 16px;text-align:center;color:var(--muted)}
  .placeholder .big{font-size:14px;color:var(--ink);font-weight:620;margin-bottom:5px}
  .scroll{overflow-x:auto;border:1px solid var(--line);border-radius:10px;background:var(--card);box-shadow:var(--shadow)}
  .scroll.flash{animation:fl 1.1s ease}
  @keyframes fl{0%{background:var(--flash)}100%{background:var(--card)}}
  table{border-collapse:collapse;width:100%;font-size:12px;min-width:520px;font-variant-numeric:tabular-nums}
  th,td{padding:4px 8px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{position:sticky;top:0;background:var(--card);cursor:pointer;user-select:none;font-size:10px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
  th:hover{color:var(--ink)}
  tbody tr:hover{background:rgba(43,108,176,.06)}
  .filt{width:100%;max-width:300px;margin:0 0 8px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);font-size:12.5px}
  .empty{color:var(--muted);font-style:italic}
  .showall{margin:8px 0 0;font-size:12px;color:var(--accent);background:var(--card);border:1px solid var(--line);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:inherit}
  .showall:hover{border-color:var(--accent)}
  .reading{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 13px;margin:0 0 9px;box-shadow:var(--shadow);font-size:12.5px;line-height:1.55}
  .reading b{color:var(--ink);font-variant-numeric:tabular-nums}
  .reading .k{color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.03em;font-size:10.5px}
  .reading .good{color:var(--accent);font-weight:660}
  .reading .rnote{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.5}
  footer{max-width:1080px;margin:0 auto;padding:16px 14px;color:var(--muted);font-size:11px}
</style>
<link rel="stylesheet" href="./hardwood.css">
</head>
<body>
<header>
  <h1>The Hardwood — Error Map</h1>
  <span class="ago" id="ago"></span>
</header>
<div class="sub">Where we miss, and where we beat the market.</div>
<nav>

<main id="main"><p class="empty">Loading the error map…</p></main>
<footer id="foot"></footer>
<script src="./hardwood.js"></script>
<script>
(function(){
  "use strict";
  function el(t,c,x){ var e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; }

  function num(v){ return (typeof v==="number") && isFinite(v); }

  // Plain-language labels for the raw tokens the ledger is keyed on, so readers never see an
  // internal code. Display-only: sorting/filtering still run on the raw value. Unknown tokens
  // fall back to a mechanical de-underscore, so a new slice never renders as broken jargon.
  var SURFACE_LABEL={
    "3PM":"3-pointers made","REB":"Rebounds","PTS":"Points","MIN":"Minutes","AST":"Assists",
    "margin":"Winning margin","total":"Combined total","win_prob":"Win probability"
  };
  var BREAKDOWN_LABEL={
    "excuse_code":"Known disruptions","pred_magnitude":"Size of our call",
    "game_competitiveness":"Expected closeness","realized_competitiveness":"Actual closeness",
    "home_favored":"Which side we favored","season_phase":"Month","rest_days":"Days of rest",
    "position":"Position"
  };
  var SLICE_LABEL={
    "ALL":"All","toss_0-3":"Toss-up (0-3)","3-7":"Lean (3-7)","7-12":"Clear (7-12)","12+":"Big (12+)",
    "close_0-5":"Close (0-5)","mid_5-12":"Mid (5-12)","blowout_12+":"Blowout (12+)",
    "away_fav":"Away favored","home_fav":"Home favored","b2b_0-1":"Back-to-back",
    "2-3":"2-3 days","4+":"4+ days","in_game_injury_exit":"In-game injury exit","late_scratch":"Late scratch"
  };
  function humanize(v){ return String(v).replace(/_/g," "); }
  // Humanize a bare YYYY-MM month slice to a readable "Jul 2026" (mirrors the site's monthDay/plainDate treatment).
  var MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function monthLabel(v){ var m=/^(\d{4})-(\d{2})$/.exec(String(v)); return m ? (MON[(+m[2])-1]+" "+m[1]) : null; }
  function label(col,v){
    if(v==null) return "-";
    if(col==="Surface" && SURFACE_LABEL[v]) return SURFACE_LABEL[v];
    if(col==="Broken down by" && BREAKDOWN_LABEL[v]) return BREAKDOWN_LABEL[v];
    if(col==="Slice" && SLICE_LABEL[v]) return SLICE_LABEL[v];
    if(col==="Slice"){ var ml=monthLabel(v); if(ml) return ml; }
    return humanize(v);
  }

  // ---- Impact-first "readings": a plain-language verdict a coach can read in one glance, so each
  // section leads with a finding instead of a raw table. EVERY number is pulled straight from the
  // rows that render below (no invented value); an element is OMITTED, never guessed, when its
  // source row/column is absent. Built as textContent nodes (no innerHTML), same as the rest of the file.
  function overallRows(tbl){
    if(!tbl || !tbl.rows) return [];
    return tbl.rows.filter(function(r){ return r["Broken down by"]==="Overall" && r["Slice"]==="ALL"; });
  }
  function readingCard(dataK){ var c=el("div","reading"); c.setAttribute("data-k",dataK); return c; }

  // Player box-score projection accuracy — the error-ledger's unique content (the game-call miss is
  // already read at the top of the page). Presents each surface's own average miss in its own unit,
  // in a conventional stat order — a per-surface fact, never a cross-unit "tightest" ranking.
  function ledgerReading(tbl){
    var ov=overallRows(tbl); if(!ov.length) return null;
    var ORDER=["PTS","REB","AST","3PM","MIN"], byS={};
    ov.forEach(function(r){ byS[r.Surface]=r; });
    var box=[];
    ORDER.forEach(function(s){ var r=byS[s]; if(r && num(r["Avg error (pts)"])) box.push(r); });
    if(!box.length) return null;
    var games=Math.min.apply(null, box.map(function(r){ return num(r.Games)?r.Games:Infinity; }));
    var c=readingCard("ledgerreading");
    var head=el("div");
    head.appendChild(el("span","k","Player box score "));
    head.appendChild(document.createTextNode(" across "));
    head.appendChild(el("b",null, isFinite(games)? games.toLocaleString()+" player-games" : "our history"));
    head.appendChild(document.createTextNode(", our projections land within these averages of the real number:"));
    c.appendChild(head);
    var list=el("div"); list.style.marginTop="4px";
    box.forEach(function(r,i){
      if(i) list.appendChild(document.createTextNode("  ·  "));
      list.appendChild(el("b",null, r["Avg error (pts)"].toFixed(1)));
      list.appendChild(document.createTextNode(" "+(SURFACE_LABEL[r.Surface]||humanize(r.Surface)).toLowerCase()));
    });
    c.appendChild(list);
    return c;
  }

  // Market comparison — honest verdict on the headline calls, plus an anti-cherry-pick note: we
  // only claim to "beat the market" on a slice with enough games to trust (Thin sample = no). If
  // every slice where we come out ahead is still thin, we say so plainly rather than imply an edge.
  function marketReading(tbl){
    var ov=overallRows(tbl); if(!ov.length) return null;
    var EDGE="Our edge (pts)", byS={}; ov.forEach(function(r){ byS[r.Surface]=r; });
    var c=readingCard("marketreading"), any=false;
    ["margin","total"].forEach(function(surf){
      var r=byS[surf]; if(!r || !num(r[EDGE])) return;
      any=true;
      var line=el("div"); if(c.children.length) line.style.marginTop="3px";
      var nm=SURFACE_LABEL[surf]||surf, edge=r[EDGE];
      line.appendChild(el("span","k", nm+" "));
      line.appendChild(document.createTextNode(" "));
      if(edge>0){
        line.appendChild(document.createTextNode("we're "));
        line.appendChild(el("b","good", edge.toFixed(1)+" pts"));
        line.appendChild(document.createTextNode(" tighter than the market"));
      } else if(edge<0){
        line.appendChild(document.createTextNode("the market is "));
        line.appendChild(el("b",null, Math.abs(edge).toFixed(1)+" pts"));
        line.appendChild(document.createTextNode(" tighter than us"));
      } else {
        line.appendChild(document.createTextNode("we're dead even with the market"));
      }
      if(num(r.Games)) line.appendChild(document.createTextNode(" over "+r.Games+" games"));
      c.appendChild(line);
    });
    if(!any) return null;
    // Best trustworthy (non-thin) positive edge anywhere in the table, if one exists.
    var best=null;
    tbl.rows.forEach(function(r){
      if(num(r[EDGE]) && r[EDGE]>0 && String(r["Thin sample"]).toLowerCase()==="no"){
        if(!best || r[EDGE]>best[EDGE]) best=r;
      }
    });
    var note=el("div","rnote");
    if(best){
      var where=(SURFACE_LABEL[best.Surface]||best.Surface)+
        ((best.Slice && best.Slice!=="ALL") ? " ("+label("Slice",best.Slice)+")" : "");
      note.textContent="Where we do beat it on enough games to trust: "+where+" — "+
        best[EDGE].toFixed(1)+" pts better over "+best.Games+" games.";
    } else {
      note.textContent="No slice yet has enough games to trust an edge over the market — every row where we come out ahead is still thin-sample.";
    }
    c.appendChild(note);
    return c;
  }

  // Biggest trustworthy miss — one auto-picked highlight ABOVE the error-ledger table. The pick is
  // baked server-side from the SAME rows the table shows, gated by each row's own thin-sample flag
  // (the ledger's enough-games convention), so a thin-slice cherry-pick can never headline. When no
  // slice qualifies, the honest empty state renders instead of an invented finding.
  function headlineMissSection(hm){
    var s=el("section"); s.setAttribute("data-k","headlinemiss");
    s.appendChild(el("h2",null,"Biggest trustworthy miss"));
    var c=el("div","reading");
    if(hm && hm.available && hm.line){
      var head=el("div");
      head.appendChild(el("span","k","Weak spot "));
      head.appendChild(document.createTextNode(" "+hm.line));
      c.appendChild(head);
      var note=el("div","rnote");
      note.textContent="Auto-picked from the table below - only slices with enough games to trust can appear here; a hot or cold handful of games never makes this box.";
      c.appendChild(note);
    } else {
      var emptyLine=el("div",null,(hm && hm.line) ? hm.line : "No slice has enough games yet to call out a trustworthy weak spot.");
      emptyLine.style.color="var(--muted)";
      c.appendChild(emptyLine);
    }
    s.appendChild(c);
    return s;
  }

  function makeTable(title, data, readingNode){
    var s=el("section"); s.appendChild(el("h2",null,title));
    if(readingNode) s.appendChild(readingNode);
    if(!data || !data.columns || !data.rows || !data.rows.length){
      s.appendChild(el("p","empty","No rows yet.")); return s;
    }
    var cols=data.columns, rows=data.rows.slice(); var filterStr="";
    var CAP=25, expanded=false;   // phone-scannable: cap the default view, expandable on demand
    var fbox=el("input","filt"); fbox.type="search"; fbox.placeholder="Filter rows…";
    fbox.oninput=function(){ filterStr=fbox.value.trim().toLowerCase(); fill();
      fbox.focus(); fbox.setSelectionRange(fbox.value.length,fbox.value.length); };
    s.appendChild(fbox);
    var scroll=el("div","scroll"); scroll.setAttribute("data-k", title);
    var table=el("table");
    var thead=el("thead"), htr=el("tr");
    var sortState={col:null,dir:1};
    cols.forEach(function(c,ci){
      var th=el("th",null,c.replace(/_/g," "));
      th.addEventListener("click", function(){
        sortState.dir = (sortState.col===ci)? -sortState.dir : 1; sortState.col=ci;
        rows.sort(function(a,b){
          var x=a[c], y=b[c];
          if(num(x)&&num(y)) return (x-y)*sortState.dir;
          return String(x).localeCompare(String(y))*sortState.dir;
        });
        fill();
      });
      htr.appendChild(th);
    });
    thead.appendChild(htr); table.appendChild(thead);
    var tbody=el("tbody"); table.appendChild(tbody);

    // Heat-tint ONLY error-magnitude columns (header contains "error"): there redder = more error =
    // worse, one consistent meaning. Signed columns (edge/bias), counts (Games) and rates (hit-rate)
    // are left untinted — coloring them by magnitude would read as "redder = worse" on values where
    // higher is neutral or GOOD (e.g. "Our edge", "Side hit-rate"), a misleading dual meaning. A color
    // scale must encode exactly one thing (standard conditional-formatting rule, cf. Tufte / Few). (VZ-1)
    function heatCol(c){ return /error/i.test(c); }
    var bounds={};
    cols.forEach(function(c){
      if(!heatCol(c)) return;
      var vals=rows.map(function(r){return r[c];}).filter(num);
      if(vals.length){ bounds[c]=[Math.min.apply(null,vals),Math.max.apply(null,vals)]; }
    });
    var moreBtn=el("button","showall"); moreBtn.type="button";
    moreBtn.onclick=function(){ expanded=true; fill(); };
    function matches(r){
      if(!filterStr) return true;
      return cols.some(function(c){
        var v=r[c]; if(v==null) return false;
        return String(v).toLowerCase().indexOf(filterStr)>=0
            || label(c,v).toLowerCase().indexOf(filterStr)>=0;
      });
    }
    function fill(){
      tbody.innerHTML="";
      var matched=rows.filter(matches);
      var cap=(filterStr||expanded)? matched.length : Math.min(CAP, matched.length);
      matched.slice(0,cap).forEach(function(r){
        var tr=el("tr");
        cols.forEach(function(c){
          var v=r[c]; var tdd=el("td", null, label(c,v));
          if(num(v) && bounds[c] && bounds[c][1]>bounds[c][0]){
            var f=(v-bounds[c][0])/(bounds[c][1]-bounds[c][0]);
            tdd.style.background="rgba(207,34,46,"+(0.05+f*0.28).toFixed(3)+")";
          }
          tr.appendChild(tdd);
        });
        tbody.appendChild(tr);
      });
      if(!filterStr && !expanded && matched.length>CAP){
        moreBtn.textContent="Show all "+matched.length+" rows";
        moreBtn.style.display="";
      } else { moreBtn.style.display="none"; }
    }
    fill(); scroll.appendChild(table); s.appendChild(scroll); s.appendChild(moreBtn); return s;
  }

  function stat(node,css){ node.style.cssText=css; return node; }

  function errorMapSection(em){
    var s=el("section"); s.setAttribute("data-k","errormap");
    s.appendChild(el("h2",null, em.heading || "Where our game calls miss"));
    if(em.window){
      s.appendChild(el("p","lede","Last "+em.window.n_games+" graded games ("+(em.window.from||"")+" to "+(em.window.to||"")+"). Updates automatically after every game."));
    }
    if(em.split){
      var card=stat(el("div"),"background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px;box-shadow:var(--shadow)");
      card.appendChild(stat(el("div",null,em.split.line),"font-size:13px"));
      var bar=stat(el("div"),"display:flex;height:12px;border-radius:999px;overflow:hidden;margin:9px 0 4px;background:var(--line)");
      bar.appendChild(stat(el("div"),"background:var(--accent);width:"+em.split.process_pct+"%"));
      card.appendChild(bar);
      var leg=stat(el("div"),"display:flex;justify-content:space-between;font-size:11px;color:var(--muted)");
      leg.appendChild(el("span",null,"model process "+em.split.process_pct+"% (fixable)"));
      leg.appendChild(el("span",null,"shooting luck "+em.split.variance_pct+"% (not)"));
      card.appendChild(leg);
      if(em.split.bias_line) card.appendChild(stat(el("div",null,em.split.bias_line),"font-size:11.5px;color:var(--muted);margin-top:7px"));
      if(em.side && em.side.line) card.appendChild(stat(el("div",null,em.side.line),"font-size:11.5px;color:var(--muted);margin-top:3px"));
      s.appendChild(card);
    }
    if(em.team_leads && em.team_leads.length){
      var t=el("section"); t.appendChild(el("h2",null,"Which teams we systematically over- or under-rate"));
      var scroll=el("div","scroll"), tb=el("table"), thd=el("thead"), htr=el("tr");
      ["Team","Which way","Avg gap (pts)","Games"].forEach(function(h){ htr.appendChild(el("th",null,h)); });
      thd.appendChild(htr); tb.appendChild(thd);
      var body=el("tbody");
      em.team_leads.forEach(function(r){
        var tr=el("tr");
        tr.appendChild(el("td",null,r.team));
        tr.appendChild(el("td",null,r.direction));
        tr.appendChild(el("td",null,r.avg_gap==null?"—":String(r.avg_gap)));
        tr.appendChild(el("td",null,String(r.games)));
        body.appendChild(tr);
      });
      tb.appendChild(body); scroll.appendChild(tb); t.appendChild(scroll); s.appendChild(t);
    }
    if(em.per_game && em.per_game.length){
      var pg=el("section"); pg.appendChild(el("h2",null,"Every game, graded"));
      em.per_game.forEach(function(g){
        var row=stat(el("div"),"background:var(--card);border:1px solid var(--line);border-radius:9px;padding:8px 11px;margin-bottom:6px;box-shadow:var(--shadow)");
        var top=stat(el("div"),"display:flex;justify-content:space-between;gap:8px;align-items:baseline");
        top.appendChild(el("strong",null,(g.matchup||"")+" · "+(g.date||"")));
        if(g.slug){
          var a=el("a",null,"full breakdown →");
          a.href="./games/retro/"+String(g.slug).replace(/^g/,"")+".html";
          stat(a,"font-size:11.5px;color:var(--accent);text-decoration:none;white-space:nowrap");
          top.appendChild(a);
        }
        row.appendChild(top);
        if(g.headline) row.appendChild(stat(el("div",null,g.headline),"font-size:12px;color:var(--muted);margin-top:3px"));
        pg.appendChild(row);
      });
      s.appendChild(pg);
    }
    return s;
  }

  function render(d){
    var main=document.getElementById("main"); main.innerHTML="";
    main.appendChild(el("p","lede", d.source || "Our own error map."));
    var shown=false;
    if(d.error_map && d.error_map.available){ main.appendChild(errorMapSection(d.error_map)); shown=true; }
    if(d.error_ledger && d.error_ledger.rows && d.error_ledger.rows.length){
      if(d.headline_miss) main.appendChild(headlineMissSection(d.headline_miss));
      main.appendChild(makeTable("Where we miss most (error ledger)", d.error_ledger, ledgerReading(d.error_ledger))); shown=true;
    }
    if(d.market_relative && d.market_relative.rows && d.market_relative.rows.length){ main.appendChild(makeTable("Where we beat the market", d.market_relative, marketReading(d.market_relative))); shown=true; }
    if(!shown){
      var ph=el("div","placeholder");
      ph.appendChild(el("div","big", d.message || "Map being built — first version landing today."));
      ph.appendChild(el("div",null,"This page will fill in automatically the moment the error map is baked. Nothing to do."));
      main.appendChild(ph);
    }
    document.getElementById("foot").textContent = "Baked " + (d.generated_et||d.generated_utc||"") + ".";
    flash();
  }
  /* ---------- shared live runtime ---------- */
  var URL="./ledger.json", etag=null,lastMod=null,lastFetch=0,cardHTML={},first=true;
  function updAgo(){
    var s=Math.max(0,Math.round((Date.now()-lastFetch)/1000));
    var t = s<60 ? (s+"s ago") : (Math.floor(s/60)+"m "+(s%60)+"s ago");
    var a=document.getElementById("ago"); if(a) a.innerHTML = lastFetch? ("live · updated <b>"+t+"</b>") : "";
  }
  function flash(){
    var nodes=document.querySelectorAll("#main [data-k]"), nm={};
    nodes.forEach(function(n){ var k=n.getAttribute("data-k"), h=n.innerHTML; nm[k]=h;
      if(!first && cardHTML[k]!==undefined && cardHTML[k]!==h){ n.classList.remove("flash"); void n.offsetWidth; n.classList.add("flash"); } });
    cardHTML=nm; first=false;
  }
  function poll(){
    var h={}; if(etag)h["If-None-Match"]=etag; if(lastMod)h["If-Modified-Since"]=lastMod;
    fetch(URL,{headers:h,cache:"no-cache"}).then(function(r){
      if(r.status===304) return null;
      etag=r.headers.get("ETag")||etag; lastMod=r.headers.get("Last-Modified")||lastMod; return r.json();
    }).then(function(d){ lastFetch=Date.now(); if(d){ render(d); } updAgo(); }).catch(function(e){
      if(!lastFetch){ document.getElementById("main").innerHTML='<p class="empty">Could not load the error map. '+(e&&e.message?e.message:"")+'</p>'; }
    });
  }
