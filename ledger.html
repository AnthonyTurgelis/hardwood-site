<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hardwood — Error Map</title>
<style>
  :root{ --bg:#f6f7f9; --card:#ffffff; --ink:#16181d; --muted:#5b6472; --line:#e5e8ee; --accent:#2b6cb0; --shadow:0 1px 3px rgba(20,24,35,.08); }
  @media (prefers-color-scheme:dark){ :root{ --bg:#0d1117; --card:#161b22; --ink:#e6edf3; --muted:#8b949e; --line:#222a35; --accent:#58a6ff; --shadow:none; } }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  header{padding:20px 16px 8px;max-width:960px;margin:0 auto}
  h1{font-size:22px;margin:0 0 2px}
  .sub{color:var(--muted);font-size:13px}
  nav{display:flex;gap:6px;flex-wrap:wrap;max-width:960px;margin:12px auto 0;padding:0 16px}
  nav a{font-size:13px;text-decoration:none;color:var(--accent);border:1px solid var(--line);background:var(--card);padding:6px 12px;border-radius:999px}
  nav a.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  main{max-width:960px;margin:0 auto;padding:8px 16px 60px}
  .lede{color:var(--muted);font-size:14px;margin:10px 0}
  section{margin-top:22px}
  h2{font-size:15px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 10px;font-weight:700}
  .placeholder{background:var(--card);border:1px dashed var(--line);border-radius:12px;padding:26px 18px;text-align:center;color:var(--muted)}
  .placeholder .big{font-size:16px;color:var(--ink);font-weight:620;margin-bottom:6px}
  .scroll{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--card);box-shadow:var(--shadow)}
  table{border-collapse:collapse;width:100%;font-size:13px;min-width:520px}
  th,td{padding:8px 11px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{position:sticky;top:0;background:var(--card);cursor:pointer;user-select:none;font-size:12px;color:var(--muted)}
  th:hover{color:var(--ink)}
  tbody tr:hover{background:rgba(43,108,176,.06)}
  .empty{color:var(--muted);font-style:italic}
  footer{max-width:960px;margin:0 auto;padding:24px 16px;color:var(--muted);font-size:12px}
</style>
</head>
<body>
<header>
  <h1>The Hardwood — Error Map</h1>
  <div class="sub" id="sub">Where we miss, and where we beat the market.</div>
</header>
<nav>
  <a href="./index.html">Board</a>
  <a href="./review.html">Daily Review</a>
  <a href="./accuracy.html">Our Accuracy</a>
  <a class="active" href="./ledger.html">Error Map</a>
</nav>
<main id="main"><p class="empty">Loading the error map…</p></main>
<footer id="foot"></footer>
<script>
(function(){
  "use strict";
  function el(t,c,x){ var e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; }

  function num(v){ return (typeof v==="number") && isFinite(v); }

  function makeTable(title, data){
    var s=el("section"); s.appendChild(el("h2",null,title));
    if(!data || !data.columns || !data.rows || !data.rows.length){
      s.appendChild(el("p","empty","No rows yet.")); return s;
    }
    var cols=data.columns, rows=data.rows.slice();
    var scroll=el("div","scroll");
    var table=el("table");
    var thead=el("thead"), htr=el("tr");
    var sortState={col:null,dir:1};
    cols.forEach(function(c,ci){
      var th=el("th",null,c.replace(/_/g," "));
      th.addEventListener("click", function(){
        sortState.dir = (sortState.col===ci)? -sortState.dir : 1; sortState.col=ci;
        rows.sort(function(a,b){
          var x=a[c], y=b[c];
          if(num(x)&&num(y)) return (x-y)*sortState.dir;
          return String(x).localeCompare(String(y))*sortState.dir;
        });
        fill();
      });
      htr.appendChild(th);
    });
    thead.appendChild(htr); table.appendChild(thead);
    var tbody=el("tbody"); table.appendChild(tbody);

    // color scale bounds per numeric column
    var bounds={};
    cols.forEach(function(c){
      var vals=rows.map(function(r){return r[c];}).filter(num);
      if(vals.length){ bounds[c]=[Math.min.apply(null,vals),Math.max.apply(null,vals)]; }
    });
    function fill(){
      tbody.innerHTML="";
      rows.forEach(function(r){
        var tr=el("tr");
        cols.forEach(function(c){
          var v=r[c]; var td=el("td", null, v==null? "—" : String(v));
          if(num(v) && bounds[c] && bounds[c][1]>bounds[c][0]){
            var f=(v-bounds[c][0])/(bounds[c][1]-bounds[c][0]);
            td.style.background="rgba(207,34,46,"+(0.05+f*0.28).toFixed(3)+")";
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }
    fill(); scroll.appendChild(table); s.appendChild(scroll); return s;
  }

  fetch("./ledger.json").then(function(r){ return r.json(); }).then(function(d){
    var main=document.getElementById("main"); main.innerHTML="";
    main.appendChild(el("p","lede", d.source || "Our own error map."));
    if(!d.available){
      var ph=el("div","placeholder");
      ph.appendChild(el("div","big", d.message || "Map being built — first version landing today."));
      ph.appendChild(el("div",null,"This page will fill in automatically the moment the error and market-relative tables are baked. Nothing to do."));
      main.appendChild(ph);
      document.getElementById("foot").textContent = "Baked " + (d.generated_utc||"") + ".";
      return;
    }
    if(d.error_ledger) main.appendChild(makeTable("Where we miss most (error ledger)", d.error_ledger));
    if(d.market_relative) main.appendChild(makeTable("Where we beat the market", d.market_relative));
    document.getElementById("foot").textContent = "Tap a column header to sort. Baked " + (d.generated_utc||"") + ".";
  }).catch(function(e){
    document.getElementById("main").innerHTML='<p class="empty">Could not load the error map. '+(e&&e.message?e.message:"")+'</p>';
  });
})();
</script>
</body>
</html>
